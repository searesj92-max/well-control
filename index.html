P é a secundária."},{q:"A pressão hidrostática depende de:",alts:["Densidade e profundidade vertical (TVD)","Densidade e profundidade medida (MD)","Vazão e densidade","Diâmetro do poço e TVD"],correct:0,exp:"PH = 0,17 × densidade × TVD."},{q:"Fluido de 10 lb/gal a 2.000 m de TVD gera PH de:",alts:["2.000 psi","3.400 psi","4.000 psi","1.700 psi"],correct:1,exp:"0,17 × 10 × 2000 = 3.400 psi."},{q:"Overbalance significa:",alts:["PH menor que a pressão de poros","PH maior que a pressão de poros","Poço fraturado","Bomba acima da vazão máxima"],correct:1,exp:"Situação normal e segura de perfuração."},{q:"A causa mais comum de kick é:",alts:["Broca gasta","Não completar o poço com fluido na manobra","BOP com vazamento","Excesso de densidade"],correct:1,exp:"Nível cai, hidrostática cai, formação invade."},{q:"O efeito swab acontece quando:",alts:["A coluna desce rápido","A coluna é puxada rápido, reduzindo a pressão no fundo","A bomba é acelerada","O choke é fechado"],correct:1,exp:"Pistoneio reduz a pressão de fundo e pode induzir kick."},{q:"Qual destes é um sinal POSITIVO de kick?",alts:["Aumento de torque","Ganho de volume nos tanques","Queda da taxa de penetração","Aumento do peso sobre a broca"],correct:1,exp:"Pit gain indica influxo em andamento."},{q:"Poço fluindo com as bombas desligadas indica:",alts:["ECD alta","Kick em andamento","Funcionamento normal","Perda de circulação"],correct:1,exp:"Flow check positivo: fechar o poço."},{q:"O drilling break é:",alts:["Quebra da broca","Aumento brusco da taxa de penetração","Parada da rotação","Queda de pressão no acumulador"],correct:1,exp:"Sinal de alerta: pode ser zona porosa/pressurizada."},{q:"O BOP anular é capaz de fechar:",alts:["Só em drill pipe","Só em poço aberto","Em qualquer diâmetro e até em poço aberto","Somente no kelly"],correct:2,exp:"Elemento de borracha se molda ao que estiver no poço."},{q:"A gaveta cega serve para:",alts:["Cortar a coluna","Fechar o poço sem coluna dentro","Fechar sobre o tool joint", ,{q:"A janela operacional do fluido fica entre:",alts:["Pressão de poros e de fratura","Zero e a pressão de poros","PH e ECD","SIDPP e SICP"],correct:0,exp:"Abaixo dá kick; acima dá perda/fratura."},{q:"Diante de um sinal positivo de kick, a atitude correta é:",alts:["Investigar antes de fechar","Fechar o poço primeiro e investigar depois","Aumentar a vazão","Continuar perfurando devagar"],correct:1,exp:"Cada segundo aberto aumenta o influxo."},{q:"Na manobra de retirada, o volume de fluido bombeado ao poço deve ser igual:",alts:["Ao volume do tanque de reserva","Ao volume de aço retirado","À capacidade do riser","Ao volume do anular"],correct:1,exp:"Diferença indica possível influxo (ou perda)."},{q:"O degasser serve para:",alts:["Retirar gás do fluido de retorno","Injetar gás no poço","Medir gás na formação","Acionar o BOP"],correct:0,exp:"Remove o gás antes de o fluido voltar aos tanques."},{q:"A válvula de segurança de manobra (FOSV/TIW) é usada para:",alts:["Fechar o anular","Fechar a coluna se o poço fluir por dentro dela","Testar a sapata","Ancorar o BOP"],correct:1,exp:"Instalada aberta e depois fechada sobre a coluna."},{q:"A regra de barreiras da indústria exige:",alts:["Uma barreira testada","Duas barreiras testadas e independentes","Três barreiras quaisquer","Barreira apenas em poço de gás"],correct:1,exp:"Duas barreiras independentes entre formação e superfície."},{q:"A balança de lama mede:",alts:["Viscosidade","Densidade do fluido","Teor de sólidos","pH"],correct:1,exp:"Densidade define a hidrostática."},{q:"A perda de circulação pode causar kick porque:",alts:["Aumenta a densidade","O nível de fluido cai e a PH diminui","Esfria o poço","Aumenta a ECD"],correct:1,exp:"Poço sem coluna cheia perde hidrostática."},{q:"Blowout é:",alts:["Qualquer kick","Fluxo descontrolado da formação para a superfície ou outra formação","Teste de BOP","Perda total de circulação"],correct:1,exp:"É o kick que não foi controlado."}]},{level:"Introdutório",num:2,questions:[{q:"Fluido de 12 lb/gal a 1.500 m de TVD gera PH de:",alts:["3.060 psi","2.550 psi","1.800 psi","3.600 psi"],correct:0,exp:"0,17 × 12 × 1500 = 3.060 psi."},{q:"Underbalance é quando:",alts:["PH > pressão de poros","PH < pressão de poros","PH = pressão de fratura","O poço está fechado"],correct:1,exp:"A formação pode fluir para o poço."},{q:"Dois poços com o mesmo fluido: um vertical com TVD 2.000 m e um direcional com MD 2.600 m e TVD 2.000 m. A PH no fundo é:",alts:["Maior no direcional","Maior no vertical","Igual nos dois","Depende da vazão"],correct:2,exp:"PH depende só de densidade e TVD."},{q:"Qual é sinal de ALERTA (não positivo) de kick?",alts:["Pit gain","Poço fluindo parado","Drilling break","Retorno maior que o aço retirado"],correct:2,exp:"Alerta pede flow check; os demais são positivos."},{q:"O flow check consiste em:",alts:["Trocar o fluido","Parar as bombas e observar se o poço flui","Testar o BOP","Medir densidade"],correct:1,exp:"Observação no trip tank ou linha de retorno."},{q:"A gaveta de tubo (pipe ram) fecha:",alts:["Em qualquer diâmetro","Em um diâmetro específico de tubo","Só sem coluna","Só no revestimento"],correct:1,exp:"Cada pipe ram tem seu diâmetro (ou faixa, no caso da variável)."},{q:"As linhas de kill e choke conectam:",alts:["Bomba ao topdrive","BOP ao choke manifold","Tanques ao trip tank","Riser ao diverter"],correct:1,exp:"Caminhos de bombeio e retorno com o poço fechado."},{q:"O corte do fluido por gás:",alts:["Aumenta a densidade","Reduz a densidade e a PH","Não altera nada","Aumenta a PH"],correct:1,exp:"Fluido gaseificado pesa menos."},{q:"Se a bomba mantém os strokes e a vazão de retorno aumenta, isso indica:",alts:["Perda de circulação","Influxo da formação","Bomba com defeito","Choke aberto"],correct:1,exp:"Algo a mais está saindo do poço: kick."},{q:"Pressões anormais na formação são perigosas porque:",alts:["Danificam a broca","Podem superar a PH planejada e gerar kick","Aumentam o torque","Esfriam o poço"],correct:1,exp:"Densidade do projeto pode ficar insuficiente."},{q:"O inside BOP é:",alts:["Uma gaveta interna do BOP","Válvula de retenção instalada na coluna","Um sensor de pressão","O anular submarino"],correct:1,exp:"Impede fluxo pelo interior da coluna."},{q:"Antes de fechar o BOP perfurando, a coluna deve ser posicionada para:",alts:["Deixar o tool joint na frente das gavetas","Deixar o tool joint fora das gavetas","Apoiar a broca no fundo","Sair totalmente do poço"],correct:1,exp:"Nunca fechar gaveta em tool joint."},{q:"Fluido de 9 lb/gal. Para gerar 3.060 psi de PH, a TVD necessária é:",alts:["1.500 m","2.000 m","2.500 m","3.000 m"],correct:1,exp:"TVD = 3060 ÷ (0,17 × 9) = 2.000 m."},{q:"O poor boy degasser (separador atmosférico) atua:",alts:["Antes da bomba","Na linha de retorno do choke, separando gás do fluido","Dentro do poço","No acumulador"],correct:1,exp:"Separa o gás circulado do kick."},{q:'Quem "segura" a formação 24 h por dia é:',alts:["O BOP","O fluido de perfuração","O choke","O revestimento"],correct:1,exp:"Por isso é a barreira primária."},{q:"Se o poço devolve mais fluido do que o volume de aço descido na manobra:",alts:["Normal","Possível kick: flow check e fechar se confirmar","Perda de circulação","Bomba ligada"],correct:1,exp:"Retorno em excesso indica influxo."},{q:"O kelly cock é:",alts:["Válvula de segurança na parte superior da coluna","Um tipo de gaveta","Sensor de vazão","Válvula do choke"],correct:0,exp:"Fecha o interior da coluna na superfície."},{q:"Aumentar a densidade do fluido:",alts:["Diminui a PH","Aumenta a PH","Não altera a PH","Só altera a ECD"],correct:1,exp:"PH é proporcional à densidade."},{q:"O gás, ao subir num poço aberto (sem controle), tende a:",alts:["Se dissolver","Expandir e empurrar fluido para fora","Afundar","Manter o volume"],correct:1,exp:"Expansão descontrolada expulsa fluido e agrava o kick."},{q:"Qual equipamento retira o poço da rota do pessoal em kick raso (antes do BOP no fundo do mar assentar)?",alts:["Choke manifold","Diverter","Degasser","Acumulador"],correct:1,exp:"O diverter desvia o fluxo para longe da sonda."},{q:"Pressão de poros é medida/estimada para:",alts:["Definir a densidade do fluido","Escolher a broca","Calcular torque","Definir vazão"],correct:0,exp:"A densidade deve superá-la com margem."},{q:"Qual situação REDUZ a pressão no fundo do poço?",alts:["Aumentar densidade","Puxar a coluna rápido (swab)","Ligar as bombas","Fechar o choke"],correct:1,exp:"Swab é sucção: risco de kick."},{q:"Fluido 11 lb/gal, TVD 1.000 m. PH =",alts:["1.870 psi","1.100 psi","2.200 psi","1.700 psi"],correct:0,exp:"0,17 × 11 × 1000 = 1.870 psi."},{q:"O nível dos tanques é importante porque:",alts:["Mostra a temperatura","É o principal indicador de ganho/perda de volume","Define a densidade","Mede a vazão da bomba"],correct:1,exp:"Pit gain/pit loss são vigiados o tempo todo."},{q:'Duas barreiras "independentes" significa:',alts:["Que uma depende da outra","Que a falha de uma não derruba a outra","Que ficam no mesmo lugar","Que são do mesmo tipo"],correct:1,exp:"Independência é o coração da filosofia de barreiras."},{q:"Fechar o poço rapidamente em um kick serve para:",alts:["Aumentar o influxo","Limitar o volume do influxo e as pressões futuras","Testar o BOP","Economizar fluido"],correct:1,exp:"Influxo menor = controle mais fácil."},{q:"O revestimento cimentado contribui para o controle do poço porque:",alts:["Aumenta a vazão","Isola formações e protege trechos já perfurados","Reduz a densidade","Substitui o BOP"],correct:1,exp:"Isola zonas e dá integridade ao poço."},{q:"Água salgada entrando no poço tende a:",alts:["Aumentar a densidade do fluido","Reduzir a densidade média e contaminar o fluido","Não alterar nada","Endurecer o cimento"],correct:1,exp:"Influxo mais leve que o fluido reduz a hidrostática."},{q:"Em qual operação ocorre a maioria dos kicks?",alts:["Perfurando","Manobra","Cimentação","Perfilagem"],correct:1,exp:"Por isso o rigor com trip tank e completação do poço."},{q:"Se o acumulador perder pressão totalmente:",alts:["Nada acontece","O acionamento remoto do BOP fica comprometido","O poço fecha sozinho","A bomba para"],correct:1,exp:"Sem energia armazenada, o BOP pode não fechar a tempo."}]},{level:"Introdutório",num:3,questions:[{q:"Fluido 14 lb/gal, TVD 3.000 m. PH =",alts:["7.140 psi","6.000 psi","4.200 psi","5.100 psi"],correct:0,exp:"0,17 × 14 × 3000 = 7.140 psi."},{q:"O que acontece com a PH se o nível de fluido no poço cair?",alts:["Aumenta","Diminui","Não muda","Vira ECD"],correct:1,exp:"Menos coluna vertical de fluido = menos pressão."},{q:"Kick de gás é pior que de líquido porque o gás:",alts:["É mais pesado","Expande ao subir","É frio","Não migra"],correct:1,exp:"Expansão reduz hidrostática e acelera o problema."},{q:"Qual sequência está na ordem correta ao notar sinal positivo perfurando?",alts:["Fechar BOP → parar bombas → levantar coluna","Parar rotação/levantar coluna → parar bombas → fechar BOP","Parar bombas → perfurar devagar → avisar","Aumentar densidade → continuar"],correct:1,exp:"Posicionar, parar bombeio e fechar."},{q:"O BOP é considerado:",alts:["Barreira primária","Barreira secundária","Equipamento opcional","Barreira terciária"],correct:1,exp:"Atua quando a hidrostática falha."},{q:"A função da linha de kill é:",alts:["Retornar fluido ao manifold","Permitir bombear fluido para o poço fechado","Ventilar gás","Medir SICP"],correct:1,exp:"Kill = bombeio; choke = retorno controlado."},{q:"Densidade de 8,6 lb/gal equivale aproximadamente a:",alts:["Água do mar","Fluido pesado","Cimento","Óleo diesel"],correct:0,exp:"Água do mar ≈ 8,5–8,6 lb/gal (água doce ≈ 8,33)."},{q:'Se o fluido retorna "cortado" (gaseificado), a atitude correta é:',alts:["Ignorar","Tratar como alerta, monitorar e investigar densidade do retorno","Desligar o degasser","Acelerar a perfuração"],correct:1,exp:"Corte por gás é sinal de alerta clássico."},{q:"O que é pit gain?",alts:["Perda de volume nos tanques","Ganho de volume nos tanques","Vazão da bomba","Nome do trip tank"],correct:1,exp:"Volume extra vindo do poço: sinal positivo."},{q:"Quem fecha em volta do cabo de perfilagem, se necessário?",alts:["Pipe ram comum","BOP anular","Gaveta cega","Choke"],correct:1,exp:"O anular se molda a diâmetros irregulares."},{q:"Fluido 10 lb/gal, poço com pressão de poros equivalente a 10,5 lb/gal:",alts:["Overbalance","Underbalance","Equilíbrio","Fratura"],correct:1,exp:"Densidade menor que a necessária: risco de kick."},{q:"A margem entre a densidade do fluido e a pressão de poros serve para:",alts:["Economizar barita","Compensar efeitos como swab e ECD ao parar bombas","Aumentar a taxa de penetração","Reduzir torque"],correct:1,exp:"Margem de segurança operacional (trip margin)."},{q:"Qual válvula impede fluxo pelo interior da coluna, funcionando como retenção?",alts:["Kelly cock inferior","Inside BOP (válvula de retenção)","Válvula do choke","Gaveta variável"],correct:1,exp:"Deixa bombear para baixo e bloqueia o retorno."},{q:"Em um flow check, o poço deve ser observado:",alts:["Por 10 segundos","Por tempo suficiente conforme procedimento, com o poço estático","Só com bombas ligadas","Apenas visualmente na mesa"],correct:1,exp:"Tempo e método definidos por procedimento."},{q:"O que acontece se fechar uma gaveta de tubo sobre o tool joint?",alts:["Nada","Risco de danificar a gaveta e não vedar","Vedação melhor","Corta o tubo"],correct:1,exp:"Por isso o spacing out."},{q:"A hidrostática da coluna de fluido é exercida:",alts:["Só no fundo","Em todas as paredes e no fundo do poço","Só na sapata","Só no BOP"],correct:1,exp:"Pressão atua em todos os pontos, crescendo com a TVD."},{q:"PH de 2.550 psi com fluido 10 lb/gal corresponde a TVD de:",alts:["1.000 m","1.500 m","2.000 m","2.550 m"],correct:1,exp:"TVD = 2550 ÷ (0,17 × 10) = 1.500 m."},{q:"Qual documento/prática treina a equipe para resposta rápida a kick?",alts:["Kill sheet","Drills (BOP drill, pit drill etc.)","LOT","Perfilagem"],correct:1,exp:"Treinos cronometrados criam resposta automática."},{q:"O diverter é usado principalmente:",alts:["Em kick raso, antes de haver BOP/sapata capaz de fechar com segurança","Em águas profundas","Para testes de coluna","Para cimentação"],correct:0,exp:"Desvia o fluxo para longe da sonda quando fechar não é opção."},{q:"Qual dos itens NÃO é sinal de kick?",alts:["Aumento de vazão de retorno","Pit gain","Queda do nível dos tanques","Poço fluindo com bombas paradas"],correct:2,exp:"Queda de nível indica perda, não influxo (mas perda pode levar a kick)."},{q:"O fluido de matar é:",alts:["Fluido mais leve","Fluido com densidade calculada para equilibrar a formação","Água do mar","Cimento"],correct:1,exp:"Densidade = KMW."},{q:"Qual é o papel do sondador (driller) no controle de poço?",alts:["Só perfurar","Detectar sinais e fechar o poço rapidamente","Preparar o almoço da equipe","Trocar a broca"],correct:1,exp:"Primeira linha de defesa."},{q:"Fluido 13 lb/gal, TVD 2.000 m. PH =",alts:["4.420 psi","3.400 psi","5.200 psi","2.600 psi"],correct:0,exp:"0,17 × 13 × 2000 = 4.420 psi."},{q:"Gás raso (shallow gas) é perigoso porque:",alts:["É profundo","Há pouca margem para fechar e o gás chega rápido à superfície","Não expande","É sempre pequeno"],correct:1,exp:"Cenário típico de uso do diverter."},{q:"A pressão atmosférica padrão ao nível do mar é aproximadamente:",alts:["1,0 psi","14,7 psi","100 psi","34 psi"],correct:1,exp:"Referência básica de pressão."},{q:'"Manter o poço cheio" na manobra significa:',alts:["Encher o riser de água","Bombear fluido compensando o volume de aço retirado","Fechar o BOP","Circular pelo choke"],correct:1,exp:"Preserva a hidrostática da barreira primária."},{q:'O que caracteriza uma barreira "testada"?',alts:["Estar instalada","Ter sido verificada por teste (pressão/função) e estar íntegra","Ser nova","Ser dupla"],correct:1,exp:"Barreira sem teste não conta na filosofia de barreiras."},{q:"Qual componente fornece energia hidráulica imediata ao BOP?",alts:["Bomba de lama","Acumulador","Trip tank","Topdrive"],correct:1,exp:"Garrafas pré-carregadas de nitrogênio."},{q:"Se durante a perfuração a pressão de bombeio cai e os strokes sobem sem mexer na bomba:",alts:["Sinal de alerta de influxo (fluido mais leve no anular)","Normal","Broca nova","Choke fechado"],correct:0,exp:'Influxo leve no anular "alivia" a bomba: investigar.'},{q:"O objetivo final do controle de poço é:",alts:["Perfurar mais rápido","Impedir que um kick vire blowout, protegendo pessoas, meio ambiente e patrimônio","Economizar barita","Testar equipamentos"],correct:1,exp:"Segurança em primeiro lugar."}]},{level:"Driller",num:1,questions:[{q:"Após o fechamento do poço, o SIDPP representa:",alts:["A pressão de fratura","O quanto falta de hidrostática na coluna para equilibrar a formação","A pressão do acumulador","A perda de carga da bomba"],correct:1,exp:"Pressão de poros = PH da coluna + SIDPP."},{q:"Por que normalmente SICP > SIDPP?",alts:["O manômetro do anular é maior","O influxo mais leve no anular reduz a hidrostática ali","O choke pressuriza o anular","O casing é mais fundo"],correct:1,exp:"Menos hidrostática no anular exige mais pressão de superfície."},{q:"Poço: fluido 10 lb/gal, TVD 2.000 m, SIDPP 340 psi. A pressão de poros é:",alts:["3.400 psi","3.740 psi","3.060 psi","4.080 psi"],correct:1,exp:"0,17×10×2000 + 340 = 3.740 psi."},{q:"Com os dados da questão 3, o KMW é:",alts:["10,5 lb/gal","11 lb/gal","12 lb/gal","10,2 lb/gal"],correct:1,exp:"10 + 340/(0,17×2000) = 11 lb/gal."},{q:"PL = 600 psi e SIDPP = 400 psi. O ICP é:",alts:["200 psi","1.000 psi","600 psi","400 psi"],correct:1,exp:"ICP = PL + SIDPP."},{q:"Fluido atual 10 lb/gal, KMW 11 lb/gal, PL 600 psi. FCP =",alts:["545 psi","660 psi","600 psi","700 psi"],correct:1,exp:"600 × (11/10) = 660 psi."},{q:"No hard shut-in:",alts:["O choke fica aberto ao fechar o BOP","A choke line está fechada e o BOP fecha direto","Fecha-se só o choke","Fecha-se a gaveta cega"],correct:1,exp:"Fechamento mais rápido ar/acionar EDS conforme gatilhos — integridade do poço e da sonda","Abrir o anular","Retirar o riser com pressão"],correct:1,exp:"Shear ram + desconexão protegem poço e sonda."},{q:"Spacing out em BOP submarino é mais crítico porque:",alts:["O mar é fundo","A coluna estica/comprime (heave/maré) e as gavetas não podem pegar tool joint","O tubo é mais caro","O anular fecha sozinho"],correct:1,exp:"Compensação de movimento entra no cálculo."},{q:"Gás entrou no riser após desconectar o BOP do fluxo. Ferramenta de proteção da sonda:",alts:["Diverter (linhas overboard)","Choke manifold","Trip tank","Degasser apenas"],correct:0,exp:"Desviar para longe do piso e do pessoal."},{q:"Qual informação NÃO pertence tipicamente à kill sheet?",alts:["Volumes/strokes por trecho","ICP/FCP e tabela de queda","MAASP","Escala de folga da equipe"],correct:3,exp:"Kill sheet é documento técnico do controle."},{q:"Kick tolerance tende a AUMENTAR quando:",alts:["A margem do LOT aumenta e o influxo esperado é menor","O anular estreita","A densidade sobe até o limite do LOT","A sapata fica mais rasa"],correct:0,exp:"Mais margem na sapata = mais tolerância."},{q:"Circulação do kick em vazão reduzida também protege:",alts:["A pintura da sonda","O separador poor boy e o degasser de sobrecarga de gás","O trip tank","A broca"],correct:1,exp:"Vazão de gás na superfície precisa ser processável."},{q:'"Wait" do Wait & Weight se torna inaceitável quando:',alts:["O fluido fica pronto em 20 min","O gás migra rápido e as pressões sobem no fechamento","A equipe está completa","O poço é vertical"],correct:1,exp:"Migração corre contra o relógio."},{q:"Um influxo de água salgada (sem gás) fechado no poço:",alts:["Migra como gás","Praticamente não migra; pressões tendem a ficar estáveis","Explode","Congela"],correct:1,exp:"Tempo joga a favor: dá para planejar com calma."},{q:"Decisão de assentar revestimento mais cedo pode ser motivada por:",alts:["Estética do poço","Kick tolerance insuficiente para o próximo t ça real."},{q:"O supervisor percebe que a equipe diverge sobre leituras durante o controle. Melhor conduta:",alts:["Seguir a maioria sem verificar","Parar com o poço fechado e estável, verificar dados e alinhar antes de prosseguir","Continuar para não perder tempo","Trocar a equipe no meio"],correct:1,exp:"Poço fechado estável dá tempo para decidir bem."}]},{level:"Supervisão",num:3,questions:[{q:"Cenário: kick de gás, sapata com margem folgada, fluido de matar pronto em 30 min, migração lenta. Método com melhor custo-benefício:",alts:["W&W (uma circulação, pressões menores)","Volumétrico","Bullheading","Lubricate & bleed"],correct:0,exp:"Condições ideais para o método do engenheiro."},{q:"Cenário: equipe de mistura limitada, kick pequeno de gás migrando, bit no fundo. Método:",alts:["Esperar 6 h pelo fluido","Driller's — remover o influxo já na 1ª circulação","Abrir e observar","Snubbing"],correct:1,exp:"Início imediato vence quando a espera custa pressão."},{q:"Durante a 1ª circulação do Driller's com gás, a pressão na sapata fica mais alta que no W&W principalmente porque:",alts:["A bomba é maior","O anular ainda contém fluido original (mais leve) quando o gás passa pela sapata","O choke é diferente","O SIDPP dobra"],correct:1,exp:"Sem o fluido pesado no anular, a superfície exige mais pressão."},{q:"Influxo de 8 bbl, anular do BHA 0,032 bbl/m. Altura:",alts:["250 m","320 m","125 m","80 m"],correct:0,exp:"8 ÷ 0,032 = 250 m."},{q:"SICP 520 psi, SIDPP 300 psi, altura do influxo 250 m, fluido 10 lb/gal. Gradiente do influxo (aprox.):",alts:["Igual ao do fluido","Fluido: 1,7 psi/m; influxo: 1,7 − (220/250) ≈ 0,82 psi/m → indica gás","3,4 psi/m","Zero"],correct:1,exp:"(SICP−SIDPP) = déficit de hidrostática do trecho do influxo."},{q:"Uma sonda com detecção confiável mínima de 10 bbl e kick tolerance de 8 bbl no próximo trecho:",alts:["Pode perfurar normalmente","Não deve avançar sem mitigação (revestimento, densidade, monitoramento)","Deve aumentar a vazão","Deve retirar o BOP"],correct:1,exp:"Detectaria o kick só depois do limite seguro."},{q:"Em BOP submarino, ao fechar o poço, parte do gás pode ficar presa abaixo do BOP. Antes de abrir/desconectar:",alts:["Abrir direto","Remover o gás preso (ex.: circulação pela choke/kill, lubricate & bleed) conforme procedimento","Ignorar","Acionar EDS sempre"],correct:1,exp:"Gás preso liberado sem controle vai direto ao riser."},{q:"A escolha de circular o kick pela linha de CHOKE com leitura na KILL line existe porque:",alts:["A kill line é mais bonita","A linha estática não tem perda de carga: leitura fiel da pressão no BOP","O choke não aguenta","A kill line é maior"],correct:1,exp:"Prática padrão em águas profundas."},{q:"Qual evento pode elevar o risco de hidrato DURANTE o controle em águas profundas?",alts:["Circulação rápida de fluido quente","Expansão de gás com resfriamento (Joule-Thomson) nas linhas frias do leito marinho","Barita no fluido","Alta ROP"],correct:1,exp:"Expansão esfria e favorece hidrato: usar inibidores."},{q:"Kick fechado; decisão de bullheading tomada. A pressão de injeção deve:",alts:["Ser ilimitada","Ficar abaixo do limite de fratura da sapata/formações rasas, monitorando MAASP","Superar sempre a fratura","Ser igual ao SIDPP"],correct:1,exp:"Bullheading sem limite cria blowout subterrâneo."},{q:'O que caracteriza um controle "bem-sucedido" além de matar o poço?',alts:["Rapidez a qualquer custo","Fundo constante, sapata protegida, ninguém exposto, equipamentos íntegros e registro completo","Não usar o choke","Não avisar a operadora"],correct:1,exp:"Resultado + processo."},{q:"Após um kick controlado, o LOT/margem da sapata deve ser reavaliado se:",alts:["Nada mudou","Houve indício de perda/fratura ou pressões próximas da MAASP durante o evento","A broca é nova","O mar está calmo"],correct:1,exp:"A integridade do ponto fraco pode ter mudado."},{q:"Delegação correta durante o controle:",alts:["O supervisor opera o choke, comanda e anota tudo sozinho","Funções distribuídas e treinadas: choke, bombas, volumes, registro — supervisor decide","Cada um faz o que quiser","A operadora opera o choke remotamente sempre"],correct:1,exp:"Estrutura de resposta com papéis claros."},{q:"Um influxo entrou durante a cimentação do revestimento. Complicação típica:",alts:["Nenhuma","Janela de tempo do cimento + caminhos restritos: plano específico e rapidez na decisão","O cimento mata o poço sempre","O BOP não funciona com cimento"],correct:1,exp:"Cenário não convencional exige plano dedicado."},{q:"Fluido 14 lb/gal, LOT 16 lb/gal, sapata 2.000 m. MAASP =",alts:["680 psi","850 psi","476 psi","1.020 psi"],correct:0,exp:"(16−14) × 0,17 × 2000 = 680 psi."},{q:"Poço com MAASP 680 psi. Durante a circulação o SICP atinge 650 psi e ainda há gás por passar na sapata:",alts:["Seguir sem mudar nada","Reavaliar imediatamente: reduzir exigência (expansão/vazão), aceitar risco calculado ou parar fechado — sapata quase no limite","Aumentar a vazão","Abrir o anular"],correct:1,exp:"Supervisão gerencia o ponto fraco em tempo real."},{q:"Kick com coluna fora do fundo e gás migrando; stripping não é possível (equipamento). Alternativa:",alts:["Volumétrico para controlar a migração enquanto se define o plano","Abrir o poço","Esperar sem fazer nada","Retirar o BOP"],correct:0,exp:"Volumétrico segura o fundo sem circulação."},{q:"Qual métrica dos drills importa mais para a segurança?",alts:["A nota do relatório","Tempo de detecção + tempo de fechamento (e qualidade da execução)","Quantidade de papel","Número de participantes"],correct:1,exp:"Minutos de poço aberto definem o influxo."},{q:"Duas leituras de SIDPP divergentes (manômetro da sonda × unidade de cimentação). Conduta:",alts:["Usar a maior sempre","Verificar/calibrar, entender a diferença e definir a referência antes de calcular KMW","Usar a média cegamente","Ignorar ambas"],correct:1,exp:"Cálculo bom começa com dado confiável."},{q:'O influxo foi circulado, mas o poço "respira" (ballooning/flowback) nos flow checks:',alts:["Tratar automaticamente como poço morto","Investigar com cautela: distinguir ballooning de kick real com monitoramento fino (trip tank, tendências)","Abrir e perfurar","Bullheading imediato"],correct:1,exp:"Diagnóstico errado aqui causa acidentes."},{q:"Qual decisão pertence à supervisão ANTES do poço (planejamento)?",alts:["Definir kick tolerance por fase e profundidades de revestimento","Apertar o choke","Rosquear tubos","Pintar o BOP"],correct:0,exp:"Controle de poço começa no projeto."},{q:"Shear ram falhou em teste de função na sonda em operação:",alts:["Seguir operando normalmente","Tratar como perda de barreira/capacidade crítica: parar, avaliar e corrigir conforme norma antes de prosseguir","Testar de novo em 6 meses","Usar só o anular para sempre"],correct:1,exp:"Capacidade de cisalhamento é requisito de segurança."},{q:"Gás chegou à superfície mais rápido que o previsto na circulação. Primeira proteção operacional:",alts:["Aumentar a vazão da bomba","Reduzir vazão/ajustar choke e garantir separador/vent dentro da capacidade","Abrir o BOP","Desligar o degasser"],correct:1,exp:"Processamento do gás dita o ritmo."},{q:'"Manter uma barreira enquanto se repara a outra" significa:',alts:["Poder remover as duas ao mesmo tempo","Nunca ficar com menos de uma barreira testada; planejar a manutenção sem janela descoberta","Trabalhar sem barreiras à noite","Substituir barreiras por avisos"],correct:1,exp:"Gestão de barreiras é contínua."},{q:"Kick de 20 bbl fechado com SICP já em 90% da MAASP. Leitura do supervisor:",alts:["Situação confortável","Margem quase esgotada: qualquer migração/erro fratura a sapata — prioridade máxima e plano imediato","Poço morto","Manômetro errado com certeza"],correct:1,exp:"Ler números como risco, não como burocracia."},{q:'Por que registrar o "pit gain" final com precisão?',alts:["Curiosidade","Ele dimensiona o influxo — entra na estimativa de altura, gradiente e nas decisões do método","Para o almoxarifado","Não precisa"],correct:1,exp:"Volume é a variável-mestre do kick."},{q:"Qual conduta viola a filosofia de controle de poço?",alts:["Fechar rápido na dúvida",'"Perfurar mais um pouco" com sinal positivo para confirmar',"Flow check em sinal de alerta","Drills frequentes"],correct:1,exp:"Sinal positivo = fechar, sem negociação."},{q:"A ordem correta de prioridades num evento é:",alts:["Poço, pessoas, meio ambiente","Pessoas, meio ambiente e instalação/poço","Cronograma, custo, poço","Equipamento, custo, pessoas"],correct:1,exp:"Vidas primeiro, sempre."},{q:"Simulado de kick com nota ruim da equipe. Ação da supervisão:",alts:["Punir e esquecer","Crítica construtiva, retreinamento dirigido e repetição do drill até o padrão","Esconder o resultado","Trocar toda a equipe"],correct:1,exp:"Drill existe para achar e corrigir falhas."},{q:"A melhor definição do papel do supervisor no controle de poço:",alts:["Operar todos os equipamentos","Planejar limites e cenários, decidir método, garantir comunicação e proteger pessoas e barreiras","Apenas assinar relatórios","Substituir o sondador"],correct:1,exp:"Lidera antes, durante e depois do evento."}]},{level:"Introdutório",num:4,questions:[{q:"Um poço tem fluido de 9,5 lb/gal e TVD de 1.800 m. A pressão hidrostática no fundo é:",alts:["2.907 psi","1.710 psi","3.240 psi","2.400 psi"],correct:0,exp:"PH = 0,17 × 9,5 × 1.800 = 2.907 psi. Densidade e TVD são os únicos fatores."},{q:"Duas barreiras independentes e testadas são exigidas porque:",alts:["A lei manda e pronto","Se uma falhar, a outra ainda contém o poço","O BOP precisa de reserva de pressão","Facilita a manobra"],correct:1,exp:"Filosofia de barreiras: nenhuma falha única pode levar ao blowout. Cada barreira deve segurar o poço sozinha."},{q:"O fluido de perfuração deixa de ser barreira primária quando:",alts:["Está muito pesado","O nível do poço cai ou a densidade fica insuficiente","O BOP é testado","A bomba liga"],correct:1,exp:"Barreira primária = coluna hidrostática ÍNTEGRA: poço cheio + densidade suficiente. Perdeu um dos dois, perdeu a barreira."},{q:"Kick de manobra é mais comum que kick perfurando porque:",alts:["A broca gira mais rápido","O swab reduz a pressão de fundo e o poço pode ficar sem ser completado corretamente","O BOP fica aberto","A formação enfraquece"],correct:1,exp:"Na retirada, o pistoneio (swab) suga o poço e erros de enchimento derrubam o nível — a dupla clássica do kick de manobra."},{q:"O trip tank é preferido para encher o poço na manobra porque:",alts:["É mais rápido que a bomba","É pequeno e calibrado, detectando diferenças mínimas de volume","Filtra o fluido","Aquece o fluido"],correct:1,exp:"Tanque pequeno = precisão. Diferenças de poucos barris aparecem imediatamente na leitura."},{q:"Ao retirar 10 tubos secos, o poço deve receber fluido equivalente ao:",alts:["Volume interno dos tubos","Volume de aço retirado (deslocamento)","Dobro do volume dos tubos","Volume do anular"],correct:1,exp:"Tubo seco: o poço perde o volume de AÇO retirado. Se molhado (com fluido dentro), considera-se aço + interior."},{q:"O poço aceita MENOS fluido do que o calculado durante a retirada. Isso indica:",alts:["Perda de circulação","Possível influxo entrando no poço","Fluido muito pesado","Erro sempre aceitável"],correct:1,exp:"Se entra menos fluido do que deveria, algo está ocupando o espaço — possível kick. Parar, flow check, na dúvida fechar."},{q:"Sinal POSITIVO de kick (não apenas alerta):",alts:["Drilling break","Corte por gás","Poço fluindo com bombas desligadas","Aumento de torque"],correct:2,exp:"Fluxo com bombas paradas = a formação está empurrando. Sinais positivos exigem fechamento, não investigação."},{q:"Drilling break exige:",alts:["Aumentar peso sobre broca","Flow check antes de continuar","Trocar a broca","Fechar o poço imediatamente"],correct:1,exp:"Quebra brusca de taxa = possível zona porosa/pressurizada. É alerta: verificar fluxo antes de seguir perfurando."},{q:"Por que o kick de gás é mais perigoso que o de líquido?",alts:["Gás é tóxico sempre","Gás expande ao subir e migra mesmo com poço fechado","Gás pesa mais","Gás corrói o BOP"],correct:1,exp:"O gás expande (Boyle), reduz hidrostática ao subir e migra por densidade — três problemas que líquidos não causam."},{q:"Gás fechado no poço, sem poder expandir, ao migrar:",alts:["Perde pressão","Mantém sua pressão e eleva a pressão em todo o poço","Se dissolve","Para de subir"],correct:1,exp:"Sem expandir, o gás 'carrega' a pressão do fundo para cima — pode fraturar a sapata. Por isso a expansão controlada."},{q:"Fluido 10 lb/gal, kick de gás no fundo a 3.400 psi ocupando 5 bbl. Ao chegar a um ponto com 1.700 psi, o gás ocupará cerca de:",alts:["5 bbl","10 bbl","2,5 bbl","20 bbl"],correct:1,exp:"Boyle: P1V1 = P2V2 → 3.400×5 = 1.700×V2 → V2 = 10 bbl. Metade da pressão, dobro do volume."},{q:"A função do preventor anular é:",alts:["Cortar a coluna","Vedar em qualquer diâmetro, inclusive poço aberto","Vedar só em drill pipe","Medir pressão"],correct:1,exp:"O elemento de borracha se molda ao que estiver no poço — por isso costuma ser o primeiro a fechar."},{q:"A gaveta cega (blind ram) fecha:",alts:["Sobre o tool joint","O poço sem coluna dentro","Sobre qualquer tubo","Apenas em teste"],correct:1,exp:"Blind ram veda o poço vazio. Com coluna dentro, usa-se pipe ram ou anular."},{q:"A shear ram é considerada último recurso porque:",alts:["É lenta","Corta e sacrifica a coluna para vedar o poço","Não veda nada","Gasta muito fluido"],correct:1,exp:"Cortar a coluna é irreversível — usada em emergência (ex.: desconexão em sonda flutuante)."},{q:"O acumulador (Koomey) garante que o BOP:",alts:["Seja testado toda semana","Feche mesmo com a sonda sem energia","Não congele","Pese menos"],correct:1,exp:"Garrafas de N2 pré-carregadas armazenam energia hidráulica para fechar/abrir preventores em qualquer cenário."},{q:"Numa situação de kick perfurando, a sequência básica correta é:",alts:["Fechar BOP → parar bombas → levantar coluna","Parar rotação, levantar ao ponto de fechamento, parar bombas, flow check/fechar","Aumentar vazão e observar","Bombear pílula pesada primeiro"],correct:1,exp:"Espaça a coluna (spacing out), para bombas e fecha. Cada segundo aberto = mais influxo."},{q:"Hard shut-in significa fechar o poço:",alts:["Com o choke aberto","Com a linha do choke já fechada, direto no preventor","Só com a gaveta cega","Sem parar as bombas"],correct:1,exp:"Hard: choke fechado, fecha o BOP direto — minimiza o tempo aberto e o volume do influxo."},{q:"A principal vantagem do fechamento rápido é:",alts:["Menos desgaste do BOP","Influxo menor → pressões menores → controle mais fácil","Economia de fluido","Evita testes"],correct:1,exp:"O volume do kick define a dificuldade de tudo que vem depois. Fechou rápido, problema pequeno."},{q:"Após fechar o poço, deve-se registrar:",alts:["Somente SICP","SIDPP, SICP e ganho nos tanques (pit gain)","Temperatura do fluido","Rotação da broca"],correct:1,exp:"Os três números-chave do controle: pressões estabilizadas de coluna e anular + volume do influxo."},{q:"O SIDPP é mais confiável que o SICP para cálculos porque:",alts:["É sempre maior","O interior da coluna contém fluido limpo de densidade conhecida","O manômetro é melhor","O anular não tem pressão"],correct:1,exp:"O influxo está no anular e contamina o SICP. A coluna é uma 'régua' limpa até o fundo."},{q:"SICP maior que SIDPP indica normalmente:",alts:["Erro de leitura","Influxo mais leve que o fluido ocupando o anular","BOP com vazamento","Poço morto"],correct:1,exp:"O influxo leve rouba hidrostática do anular — a superfície compensa com mais pressão."},{q:"Fluido de 11 lb/gal a 2.000 m segura uma formação de 3.400 psi?",alts:["Sim, com folga de mais de 300 psi","Não, faltam 340 psi","Sim, exatamente","Não, faltam 1.000 psi"],correct:0,exp:"PH = 0,17 × 11 × 2.000 = 3.740 psi > 3.400 psi. Overbalance de 340 psi."},{q:"Perda de circulação pode CAUSAR kick porque:",alts:["O fluido esquenta","O nível do poço cai e a hidrostática diminui","A broca trava","O BOP abre"],correct:1,exp:"Perdeu fluido → nível cai → PH cai → outra zona pode fluir. Perda e kick andam juntos (pior cenário)."},{q:"Gás raso é tratado de forma diferente porque:",alts:["É menos perigoso","Não há sapata/BOP para conter fechamento com segurança — usa-se o diverter","O gás raso não expande","Fica longe da sonda"],correct:1,exp:"Fechar poço raso pode fraturar e trazer o fluxo por fora (cratera). Desvia-se o fluxo e protege-se o pessoal."},{q:"A válvula de segurança FOSV deve estar na mesa durante a manobra porque:",alts:["É exigência de limpeza","Em fluxo pela coluna, ela é instalada e fechada rapidamente","Serve de backup do trip tank","Mede pressão"],correct:1,exp:"Kick pela coluna na manobra: rosqueia a FOSV (aberta, para vencer o fluxo), fecha, e o interior está contido."},{q:"Corte por gás no retorno reduz pouco a pressão de fundo porque:",alts:["O gás pesa igual ao fluido","A maior expansão do gás ocorre perto da superfície, onde afeta pouco a coluna total","O sensor erra","O gás sai pelo degasser"],correct:1,exp:"O gás só ocupa volume grande no topo. Ainda assim é ALERTA — investigar a origem sempre."},{q:"O degasser serve para:",alts:["Separar cascalho","Remover gás do fluido antes de rebombeá-lo","Resfriar o fluido","Medir densidade"],correct:1,exp:"Rebombear fluido gaseificado = descer hidrostática menor no poço. O degasser quebra esse ciclo."},{q:"'Pipe light' no stripping significa:",alts:["Coluna leve demais para descer contra a pressão do poço","Tubo de alumínio","Coluna sem BHA","Iluminação da mesa"],correct:0,exp:"Quando a força da pressão × área supera o peso, a coluna tende a ser expulsa — daí a unidade de snubbing."},{q:"O objetivo final de qualquer método de controle é:",alts:["Salvar o fluido","Manter a pressão de fundo constante e ligeiramente acima da formação","Esvaziar o anular","Testar o choke"],correct:1,exp:"BHP constante ≥ pressão de poros: não deixa entrar mais influxo nem fratura a formação. Todo método serve a isso."}]},{level:"Driller",num:4,questions:[{q:"PL de 30 spm = 620 psi. Poço fechado com SIDPP = 480 psi. O ICP é:",alts:["620 psi","480 psi","1.100 psi","140 psi"],correct:2,exp:"ICP = PL + SIDPP = 620 + 480 = 1.100 psi. É o alvo ao estabilizar a vazão de matar."},{q:"Fluido atual 10 lb/gal, SIDPP 510 psi, TVD 3.000 m. A KMW é:",alts:["11,0 lb/gal","10,5 lb/gal","12,0 lb/gal","11,5 lb/gal"],correct:0,exp:"KMW = 10 + 510/(0,17×3.000) = 10 + 510/510 = 11,0 lb/gal."},{q:"PL 700 psi, densidade atual 10, KMW 11,2. O FCP é:",alts:["700 psi","784 psi","625 psi","1.100 psi"],correct:1,exp:"FCP = PL × (KMW/atual) = 700 × 1,12 = 784 psi."},{q:"ICP 1.200 psi, FCP 800 psi, 1.000 strokes da superfície ao bit. A queda programada por 100 strokes é:",alts:["40 psi","400 psi","80 psi","20 psi"],correct:0,exp:"(1.200−800)/1.000 × 100 = 40 psi a cada 100 stk. Essa é a tabela da kill sheet."},{q:"No Wait & Weight, após o fluido de matar chegar ao bit, mantém-se:",alts:["ICP constante","FCP constante até completar o anular","SICP zero","Vazão dobrada"],correct:1,exp:"Da superfície ao bit: queda ICP→FCP. Do bit até encher o anular: FCP constante."},{q:"Na 1ª circulação do Driller's Method, mantém-se constante:",alts:["A pressão do anular","A pressão da coluna = ICP, na vazão de matar","O SICP em zero","A densidade"],correct:1,exp:"1ª circulação: fluido original, coluna constante em ICP → BHP constante enquanto o influxo sai."},{q:"A troca do controle 'pela coluna' para 'pelo choke visando anular' NÃO existe; o operador do choke na prática:",alts:["Controla o SICP diretamente o tempo todo","Ajusta o choke olhando a pressão da COLUNA (com atraso de propagação)","Ignora manômetros","Fecha tudo se subir"],correct:1,exp:"O choke é a mão; o manômetro da coluna é o olho. Lembre o atraso: cada ajuste demora segundos para aparecer (tempo de propagação)."},{q:"Ao ligar a bomba de matar (bring pump to speed), o correto é:",alts:["Subir a vazão de uma vez segurando SIDPP","Subir devagar mantendo o SICP constante com o choke","Abrir o choke todo e ligar","Manter o poço fechado e bombear"],correct:1,exp:"Na partida, segura-se a CASING pressure constante — quando a vazão de matar estabiliza, a coluna deve mostrar ~ICP."},{q:"Durante a circulação, a pressão sobe do nada em coluna E anular juntas. Causa provável:",alts:["Washout no choke","Entupimento (plugging) do choke","Gás saindo","Bomba cavitando"],correct:1,exp:"Choke entupido restringe a saída → pressão sobe nos dois lados. Ação: trocar para o choke reserva."},{q:"Durante a circulação, as pressões caem lentamente nos dois manômetros. Causa provável:",alts:["Washout (erosão) do choke","Plugging","KMW alta demais","Migração de gás"],correct:0,exp:"Choke erodido deixa passar mais do que deveria → pressões caem. Também se resolve indo ao choke reserva."},{q:"Bomba de matar falha no meio da circulação. Ação imediata:",alts:["Abrir o choke e esperar","Fechar o choke/poço e reavaliar (voltar à condição estática segura)","Continuar com a outra bomba sem ajuste","Sangrar pressão da coluna"],correct:1,exp:"Sem bomba não há controle dinâmico: fecha, estabiliza, e recomeça o procedimento de partida com a bomba reserva."},{q:"SIDPP = 0 psi e SICP = 400 psi após fechar. Interpretação provável:",alts:["Poço morto","O influxo pode estar acima do bit / coluna vazia de kick — atenção, cenário atípico","Manômetro quebrado","KMW já correta"],correct:1,exp:"SIDPP zero com SICP alto foge do padrão: pode ser float segurando, influxo acima do bit ou coluna cheia de fluido pesado. Investigar antes de calcular."},{q:"Com float valve na coluna, o SIDPP é obtido:",alts:["Lendo direto o manômetro","Bombeando devagar até a pressão 'quebrar' — esse valor revela o SIDPP","Somando SICP + PL","Não é possível"],correct:1,exp:"Bombeio lento contra o float: quando a válvula abre, a pressão de bombeio ≈ SIDPP (método da quebra)."},{q:"Pit gain de 12 bbl, capacidade anular no fundo 0,06 bbl/m. Altura do influxo:",alts:["100 m","200 m","72 m","120 m"],correct:1,exp:"h = 12/0,06 = 200 m de influxo ocupando o anular junto ao fundo."},{q:"Fluido 12 lb/gal (2,04 psi/m), SICP−SIDPP = 300 psi, altura do influxo 200 m. Gradiente do influxo:",alts:["1,5 psi/m — líquido","0,54 psi/m — gás","2,04 psi/m — fluido","0,3 psi/m — ar"],correct:1,exp:"grad = 2,04 − 300/200 = 2,04 − 1,5 = 0,54 psi/m → faixa de gás. Muda migração, expansão e urgência."},{q:"Assinatura clássica de migração de gás com poço fechado:",alts:["SIDPP sobe e SICP cai","SIDPP e SICP sobem juntas","Só o SICP sobe","Pressões estáveis"],correct:1,exp:"O gás sobe sem expandir e pressuriza o sistema TODO — os dois manômetros sobem juntos."},{q:"A resposta correta à migração com poço fechado (sem poder circular) é:",alts:["Esperar estabilizar","Método volumétrico: sangrar volumes calculados mantendo BHP","Bombear direto (bullhead) sempre","Abrir o poço e observar"],correct:1,exp:"Volumétrico troca volume por pressão: a cada margem de subida, sangra-se o volume equivalente — o gás expande de forma controlada."},{q:"No volumétrico, cada barril sangrado 'vale' em pressão:",alts:["1 psi sempre","A hidrostática do fluido correspondente àquele volume no anular","O valor do SICP","Nada"],correct:1,exp:"Pressão por bbl = gradiente do fluido ÷ capacidade do anular (psi/m ÷ bbl/m). É pura contabilidade hidrostática."},{q:"MAASP com LOT de 14,5 lb/gal eq., fluido atual 11, sapata a 1.500 m TVD:",alts:["893 psi","1.020 psi","595 psi","1.250 psi"],correct:0,exp:"MAASP = (14,5−11) × 0,17 × 1.500 = 3,5 × 255 = 892,5 psi."},{q:"Ao PESAR o fluido de 11 para 12 lb/gal, a MAASP:",alts:["Aumenta","Diminui","Não muda","Zera"],correct:1,exp:"Fluido mais pesado já 'usa' parte da margem da sapata: MAASP = (LOT − atual) × 0,17 × TVDsapata cai."},{q:"SICP se aproximando da MAASP com gás ainda abaixo da sapata exige:",alts:["Ignorar, o LOT tem margem","Decisão imediata — risco real de fratura na sapata","Aumentar vazão de matar","Desligar manômetro"],correct:1,exp:"Estourar a MAASP = fraturar a sapata = perda + kick simultâneos ou blowout subterrâneo. Alerta máximo."},{q:"Spacing out antes de fechar serve para:",alts:["Ganhar tempo","Garantir tubo liso nas gavetas e conexão acessível na mesa","Aliviar o peso no gancho","Testar o topdrive"],correct:1,exp:"Fechar gaveta em tool joint danifica a vedação; a conexão na mesa permite instalar FOSV/inside BOP."},{q:"No kick em manobra com coluna parcialmente descida, após fechar o poço a estratégia clássica é:",alts:["Circular por onde está","Retornar ao fundo por stripping controlando volumes","Retirar tudo e descer de novo","Bullheading imediato"],correct:1,exp:"Sem estar no fundo, o kill é ineficiente. Stripping (anular com pressão reduzida + contabilidade de volumes) leva a coluna de volta."},{q:"No stripping, ao descer cada tubo o volume sangrado no trip tank deve ser:",alts:["Zero","O deslocamento do tubo (aço + capacidade interna se fechado)","O dobro do tubo","Igual ao pit gain"],correct:1,exp:"Poço fechado: o que a coluna desloca tem que sair pelo choke — medido, anotado, conferido."},{q:"A vazão de matar (kill rate) é escolhida baixa principalmente para:",alts:["Economizar diesel","Dar tempo de reação no choke e não sobrecarregar o separador de gás","Não gastar a broca","Esfriar o BOP"],correct:1,exp:"Vazão lenta = ajustes controláveis + gás chegando à superfície numa taxa que o poor boy aguenta."},{q:"O poor boy degasser 'afogado' (vazão de gás acima da capacidade) provoca:",alts:["Melhor separação","Gás invadindo a linha de fluido e chegando aos tanques/área da sonda","Aumento do SICP","Nada"],correct:1,exp:"Separador afogado é emergência: gás no piso. Prevenção: vazão de matar adequada e monitorar a pressão no separador."},{q:"Kick com H2S confirmado muda o plano porque:",alts:["O gás fica mais leve","Circular o influxo até a superfície vira risco à vida — considerar bullheading","O SIDPP dobra","Nada muda"],correct:1,exp:"H2S letal na superfície: proteger pessoal, respiradores, e avaliar mandar o influxo de volta (bullheading) em vez de circular."},{q:"Depois de circular a KMW e abrir o poço, a confirmação de poço morto é:",alts:["SICP = SIDPP","Flow check negativo e pressões zero com poço aberto","Manômetros iguais a PL","Densidade no retorno igual à KMW"],correct:1,exp:"Poço morto = estático, sem fluxo, hidrostática segurando sozinha. Flow check é a prova final."},{q:"A leitura das pressões de fechamento deve esperar a estabilização, EXCETO quando:",alts:["O supervisor tiver pressa","Há migração de gás evidente — usa-se leitura precoce/técnicas específicas","O manômetro for digital","O kick for de água"],correct:1,exp:"Com gás migrando, esperar demais infla as leituras. Anota-se a tendência e aplica-se julgamento (ex.: leitura no ponto de inflexão)."},{q:"Numa kill sheet, usar TVD errado (MD no lugar de TVD) num poço direcional causa:",alts:["Nada, dá igual","KMW e pressões superestimadas — risco de fraturar ou overkill","KMW menor","Só erro no volume"],correct:1,exp:"Pressão é função da VERTICAL. MD > TVD infla os cálculos — erro clássico com consequências reais."}]},{level:"Supervisão",num:4,questions:[{q:"Kick tolerance é, em essência:",alts:["O volume do trip tank","O maior influxo que ainda pode ser fechado e circulado sem fraturar a sapata","A margem do LOT em psi","O limite do separador"],correct:1,exp:"Integra LOT, densidades, geometria e natureza do influxo. Decide profundidade de revestimento e limites operacionais."},{q:"Kick tolerance MENOR que o volume mínimo detectável pela instrumentação da sonda significa:",alts:["Operação normal","Não avançar sem mitigação — qualquer kick real já nasce incontrolável","Basta treinar a equipe","Reduzir a vazão"],correct:1,exp:"Se o menor kick detectável já fratura a sapata, o plano do poço precisa mudar (revestimento, densidade, monitoramento)."},{q:"A decisão Driller's × Wait & Weight sob gás migrando rápido e mistura lenta pende para:",alts:["W&W sempre","Driller's — começa já, sem esperar a mistura","Volumétrico","Bullheading"],correct:1,exp:"Migração não espera balança de barita: circular imediatamente com fluido original controla o BHP desde já."},{q:"A vantagem técnica do W&W sobre o Driller's em kicks de gás é:",alts:["Ser mais rápido de iniciar","Menores pressões no anular/sapata na maioria dos cenários","Não precisar de kill sheet","Usar menos fluido"],correct:1,exp:"Com o fluido pesado já subindo pelo anular atrás do gás, a pressão exigida na superfície (e na sapata) é menor."},{q:"Bullheading é aceito como plano quando:",alts:["O choke entope","Circular é inaceitável (H2S, gás no riser, influxo acima do bit) e a formação aceita injeção","A KMW não fecha","Sempre que o kick for grande"],correct:1,exp:"Empurrar o influxo de volta tem riscos (fraturar zona rasa), mas vence quando trazer o influxo à superfície é pior."},{q:"O maior risco do bullheading é:",alts:["Gastar fluido","Fraturar uma zona mais rasa e criar blowout subterrâneo","Danificar a bomba","Aumentar o SIDPP"],correct:1,exp:"A injeção procura o caminho mais fraco. Se for a sapata/zona rasa: fluxo interno descontrolado."},{q:"Tampão de barita (barite plug) é recurso para:",alts:["Melhorar o reboco","Perda + kick simultâneos ou fluxo interno — criar barreira de alta densidade que decanta e sela","Testes de BOP","Limpeza do poço"],correct:1,exp:"Cenário severo pede barreira física/hidrostática de emergência bombeada no ponto certo."},{q:"Em BOP submarino, a Choke Line Friction (CLF) não compensada faz o poço sentir:",alts:["Menos pressão","Pressão extra no anular/sapata durante a circulação","Nada","Só afeta a bomba"],correct:1,exp:"A perda de carga da choke line longa soma-se ao sistema — 'seguindo os números' ainda se pode fraturar."},{q:"A compensação prática da CLF é:",alts:["Reduzir a KMW","Monitorar a pressão pela kill line estática enquanto circula pelo choke","Dobrar a vazão","Ignorar abaixo de 500 m de lâmina"],correct:1,exp:"Linha sem fluxo não tem perda de carga: a kill line vira manômetro 'limpo' do anular no fundo do mar."},{q:"Gás no riser (acima do BOP submarino) é crítico porque:",alts:["O riser aguenta pressão alta","Acima do BOP não há barreira — não dá para 'fechar o riser'","O gás dissolve o fluido","O diverter não funciona no mar"],correct:1,exp:"Resposta: alinhar o diverter, desviar overboard, proteger o pessoal e seguir o plano específico de gás no riser."},{q:"Em águas profundas, o gás pode chegar ao riser SEM alarme prévio porque:",alts:["Os sensores falham sempre","Gás dissolvido no fluido sintético sai de solução de repente acima do BOP","O riser é transparente","A lâmina d'água esconde"],correct:1,exp:"Gás em solução não aparece no pit gain; ao despressurizar subindo, 'ferve' de uma vez — cenário traiçoeiro típico de fluido sintético."},{q:"Hidratos em choke/kill lines se formam por:",alts:["Calor + pressão baixa","Gás + água livre em alta pressão e baixa temperatura (leito marinho)","Excesso de barita","Vibração"],correct:1,exp:"Prevenção: inibidores (glicol), minimizar água livre. Hidrato pode travar linhas e funções do BOP na pior hora."},{q:"A EDS (Emergency Disconnect Sequence) numa sonda DP faz, em ordem:",alts:["Desconecta e depois fecha o poço","Fecha shear ram (cortando a coluna), sela o poço e desconecta o LMRP","Desliga os thrusters","Aciona o diverter"],correct:1,exp:"O poço fica seguro com o BOP inferior fechado; a sonda se liberta pelo LMRP. Gatilhos pré-definidos, sem hesitação."},{q:"Drive-off difere de drift-off porque:",alts:["É mais lento","É a propulsão levando a sonda na direção errada (falha ativa), não deriva por blackout","Acontece só ancorado","Não exige EDS"],correct:1,exp:"Drive-off: sistema empurra errado. Drift-off: perdeu propulsão e deriva. Ambos consomem o tempo até a desconexão."},{q:"Os 'círculos de alerta' de posição em DP são calculados por poço porque:",alts:["É padrão fixo da frota","O tempo disponível até a EDS depende de lâmina d'água, riser e condições — cada poço tem sua geometria","O cliente escolhe","Depende só do clima"],correct:1,exp:"Amarelo/vermelho refletem o tempo físico de reação daquele poço específico. Genérico aqui mata."},{q:"O teste de pressão negativo aprova a barreira quando:",alts:["A pressão sobe um pouco e estabiliza","Não há fluxo nem ganho de pressão pelos critérios ESCRITOS previamente","O volume devolvido é pequeno","A equipe concorda verbalmente"],correct:1,exp:"Critérios definidos ANTES do teste. Interpretação 'flexível' de teste negativo foi peça central em Macondo."},{q:"'Normalização do desvio' descreve:",alts:["Calibração de sensores","Anomalias repetidas sendo aceitas como normais porque 'nunca deu problema'","Ajuste da kill sheet","Desvio direcional do poço"],correct:1,exp:"O acidente grande raramente é surpresa: é o pequeno desvio tolerado mil vezes. Antídoto: critérios escritos + autoridade de parada."},{q:"Stop work authority só funciona de verdade quando:",alts:["Está no manual","A liderança reage bem a quem para o trabalho — mesmo em alarme falso","É usada raramente","Vem com punição para excessos"],correct:1,exp:"Uma retaliação por parada 'errada' ensina todos a se calarem. Cultura se mede na reação da liderança."},{q:"Em SIMOPS, a análise de barreiras deve garantir que:",alts:["Cada equipe tenha rádio","Nenhuma combinação de atividades deixe o poço com menos de duas barreiras","O cronograma não atrase","A manutenção espere o fim do poço"],correct:1,exp:"Ex.: teste de BOP (barreira secundária indisponível) simultâneo a operação que ameace a primária = combinação proibida."},{q:"No workover, o diagrama de barreiras difere da perfuração porque:",alts:["Não há barreiras","Entram packers, tampões, BPV e DHSV — e o poço pode estar vivo, com fluido sem reboco","O BOP não é usado","A salmoura é barreira secundária"],correct:1,exp:"Copiar o plano da perfuração para intervenção é erro: cada operação tem seu conjunto de barreiras e seus modos de falha."},{q:"Fluido de completação (salmoura limpa) muda o controle porque:",alts:["Não exerce hidrostática","Sem reboco, perde para a formação com mais facilidade — nível cai rápido","É mais pesado sempre","Dispensa flow check"],correct:1,exp:"Sem reboco a perda é franca: monitoramento de nível e válvulas de segurança ganham ainda mais peso."},{q:"Durante o kill, o anular na sapata vive seu pior momento quando:",alts:["O fluido de matar chega ao bit","O topo do gás passa/está logo abaixo da sapata expandindo","O gás chega à superfície","A bomba desliga"],correct:1,exp:"Perfil de pressão na sapata tem pico com o gás próximo dela. Comparar continuamente SICP × MAASP nessa janela."},{q:"Numa circulação de kill, o supervisor percebe SICP muito acima do previsto com gás longe da superfície. Melhor postura:",alts:["Acelerar a bomba para acabar logo","Parar/fechar, reavaliar dados (segundo kick? erro de kill sheet? plugging?) antes de prosseguir","Abrir o choke todo","Trocar de método no meio"],correct:1,exp:"Números fora do modelo = modelo errado ou problema novo. Condição estática segura primeiro, diagnóstico depois."},{q:"Segundo kick DURANTE o kill (nível caiu por perda na sapata) caracteriza:",alts:["Operação normal","Perda + kick simultâneos — cenário de contingência (tampão, LCM, decisões de emergência)","Só erro de leitura","Fim do poço"],correct:1,exp:"O pior cenário do controle: hidrostática não se sustenta. Requer plano de contingência pré-estudado, não improviso."},{q:"A auditoria de well control mais valiosa verifica:",alts:["Certificados em dia apenas","Prática real: drills cronometrados, PL atualizada, kill sheets preenchidas, trip sheets vivas","O nome no organograma","A pintura do BOP"],correct:1,exp:"Papel aceita tudo. A prontidão aparece no cronômetro do pit drill e na trip sheet preenchida em tempo real."},{q:"Pit drill mede primariamente:",alts:["A força física da equipe","Tempo de detecção e reação a um ganho de volume simulado","A vazão das bombas","A calibração dos tanques"],correct:1,exp:"Detecção rápida é o multiplicador de tudo. O drill treina o reflexo: viu ganho → flow check → fechou."},{q:"Ao assumir o poço de outro turno, o supervisor deve exigir na passagem:",alts:["Só o bom dia","Estado das barreiras, tendências (pit, gás, torque), PL vigente, restrições e pendências","O relatório do mês","A lista de sobressalentes"],correct:1,exp:"Kicks adoram troca de turno: contexto perdido = sinal ignorado. Passagem estruturada é barreira organizacional."},{q:"Fluido 13 lb/gal, sapata a 2.000 m TVD, LOT 15,8 eq. Kick fecha com SICP = 900 psi. Situação:",alts:["Confortável, MAASP ≈ 952 psi mas sem margem para o gás subir — atenção máxima","Tranquila, margem de 500 psi","MAASP já estourada","Impossível calcular"],correct:0,exp:"MAASP = (15,8−13)×0,17×2.000 = 952 psi. SICP 900 já come 95% — e o gás ainda vai subir. Decisão de supervisão AGORA."},{q:"A lição central de Macondo para o dia a dia é:",alts:["BOPs precisam de mais gavetas","Sinais ambíguos interpretados com otimismo + barreiras não verificadas = catástrofe","Águas profundas são impossíveis","Cimento resolve tudo"],correct:1,exp:"Teste negativo 'explicado', monitoramento relaxado, pressa: cada elo fraco era evitável. Verificação independente salva."},{q:"O documento que deve estar SEMPRE atualizado antes do kick (não durante) é:",alts:["O relatório diário","Kill sheet pré-preenchida com PL, volumes e MAASP vigentes","A ata de reunião","O plano de içamento"],correct:1,exp:"No kick não há tempo de medir PL. Dados pré-kick atualizados a cada turno/mudança são a metade silenciosa do controle."}]}],cards:{Introdutório:[{f:"O que é um kick?",v:"Entrada indesejada de fluido da formação para o poço."},{f:"O que é um blowout?",v:"Fluxo descontrolado da formação para a superfície ou outra formação."},{f:"Barreira primária do poço",v:"Coluna hidrostática do fluido de perfuração."},{f:"Barreira secundária do poço",v:"Conjunto BOP e equipamentos associados."},{f:"Fórmula da pressão hidrostática",v:"PH = 0,17 × densidade (lb/gal) × TVD (m)."},{f:"PH usa TVD ou MD?",v:"TVD (profundidade vertical)."},{f:"Causa mais comum de kick",v:"Não completar o poço com fluido na manobra."},{f:"O que é swab?",v:"Efeito pistão ao puxar a coluna, que reduz a pressão no fundo."},{f:"Sinal positivo de kick nº 1",v:"Aumento da vazão de retorno sem mudar a bomba."},{f:"Sinal positivo de kick nº 2",v:"Ganho de volume nos tanques (pit gain)."},{f:"O que é flow check?",v:"Parar bombas e observar se o poço flui."},{f:"O que é drilling break?",v:"Aumento brusco da taxa de penetração (alerta de kick)."},{f:"BOP anular fecha em quê?",v:"Qualquer diâmetro e até poço aberto."},{f:"Gaveta cega serve para",v:"Fechar o poço sem coluna dentro."},{f:"Gaveta cisalhante serve para",v:"Cortar a coluna e selar o poço (último recurso)."},{f:"O que aciona o BOP sem energia da sonda?",v:"Acumulador (unidade Koomey)."},{f:"Função do choke manifold",v:"Circular o kick com pressão controlada."},{f:"Função do trip tank",v:"Monitorar volumes do poço na manobra com precisão."},{f:"O que é overbalance?",v:"PH maior que a pressão de poros."},{f:"O que é underbalance?",v:"PH menor que a pressão de poros (risco de influxo)."},{f:"O que é ECD?",v:"Densidade equivalente de circulação (hidrostática + atrito anular)."},{f:'Quando a ECD "some"?',v:"Ao desligar as bombas (momento clássico de kick)."},{f:"O que é pressão de poros?",v:"Pressão dos fluidos contidos na rocha."},{f:"O que é pressão de fratura?",v:"Pressão que quebra a rocha e causa perda."},{f:"Influxo mais perigoso",v:"Gás (expande ao subir)."},{f:"O que mede a balança de lama?",v:"Densidade do fluido."},{f:"Poço fluindo com bombas paradas significa",v:"Kick em andamento: fechar o poço."},{f:"O que é o degasser?",v:"Equipamento que retira gás do fluido de retorno."},{f:"Válvula de segurança de manobra (FOSV) serve para",v:"Fechar a coluna se o poço fluir por dentro dela na manobra."},{f:"Regra das barreiras",v:"Sempre duas barreiras testadas e independentes."},{f:"Gradiente de pressão do fluido (psi/m)",v:"0,17 × densidade em lb/gal."},{f:"Densidade da água doce",v:"8,33 lb/gal."},{f:"1 bbl equivale a",v:"159 litros."},{f:"Lei de Boyle aplicada ao kick",v:"P1×V1 = P2×V2: metade da pressão, dobro do volume."},{f:"Gás no fundo, subindo em poço aberto",v:"Expande, acelera e expulsa fluido (bola de neve)."},{f:"O que é surge?",v:"Aumento de pressão ao descer a coluna rápido (pode fraturar)."},{f:"O que é slug?",v:'Colchão pesado bombeado antes da manobra para "secar" o interior da coluna.'},{f:"O que é trip sheet?",v:"Planilha que compara volume teórico × real na manobra."},{f:"Flow check antes da manobra serve para",v:"Confirmar poço estável antes de retirar a coluna."},{f:"Quem cuida dos tanques e da barita num kick?",v:"Torrista (derrickman)."},{f:"Dono dos primeiros 60 segundos do kick",v:"Sondador (driller)."},{f:"Stop work authority",v:"Qualquer membro pode parar o trabalho diante de risco."},{f:"Densidade equivalente de uma pressão",v:"Pressão ÷ (0,17 × TVD)."},{f:"Gás dissolvido em fluido base óleo",v:'Pode "flashear" perto da superfície com pouco aviso.'},{f:"Sinal de kick descendo coluna",v:"Poço devolve mais fluido que o volume de aço descido."},{f:"Diferença entre kick e blowout",v:"Kick é controlável; blowout é fluxo descontrolado."},{f:"Duas funções do fluido além da PH",v:"Carrear cascalho e resfriar/lubrificar a broca."},{f:"O que o LOT mede?",v:"Quanto a formação na sapata aguenta (densidade equivalente máxima)."},{f:"Válvula DHSV é típica de",v:"Poço em produção/completação (segurança de subsuperfície)."},{f:"Barreira primária na manobra",v:"Continua sendo a coluna de fluido (mantida pelo trip tank)."},{f:"Fechar o poço rápido limita",v:"O volume do influxo e as pressões do controle."},{f:"O anular fecha sobre o kelly?",v:"Sim, o anular veda formas irregulares."},{f:"Pressão de 3.400 psi a 2.000 m equivale a densidade de",v:"10 lb/gal."},{f:"Kelly cock inferior serve para",v:"Fechar a coluna e permitir descone o injetado."},{f:"Stripping com gás migrando exige",v:"Combinar stripping com controle volumétrico."},{f:"Como medir a CLF?",v:"Circular pela choke line nas vazões de matar e registrar a perda."},{f:"Drive-off × drift-off em DP",v:"Propulsão empurrando errado × deriva por falha/blackout."},{f:"Gatilhos de EDS devem ser",v:"Pré-definidos, treinados e sem ambiguidade."},{f:"Hidrato dentro do BOP pode",v:"Travar funções e bloquear linhas — inibir e monitorar."},{f:"Kick tolerance é calculada para",v:"Cada fase, antes de perfurar o trecho."},{f:"Detecção mínima confiável da sonda",v:"Menor influxo que a instrumentação percebe com segurança."},{f:"Critério de aceitação escrito evita",v:"Interpretação elástica de teste sob pressão de cronograma."},{f:"Prioridade em qualquer evento",v:"Pessoas, meio ambiente, instalação/poço."},{f:"Auditoria do acumulador verifica",v:"Pré-carga, volumes úteis, tempos de fechamento e redundância."},{f:"Limitações da shear ram",v:"Não corta tool joint/BHA e exige pressão adequada."},{f:"Gás no riser: primeira ação",v:"Alinhar o diverter (overboard) e proteger o pessoal."},{f:"Documentação pós-kick inclui",v:"Pressões, volumes, horários, decisões e lições."},{f:"Por que a kill rate protege a sapata?",v:"Menor ECD e mais tempo de reação no choke."},{f:"Cultura de questionamento",v:"Qualquer um pode desafiar leitura/decisão sem punição."},{f:"Kick tolerance",v:"Maior influxo fechável e circulável sem fraturar a sapata. Decide revestimento e limites."},{f:"Kick tolerance < mínimo detectável",v:"NÃO avançar sem mitigação — qualquer kick real já nasce grande demais."},{f:"Pior momento para a sapata no kill",v:"Topo do gás passando/logo abaixo dela. Vigiar SICP × MAASP nessa janela."},{f:"Pressões fora do previsto no kill",v:"Fechar, estabilizar, diagnosticar (2º kick? kill sheet errada? plugging?). Nunca 'empurrar'."},{f:"Perda + kick simultâneos",v:"Pior cenário: hidrostática não se sustenta. Contingência: LCM, tampão de barita, decisões de emergência."},{f:"Tampão de barita",v:"Barreira de alta densidade bombeada que decanta e sela. Alternativa: gunk plug."},{f:"Bullheading — quando",v:"H2S, gás no riser, influxo acima do bit, impossibilidade de circular — e formação que aceite."},{f:"Bullheading — risco central",v:"Fraturar zona mais rasa → blowout subterrâneo. Pressão de injeção limitada e monitorada."},{f:"CLF (Choke Line Friction)",v:"Perda de carga na choke line submarina. Não compensada = pressão extra na sapata."},{f:"Compensação da CLF",v:"Monitorar pela KILL LINE estática (sem fluxo = sem perda) enquanto circula pelo choke."},{f:"Gás no riser",v:"Acima do BOP não há barreira: diverter overboard + plano específico + proteger pessoal."},{f:"Gás dissolvido (fluido sintético)",v:"Não aparece no pit gain; sai de solução de repente acima do BOP. Traiçoeiro."},{f:"Hidrato — receita",v:"Gás + água livre + alta pressão + baixa temperatura (leito marinho)."},{f:"Hidrato — prevenção",v:"Glicol/inibidores nas linhas, minimizar água livre. Pode travar BOP e linhas."},{f:"LMRP",v:"Parte superior do BOP submarino. Na emergência, desconecta e libera a sonda."},{f:"EDS — sequência",v:"Fecha shear ram → corta coluna → sela poço → desconecta LMRP."},{f:"Drive-off × drift-off",v:"Drive-off: propulsão empurra errado. Drift-off: deriva por blackout."},{f:"Círculos de alerta DP",v:"Calculados POR POÇO: tempo físico até a EDS depende de lâmina e riser."},{f:"Teste de pressão negativo",v:"Reduz hidrostática e observa fluxo/pressão. Aprovação SÓ por critérios escritos prévios."},{f:"Macondo em uma linha",v:"Sinais ambíguos + otimismo + barreiras não verificadas = catástrofe evitável."},{f:"Normalização do desvio",v:"Anomalia repetida vira 'normal' até o dia em que não é. Antídoto: critérios escritos."},{f:"Stop work authority real",v:"Se mede pela reação da liderança a quem parou — inclusive em alarme falso."},{f:"SIMOPS — regra de ouro",v:"Nenhuma combinação de atividades pode deixar o poço com < 2 barreiras."},{f:"Exemplo SIMOPS proibido",v:"Teste de BOP (secundária fora) junto com operação que ameace a primária."},{f:"Workover — o que muda",v:"Poço possivelmente vivo, salmoura sem reboco, barreiras: packer, tampão, BPV, DHSV."},{f:"BPV",v:"Válvula de retenção no suspensor: barreira interna ao trocar BOP/árvore."},{f:"DHSV",v:"Válvula de segurança de subsuperfície fail-safe do poço produtor."},{f:"Salmoura sem reboco",v:"Perda franca para a formação: nível cai rápido — monitoramento redobrado."},{f:"Kill sheet pré-preenchida",v:"PL, volumes e MAASP atualizados ANTES do kick, a cada turno. No kick não há tempo."},{f:"Passagem de turno estruturada",v:"Barreiras, tendências, PL vigente, restrições, pendências. Kicks adoram troca de turno."},{f:"Pit drill mede",v:"Tempo de detecção + reação a ganho simulado. O reflexo que salva."},{f:"Trip drill",v:"Simula kick em manobra: FOSV, fechamento, contabilidade do trip tank."},{f:"Auditoria que vale",v:"Prática real: drills cronometrados, PL fresca, kill sheet viva, trip sheet em tempo real."},{f:"Escolha do método — 3 fatores",v:"Migração do gás, logística de mistura, pressões previstas na sapata."},{f:"Volumétrico + stripping",v:"Rodam juntos ao retornar ao fundo com gás migrando: dois controles simultâneos."},{f:"MAASP dinâmica",v:"Recalcular a CADA mudança de densidade. MAASP de ontem não vale hoje."},{f:"Kick tolerance e revestimento",v:"KT insuficiente adianta a descida do revestimento — decisão de projeto, não de coragem."},{f:"Duas perguntas antes de qualquer plano",v:"O que segura o poço AGORA? O que segura se isso falhar?"},{f:"Cultura × procedimento",v:"Procedimento diz o que fazer; cultura decide se será feito às 3h da manhã."},{f:"Papel do supervisor no kick",v:"Não operar o choke: enxergar o todo — MAASP, separador, pessoal, plano B."}]},chapters:{Introdutório:[{t:"Capítulo 1.1 — Pressões no poço",c:`Todo o controle de poço gira em torno de uma disputa de pressões: a pressão que a formação exerce para dentro do poço (pressão de poros) contra a pressão que o fluido de perfuração exerce para fora (pressão hidrostática).

A pressão hidrostática depende de apenas duas coisas: a densidade do fluido e a profundidade vertical (TVD). Não importa o caminho do poço (medido, MD), importa a altura vertical da coluna de fluido.

- PH = 0,17 × densidade (lb/gal) × TVD (m)
- Exemplo: fluido de 10 lb/gal a 2.000 m de TVD → PH = 0,17 × 10 × 2000 = 3.400 psi.

Conceitos-chave:
- Pressão de poros: pressão dos fluidos dentro da rocha.
- Pressão de fratura: pressão que a rocha aguenta antes de quebrar e absorver fluido.
- A janela operacional do fluido fica entre a pressão de poros e a de fratura.
- Overbalance: PH maior que a pressão de poros (situação normal e segura).
- Underbalance: PH menor que a pressão de poros → a formação pode invadir o poço.

A janela operacional é o espaço entre duas paredes: abaixo da pressão de poros o poço flui (kick); acima da pressão de fratura o poço engole fluido (perda). Todo o planejamento do fluido vive nesse corredor — e em formações difíceis o corredor pode ter menos de 0,5 lb/gal de largura, exigindo controle fino de densidade e de ECD.

Com as bombas ligadas, o fundo do poço sente mais que a hidrostática: sente a ECD (densidade equivalente de circulação), que soma o atrito do anular. Por isso existe o kick clássico "ao desligar as bombas": o poço que estava equilibrado pela ECD perde o atrito e entra em underbalance na hora.

⚙ NA PRÁTICA — Antes de qualquer operação, pergunte: qual é a densidade mínima (poros) e a máxima (fratura/LOT) AGORA? Esses dois números mudam a cada formação nova perfurada e definem tudo: vazão, velocidade de manobra, margem de manobra no choke.

⚠ ERROS COMUNS — Usar MD em vez de TVD no cálculo de pressão (superestima tudo); esquecer que a ECD desaparece quando a bomba para; tratar a janela operacional como fixa quando ela muda a cada metro perfurado.`},{t:"Capítulo 1.2 — O que é kick e o que é blowout",c:`- Kick: entrada indesejada de fluido da formação (gás, óleo ou água salgada) para dentro do poço. É um influxo — ainda controlável.
- Blowout: o kick que não foi controlado e virou fluxo descontrolado da formação para a superfície (ou para outra formação, no caso do blowout subterrâneo).
Todo blowout começou como um kick que falhou em ser detectado ou controlado. Por isso a detecção rápida é a habilidade mais importante da equipe.

A diferença entre kick e blowout é uma só: controle. O kick é um evento operacional esperado e treinado — estatisticamente, poços exploratórios têm kicks com frequência, e a esmagadora maioria é fechada e circulada sem incidente. O blowout é o kick que atravessou todas as barreiras: detecção falhou, fechamento falhou ou o poço fraturou por dentro.

Existe ainda o blowout subterrâneo: o fluxo não chega à superfície, mas corre de uma formação para outra dentro do poço. É invisível da sonda e pode comprometer o poço e até aquíferos — geralmente nasce de uma sapata fraturada durante um controle mal conduzido.

⚙ NA PRÁTICA — O tempo médio entre o primeiro sinal e o fechamento é a métrica que separa um pit gain de 5 bbl de um de 30 bbl. Sondas de alto desempenho fecham em poucos minutos porque a equipe treina pit drills até o reflexo.

⚠ ERROS COMUNS — Achar que kick é "falha de alguém" (é evento operacional; a falha é não detectar); subestimar o blowout subterrâneo por não ser visível; comemorar o poço fechado e relaxar antes de circular o influxo (o trabalho só começou).`},{t:"Capítulo 1.3 — Causas de kick",c:`1. Não completar o poço com fluido durante a manobra (a mais comum): ao retirar tubos, o nível do fluido cai e a PH diminui.
2. Swab (pistoneio): puxar a coluna rápido demais "suga" a formação, reduzindo a pressão no fundo.
3. Densidade insuficiente do fluido para a pressão de poros da formação.
4. Perda de circulação: o fluido some para uma formação fraca, o nível cai e a PH despenca.
5. Corte do fluido por gás da formação perfurada.
6. Pressões anormais não previstas no projeto.

As causas de kick cabem em duas famílias: densidade insuficiente (a formação sempre foi mais forte — comum em exploração, onde a pressão de poros é estimativa) e queda da hidrostática por ação nossa: poço mal completado na manobra, swab, perda de circulação, corte por gás. A segunda família responde pela maioria dos kicks — e é 100% prevenível.

Zonas de pressão anormal merecem respeito especial: lentes de gás raso, zonas sobrepressurizadas por compactação ou falhas que comunicam formações profundas. O programa do poço marca as profundidades de risco, mas a natureza não leu o programa — vigilância redobrada em toda formação nova.

⚙ NA PRÁTICA — A trip sheet é o antídoto do kick de manobra: volume teórico versus volume real, seção a seção. Discrepância de poucos barris já é conversa de parar a manobra.

⚠ ERROS COMUNS — Confiar que "esse campo é conhecido" (poços vizinhos ≠ este poço); atribuir discrepância do trip tank a "erro de medida" sem verificar; não considerar que o slug bombeado antes da retirada muda a contabilidade inicial.`},{t:"Capítulo 1.4 — Sinais de kick",c:`Sinais positivos (indicam influxo em andamento):
- Aumento de vazão de retorno sem mudança na bomba.
- Ganho de volume nos tanques (pit gain).
- Poço fluindo com bombas desligadas (flow check positivo).
- Retorno de fluido na manobra maior que o volume de aço retirado.

Sinais de alerta (indicam que pode vir kick):
- Aumento brusco da taxa de penetração (drilling break).
- Diminuição da pressão de bombeio com aumento dos strokes.
- Fluido cortado por gás, água salgada ou cloretos aumentando.
- Torque e arraste anormais.

Diante de sinal positivo: fechar o poço primeiro, investigar depois. Segundos importam.

Sinais se dividem em positivos (o poço ESTÁ fluindo: fechar) e de alerta (algo mudou: investigar). Positivos: poço fluindo com bombas paradas, ganho de volume nos tanques, retorno maior que o bombeado. Alertas: drilling break, corte por gás, mudança de torque/arraste, variação de temperatura ou cloretos no retorno, tamanho/forma anormal dos cascalhos.

O detalhe que salva: sinais chegam em sequência, não isolados. Um drilling break seguido de leve aumento de retorno e cascalho diferente é praticamente um anúncio. A leitura combinada dos sinais — e não a espera pela "certeza" — é o que fecha o poço com 3 bbl em vez de 20.

⚙ NA PRÁTICA — Configure alarmes de pit em faixa apertada e trate TODO alarme como real até prova contrária. O custo de um flow check é 5 minutos; o custo de um kick grande é o poço.

⚠ ERROS COMUNS — Silenciar alarmes de pit em operações que "mexem com volume" (é justamente quando o kick se esconde); esperar "confirmar" um sinal positivo com o poço aberto; esquecer que transferências de fluido entre tanques mascaram ganho real.`},{t:"Capítulo 1.5 — Barreiras de segurança",c:`- Barreira primária: a coluna hidrostática do fluido de perfuração. É ela que segura a formação 24 h por dia.
- Barreira secundária: o conjunto BOP (Blowout Preventer) e os equipamentos associados. Só entra em ação quando a primária falha.
Regra de ouro da indústria: sempre duas barreiras testadas e independentes entre a formação e a superfície.

A filosofia de duas barreiras exige que cada barreira seja independente (a falha de uma não derruba a outra) e testada (barreira não verificada é esperança, não barreira). Primária: a coluna hidrostática. Secundária: o conjunto solidário BOP + cabeça de poço + linhas + choke manifold.

O conceito de envelope de barreira ajuda a pensar: desenhe o caminho que o fluido da formação teria que percorrer até a superfície. Cada elemento que bloqueia esse caminho é parte de uma barreira. Se existir UM caminho com menos de dois bloqueios testados, a operação está fora da política.

⚙ NA PRÁTICA — Antes de operações não rotineiras (teste de BOP, troca de equipamento, correr revestimento), desenhe o diagrama de barreiras do momento. É um rabisco de 5 minutos que já travou muita decisão ruim.

⚠ ERROS COMUNS — Contar a mesma barreira duas vezes (anular E gaveta são a MESMA barreira secundária); considerar o fluido barreira com o poço em perda; aceitar teste de barreira "quase passou" com justificativa verbal.`},{t:"Capítulo 1.6 — Equipamentos básicos de controle",c:`- BOP anular: fecha em volta de qualquer diâmetro (tubo, kelly, cabo) e até em poço aberto. É o primeiro a fechar na maioria dos casos.
- Gaveta de tubo (pipe ram): fecha em volta de um diâmetro específico de tubo.
- Gaveta cega (blind ram): fecha o poço sem tubo dentro.
- Gaveta cisalhante (shear ram): corta o tubo e sela o poço — último recurso.
- Choke manifold: conjunto de válvulas e chokes que permite circular o kick para fora com pressão controlada.
- Linhas de kill e choke: conectam o BOP ao manifold para bombear e retornar fluido com o poço fechado.
- Acumulador (unidade Koomey): garrafas de nitrogênio + fluido hidráulico que acionam o BOP mesmo sem energia da sonda.
- Válvulas de segurança da coluna: kelly cock, válvula de segurança de manobra (TIW/FOSV) e inside BOP (válvula de retenção).
- Degasser e separador atmosférico (poor boy): retiram o gás do fluido que retorna.

O BOP é um sistema, não uma peça: preventores (anular no topo, gavetas abaixo), saídas laterais com válvulas (HCR), linhas de kill e choke, choke manifold com chokes remoto/manual/reserva, acumulador com redundância de bombas, e painéis de acionamento em posições distintas da sonda. A falha de um elemento não pode cegar o conjunto.

A hierarquia típica de fechamento: anular primeiro (veda em qualquer diâmetro, mais tolerante), pipe ram como fechamento definitivo para o kill (vedação mecânica robusta no diâmetro certo), blind ram para poço vazio, shear ram como último recurso. Cada sonda tem seu procedimento — decore o SEU.

⚙ NA PRÁTICA — Conheça os tempos reais: quantos segundos o anular leva para fechar? E a gaveta? O teste de função semanal não é burocracia — é onde você aprende esses números antes de precisar deles.

⚠ ERROS COMUNS — Fechar gaveta sobre tool joint por não fazer spacing out; esquecer de abrir a HCR antes de precisar circular pelo choke; assumir que a shear ram corta qualquer coisa (não corta tool joint nem BHA).`},{t:"Capítulo 1.7 — Fluido de perfuração no controle de poço",c:`O fluido faz a PH, carrega cascalho, resfria a broca e transmite dados. Para o controle do poço, o que importa:
- Densidade: define a PH. Medida no balança de lama (mud balance).
- Nível dos tanques: o "medidor de kick" mais confiável da sonda.
- Trip tank: tanque pequeno e calibrado usado para monitorar o poço durante manobras — todo volume que entra ou sai é medido com precisão.

O fluido de perfuração é um projeto de engenharia: densidade para segurar a formação, reologia para carrear cascalho e limpar o poço, reboco para selar formações permeáveis, e estabilidade química para não reagir com folhelhos. No controle de poço, densidade e reboco são os protagonistas.

O reboco merece destaque: é ele que permite ao poço "aguentar" pressões diferenciais sem perder fluido continuamente para formações permeáveis. Fluidos limpos sem reboco (como salmoura de completação) perdem para a formação com facilidade — por isso completação tem seu próprio jogo de controle.

⚙ NA PRÁTICA — A balança de lama pressurizada é o instrumento que evita o erro clássico: fluido cortado por gás lê densidade falsa na balança comum. Medir densidade de entrada E de saída conta a história do poço.

⚠ ERROS COMUNS — Rebombear fluido gaseificado sem passar pelo degasser; confiar na densidade "do programa" sem medir a real; ignorar que temperatura alta reduz a densidade efetiva do fluido no fundo.`},{t:"Capítulo 1.8 — Conceitos para não confundir",c:`- TVD × MD: TVD é a profundidade vertical; MD é o comprimento perfurado. PH usa TVD.
- ECD (densidade equivalente de circulação): com as bombas ligadas, o atrito no anular soma pressão no fundo. ECD > densidade estática. Ao desligar as bombas essa pressão extra some — momento clássico de kick.
