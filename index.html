- Flow check: parar as bombas e observar o poço (no trip tank ou na linha de retorno) por tempo suficiente. Poço fluindo parado = kick.

Pares que confundem: pressão de poros × pressão de fratura (piso e teto da janela); TVD × MD (vertical para pressão, medido para volume); SIDPP × SICP (coluna limpa × anular contaminado); kick × blowout (controlado × descontrolado); swab × surge (puxar suga × descer comprime); hard × soft shut-in (choke fechado × aberto no fechamento).

Mais três que valem prova e valem campo: ECD × densidade estática (com bomba × sem bomba); LOT × FIT (leva a formação ao limite × testa até um alvo); barreira × equipamento (barreira é função testada, não ferro pintado).

⚙ NA PRÁTICA — Quando alguém falar um número de pressão, pergunte sempre: em que profundidade VERTICAL? Com bomba ligada ou desligada? Metade das confusões de rádio morrem nessas duas perguntas.

⚠ ERROS COMUNS — Somar psi com lb/gal sem converter; comparar SICP de agora com SIDPP de meia hora atrás; usar a palavra "barreira" para equipamento sem teste válido.`},{t:"Capítulo 1.9 — Unidades e conversões que caem em prova",c:`- Densidade: 1 lb/gal ≈ 0,12 g/cm³; água doce = 8,33 lb/gal; água do mar ≈ 8,5–8,6 lb/gal.
- Gradiente de pressão: gradiente (psi/m) = 0,17 × densidade (lb/gal). Fluido 10 lb/gal → 1,7 psi/m.
- Comprimento: 1 m = 3,281 ft. Volume: 1 bbl = 159 L = 0,159 m³.
- Pressão: 1 kgf/cm² ≈ 14,22 psi; 1 bar ≈ 14,5 psi.
- Regra prática: densidade equivalente de uma pressão em certa TVD: dens. equivalente = pressão ÷ (0,17 × TVD).

O sistema de campo brasileiro mistura unidades: profundidade em metros, densidade em lb/gal, pressão em psi. A constante 0,17 faz a ponte: PH (psi) = 0,17 × densidade (lb/gal) × TVD (m). O gradiente do fluido em psi/m é 0,17 × densidade.

Conversões que caem em prova e em rádio: 1 bbl = 159 L ≈ 0,159 m³; 1 m = 3,28 ft; 1 psi ≈ 0,0703 kgf/cm²; densidade da água doce ≈ 8,34 lb/gal (gradiente ≈ 1,42 psi/m). Capacidades de tubo/anular vêm em bbl/m nas tabelas da sonda.

⚙ NA PRÁTICA — Memorize três âncoras: água 8,34 lb/gal; 0,17 como constante mestre; e a capacidade do SEU anular no poço aberto atual (bbl/m). Com essas três, você estima quase tudo de cabeça no meio do evento.

⚠ ERROS COMUNS — Aplicar a constante 0,052 (sistema em pés) com profundidade em metros; confundir bbl/m com m/bbl nas tabelas; arredondar densidade para BAIXO em cálculo de kill (arredonda-se para cima).`},{t:"Capítulo 1.10 — Comportamento do gás no poço",c:`O gás obedece aproximadamente à lei P1×V1 = P2×V2 (Boyle): quando a pressão cai pela metade, o volume dobra. Consequências práticas:
- Um kick de gás pequeno no fundo vira um volume enorme perto da superfície.
- Em poço aberto, o gás acelera na subida, expulsa fluido e derruba a hidrostática — efeito bola de neve.
- Em poço fechado sem expansão, o gás sobe mantendo a pressão e "carrega" a pressão do fundo para cima, sobrecarregando a sapata e a superfície.
- Por isso todo método de controle deixa o gás expandir de forma controlada pelo choke.
- Gás pode entrar dissolvido em fluido sintético/base óleo e "aparecer" de repente perto da superfície (flash), com pouco aviso nos tanques.

O gás no poço obedece três leis práticas: expande quando a pressão cai (Boyle), migra por ser mais leve que o fluido, e transporta pressão quando impedido de expandir. A combinação das três explica quase todos os sustos: o kick "pequeno" que vira gigante perto da superfície, o poço fechado cujas pressões não param de subir, a sapata fraturada por gás que subiu selado.

Números para sentir o efeito: um influxo a 3.400 psi no fundo dobra de volume a 1.700 psi, quadruplica a 850 psi e vira ~20× o volume original perto da superfície. A maior parte da expansão acontece no último trecho — por isso o final da circulação de um kick de gás é o momento mais movimentado no choke e no separador.

⚙ NA PRÁTICA — Velocidades típicas de migração em fluido convencional ficam na casa de centenas de metros por hora — um kick fechado à meia-noite pode estar batendo na sapata de manhã. Migração não tira folga.

⚠ ERROS COMUNS — Sangrar pressão do anular "para aliviar" sem contabilidade volumétrica (convida mais influxo); esperar as pressões "estabilizarem" para sempre com gás migrando (elas não vão); subestimar o volume de gás que chega à superfície no fim do kill.`},{t:"Capítulo 1.11 — Manobra segura (trip) na prática",c:`A manobra é o momento mais provável de kick. Rotina defensiva:
1. Flow check antes de iniciar a retirada.
2. Circular e condicionar o fluido antes de manobrar (fundo limpo, densidade homogênea).
3. Trip sheet: planilha comparando volume teórico × real a cada seção retirada/descida.
4. Encher o poço continuamente pelo trip tank (circuito fechado, medição fina).
5. Velocidade controlada para evitar swab (subindo) e surge (descendo — pode fraturar).
6. Discrepância de volume = parar, flow check e, na dúvida, fechar.
7. Slug (colchão pesado) bombeado antes de retirar deixa o interior da coluna "seco" e a medição do trip tank limpa.

A manobra segura é uma coreografia de números: flow check antes de iniciar; slug bombeado e contabilizado; trip sheet aberta comparando teórico × real a cada seção; poço completado pelo trip tank continuamente (não "de vez em quando"); velocidade compatível com o swab calculado; flow check na sapata e antes de tirar o BHA.

O BHA é o trecho crítico: folga anular mínima (swab máximo) e, com a broca perto da superfície, o poço fica com o trecho mais fundo "desassistido" há mais tempo. Kick com coluna quase fora é o cenário que exige blind ram — e stripping ou snubbing para voltar.

⚙ NA PRÁTICA — Combine ANTES os gatilhos de parada: quantos barris de discrepância param a manobra? Quem decide? Manobra boa é chata: números batendo, ninguém criativo.

⚠ ERROS COMUNS — Atribuir discrepância ao slug sem refazer a conta; acelerar a retirada "porque o poço está bom" (o swab não avisa); completar o poço pela bomba do ativo sem medição fina do trip tank.`},{t:"Capítulo 1.12 — Papéis da equipe num kick",c:`- Sondador (driller): detecta, posiciona a coluna, fecha o poço, anota pressões/volumes. Dono dos primeiros 60 segundos.
- Torrista (derrickman): tanques e fluido — nível, densidade, preparação de barita.
- Plataformistas: válvulas, linhas, apoio no manifold e no trip tank conforme função pré-definida.
- Supervisor (toolpusher/company man): decide o método, monta a kill sheet com a equipe, comanda a circulação.
- Todos têm stop work authority: autoridade para parar o serviço diante de risco.

No kick, cada função tem um papel ensaiado: o sondador detecta e fecha (autoridade para fechar SEM pedir permissão — segundos importam); a equipe de plataforma faz spacing out, válvulas e separador; o mud logger vigia tendências e volumes; o engenheiro/fiscal atualiza kill sheet; o supervisor conduz o método, vigia MAASP e decide os desvios de plano.

A comunicação segue protocolo de repetição (closed loop): ordem dada, ordem repetida, execução confirmada. No estresse, meias-palavras matam — e silêncio não é confirmação.

⚙ NA PRÁTICA — O melhor indicador de uma equipe pronta: qualquer pessoa da mesa sabe dizer, agora, qual preventor fecharia primeiro e quem operaria o choke. Se a resposta depende "do que o chefe mandar na hora", o drill está atrasado.

⚠ ERROS COMUNS — Sondador esperando autorização para fechar (a política moderna dá a ele a autoridade); duas pessoas mexendo no choke; supervisor operando válvula em vez de supervisionar o quadro geral.`}],Driller:[{t:"Capítulo 2.1 — Detecção e flow check",c:`O tempo entre o início do influxo e o fechamento do poço define o tamanho do problema: quanto maior o volume do kick, maiores as pressões para removê-lo. O sondador (driller) deve tratar qualquer sinal positivo com fechamento imediato.

Procedimento típico ao notar sinal positivo perfurando:
1. Parar rotação, levantar a coluna até posição de fechamento (tool joint fora das gavetas).
2. Parar as bombas.
3. Flow check (se a política da empresa exigir — muitas mandam fechar direto: hard shut-in).
4. Fechar o BOP (anular, em geral).
5. Abrir a linha de choke ANTES ou conforme o método adotado, fechar o choke.
6. Anotar volumes e pressões, avisar o supervisor.

O flow check tem técnica: alinhar o retorno ao trip tank (medição fina), parar bombas e rotação, e observar tempo SUFICIENTE — poços profundos e fluidos compressíveis "devolvem" fluido por minutos sem ser kick (efeito de expansão térmica e compressibilidade). O critério é a tendência: fluxo que DECAI tende a ser efeito de fluido; fluxo que se mantém ou cresce é formação.

Flow check também se faz fechado: em situação ambígua, fechar o poço e ler pressões é um flow check de luxo — SIDPP/SICP zero e estáveis encerram a dúvida sem risco.

⚙ NA PRÁTICA — Padronize a duração mínima do flow check da sua sonda (muitas usam 10-15 min em cenários ambíguos) e registre SEMPRE o resultado na passagem de turno.

⚠ ERROS COMUNS — Flow check com o fluido ainda "andando" após parar bomba (falso positivo); observar pela linha de retorno aberta em vez do trip tank (não vê vazão pequena); não repetir o flow check após qualquer mudança de condição.`},{t:"Capítulo 2.2 — Hard shut-in × Soft shut-in",c:`- Hard shut-in: choke line fechada; fecha-se o BOP direto. Fechamento mais rápido → menor influxo. É o padrão da maioria das operadoras.
- Soft shut-in: choke aberto ao fechar o BOP, depois fecha-se o choke. Reduz golpe de pressão (water hammer), porém deixa entrar mais influxo.

O debate hard × soft é sobre trade-off: o hard minimiza o volume do influxo (fecha mais rápido) ao custo do golpe de pressão (water hammer) nas linhas; o soft suaviza o golpe ao custo de segundos preciosos de poço aberto. A indústria migrou majoritariamente para o hard: kicks menores compensam o golpe, que os equipamentos modernos absorvem.

O que NÃO é negociável em nenhum dos dois: a sequência da SUA sonda escrita, treinada e afixada. O procedimento de fechamento não se decide durante o kick.

⚙ NA PRÁTICA — Saiba de cor: posição normal das válvulas do stack (choke line fechada no hard), qual preventor fecha primeiro, e o tempo de fechamento real medido no último teste de função.

⚠ ERROS COMUNS — Misturar os dois métodos na hora (choke semiaberto = pior dos dois mundos); esquecer de confirmar o poço FECHADO antes de sair para os próximos passos; não registrar a hora exata do fechamento (base da análise de migração).`},{t:"Capítulo 2.3 — Pressões estabilizadas: SIDPP e SICP",c:`Após o fechamento, as pressões sobem e estabilizam (salvo migração de gás):
- SIDPP (Shut-In Drill Pipe Pressure): pressão na coluna. Como dentro da coluna há fluido limpo de densidade conhecida, o SIDPP é a leitura "honesta" do quanto falta de hidrostática:
  Pressão de poros = PH da coluna + SIDPP
- SICP (Shut-In Casing Pressure): pressão no anular. Normalmente maior que o SIDPP, porque o influxo (mais leve que o fluido) está no anular reduzindo a hidrostática ali.
- SICP − SIDPP dá uma ideia do tipo e altura do influxo: diferença grande sugere gás.
- Se a coluna tiver válvula flutuante (float), o SIDPP não aparece direto: usa-se o procedimento de bombeio lento até detectar o "quebra" de pressão.

A leitura correta exige paciência estruturada: registrar pressões a cada minuto e plotar a tendência. Estabilizou = anota o par SIDPP/SICP. Subindo continuamente = gás migrando; nesse caso, prolongar a espera INFLA as leituras e contamina os cálculos — usa-se a leitura no "cotovelo" da curva ou técnicas de leitura precoce.

Casos atípicos que valem conhecer: SIDPP = SICP (influxo de líquido semelhante ao fluido, ou influxo todo dentro da coluna); SIDPP > SICP (raro: densidade no anular maior que na coluna, ex. pílula pesada no anular); pressões oscilando (gás fracionado em golfadas).

⚙ NA PRÁTICA — Anote também o pit gain final e a hora: com SIDPP, SICP e ganho você fecha o triângulo (natureza do influxo via gradiente + altura) ainda antes da kill sheet.

⚠ ERROS COMUNS — Ler cedo demais (pressões ainda equalizando pela permeabilidade); com float, esquecer o procedimento de quebra e reportar SIDPP "zero"; confiar num único manômetro sem cross-check com o de reserva.`},{t:"Capítulo 2.4 — Kill sheet e cálculos essenciais",c:`A kill sheet (planilha de matar poço) organiza os dados e cálculos antes de circular o kick:

1. KMW (Kill Mud Weight) — densidade necessária para equilibrar a formação:
   KMW = densidade atual + SIDPP ÷ (0,17 × TVD)
   Exemplo: 10 lb/gal, SIDPP 340 psi, TVD 2.000 m → KMW = 10 + 340/(0,17×2000) = 10 + 1,0 = 11 lb/gal.
2. ICP (Initial Circulating Pressure) — pressão no início da circulação com fluido antigo:
   ICP = PL + SIDPP (PL = pressão reduzida de circulação, medida antes do kick em vazão lenta, ex.: 30 spm).
3. FCP (Final Circulating Pressure) — pressão quando o fluido novo (KMW) preenche toda a coluna:
   FCP = PL × (KMW ÷ densidade atual)
4. Strokes de superfície ao bit: volume interno da coluna ÷ deslocamento da bomba (bbl/stk). Durante esses strokes, a pressão na coluna cai de ICP para FCP de forma programada (tabela da kill sheet).

A kill sheet transforma quatro medidas (PL, SIDPP, SICP, pit gain) em um plano completo: KMW (para equilibrar), ICP (para começar), FCP (para terminar) e a tabela de queda por strokes (para o caminho). Os dados "pré-kick" — PL por bomba, volumes internos por seção, capacidades do anular, strokes/bbl da bomba — são a metade que se prepara em paz.

Conferência cruzada é obrigatória: duas pessoas calculam separadamente e comparam. Erro de kill sheet executado com disciplina é pior que hesitação — o poço recebe exatamente o erro, na dose certa.

⚙ NA PRÁTICA — Valide o ICP na partida: estabilizou a vazão de matar, a coluna TEM que mostrar ≈ PL + SIDPP. Divergência grande = pare: PL desatualizada, vazamento, ou leitura errada.

⚠ ERROS COMUNS — PL medida com outra bomba/bocais; strokes até o bit calculados com a geometria errada; esquecer de recalcular MAASP para a KMW nova; arredondar KMW para baixo.`},{t:"Capítulo 2.5 — Método do Sondador (Driller's Method)",c:`Remove o kick em duas circulações:
- 1ª circulação: com o fluido original, circula-se o influxo para fora pelo choke, mantendo a pressão da coluna constante = ICP na vazão de matar.
- Entre as circulações, o poço fica fechado com SIDPP = SICP (influxo já saiu).
- 2ª circulação: bombeia-se o fluido de matar (KMW). Da superfície ao bit, a pressão da coluna cai de ICP para FCP; do bit à superfície, mantém-se FCP constante.
Vantagens: simples, começa rápido, menos cálculo no início. Desvantagem: mais tempo com pressão no poço e pressões de anular mais altas na sapata em kicks de gás.

A força do Driller's está na simplicidade sob pressão: primeira circulação com o fluido que JÁ está no poço, um único alvo (coluna = ICP constante), começando em minutos. O influxo sai, o poço fica estático com SIDPP = SICP (só fluido original + formação), e a segunda circulação desce o fluido de matar com a tabela ICP→FCP.

O preço: o poço passa mais tempo pressurizado (duas circulações) e, em kicks de gás, o anular vê pressões maiores do que veria no W&W — a sapata que o diga. Por isso a escolha do método é decisão de supervisão baseada em MAASP e migração, não preferência pessoal.

⚙ NA PRÁTICA — Entre as duas circulações, confira: SIDPP ≈ SICP? Se o SICP continua acima, ainda há influxo no anular — circular mais antes de trocar o fluido.

⚠ ERROS COMUNS — Tentar "aproveitar" e já pesar o fluido na primeira circulação (vira um W&W improvisado sem tabela); perder o controle do ICP nas trocas de tanque; esquecer que a segunda circulação TAMBÉM precisa da tabela de queda.`},{t:"Capítulo 2.6 — Método Wait & Weight (Engenheiro)",c:`Remove o kick em uma circulação: espera-se preparar o fluido de matar e circula-se já com KMW.
- Da superfície ao bit: pressão da coluna cai de ICP para FCP conforme a tabela de strokes.
- Do bit à superfície: FCP constante.
Vantagens: menores pressões na sapata (em geral) e menos tempo total de circulação. Desvantagem: exige esperar a preparação do fluido — com gás migrando, a espera custa caro.

No W&W, a espera tem propósito: com o fluido de matar já descendo pela coluna, a pressão necessária na superfície cai continuamente, e o anular (e a sapata) trabalham com menos carga. Em janelas apertadas, essa diferença É a diferença entre matar o poço e fraturar a sapata.

A tabela de strokes é a alma do método: da superfície ao bit, a pressão da coluna deve cair LINEARMENTE de ICP a FCP conforme os strokes bombeados. O operador do choke "persegue" a tabela; depois do bit, congela em FCP até o fluido de matar dar a volta completa.

⚙ NA PRÁTICA — Marque na tabela os strokes de eventos-chave: fluido de matar no bit, topo do gás previsto na sapata, gás na superfície. Antecipar os momentos críticos vale mais que reagir a eles.

⚠ ERROS COMUNS — Espera virar eternidade (migração comendo a margem enquanto a barita não chega); seguir a tabela com strokes errados (contador zerado fora de hora); abandonar a tabela "porque a pressão está estranha" em vez de parar e diagnosticar.`},{t:"Capítulo 2.7 — Migração de gás e MAASP",c:`Gás fechado no poço migra para cima. Se o poço estiver fechado sem expansão, o gás sobe mantendo sua pressão, elevando a pressão em todos os pontos — risco de fraturar a sapata ou estourar equipamento. Sinal clássico: SIDPP e SICP subindo juntos com o poço fechado. Controle: permitir expansão controlada pelo choke (ou método volumétrico).

- LOT (Leak-Off Test): teste que mede quanto a formação na sapata aguenta. Dele vem a densidade máxima permissível e a
- MAASP (Maximum Allowable Annular Surface Pressure): pressão máxima de superfície no anular antes de fraturar a sapata:
  MAASP = (densidade máx. do LOT − densidade atual) × 0,17 × TVD da sapata
  A MAASP diminui quando a densidade do fluido aumenta.

MAASP é limite dinâmico: cada mudança de densidade a recalcula, e o momento crítico é o gás passando pela sapata — o perfil de pressão ali atinge o pico com o topo do gás logo abaixo dela. Vigiar SICP × MAASP nessa janela é tarefa dedicada, não olhada ocasional.

Migração tem contabilidade própria: com o poço fechado, a taxa de subida de pressão (psi/h) convertida pela hidrostática dá a velocidade de migração (m/h). Esse número diz quanto tempo você tem — para montar o volumétrico, para esperar barita, para decidir.

⚙ NA PRÁTICA — Regra de bolso da migração: velocidade (m/h) ≈ taxa de subida (psi/h) ÷ gradiente do fluido (psi/m). Subiu 100 psi/h com fluido de 2,0 psi/m → gás subindo ~50 m/h.

⚠ ERROS COMUNS — Tratar a MAASP calculada na densidade antiga como válida após pesar o fluido; sangrar pressão sem método volumétrico (alívio momentâneo, influxo adicional); esquecer que MAASP protege a SAPATA — o BOP tem seu próprio limite, geralmente maior.`},{t:"Capítulo 2.8 — Kick em manobra",c:`A maioria dos kicks acontece em manobra. Prevenção e resposta:
- Completar o poço com o trip tank e conferir: volume bombeado = volume de aço retirado.
- Se o poço "devolver" mais do que devia (ou não aceitar o volume certo): flow check → fechar.
- Com coluna no poço: instalar válvula de segurança aberta, fechar a válvula, fechar o BOP. Se necessário, instalar inside BOP e retornar ao fundo por stripping (com autorização do supervisor).
- Sem coluna no poço: fechar gaveta cega.

O kick de manobra tem três cenários com respostas distintas: coluna no fundo (sorte — fecha e mata normal); coluna parcial (fecha com FOSV/inside BOP e retorna ao fundo por stripping com contabilidade volumétrica); coluna fora (blind ram — e o retorno exige stripping desde o zero ou snubbing se houver pressão expulsando).

O stripping é operação de precisão: pressão do anular reduzida no regulador para deixar o tubo deslizar vedando, sangria medida do deslocamento de cada tubo no trip tank, e — com gás migrando — o método volumétrico rodando em paralelo. Duas contabilidades simultâneas, um caderno para cada.

⚙ NA PRÁTICA — Trip drill que vale: simular o kick com a coluna no meio do poço, cronometrar até FOSV instalada + poço fechado. É o cenário real mais provável e o menos treinado.

⚠ ERROS COMUNS — Instalar a FOSV FECHADA contra fluxo forte (não rosqueia — ela desce aberta e fecha depois); esquecer o inside BOP e não conseguir bombear no stripping; perder a contabilidade de volumes na troca de turno no meio da operação.`},{t:"Capítulo 2.9 — Kill sheet passo a passo (exemplo completo)",c:`Dados: fluido 10 lb/gal · TVD = MD = 2.000 m · sapata 1.500 m TVD · LOT 13 lb/gal · PL 600 psi @ 30 spm · bomba 0,1 bbl/stk · volume coluna 80 bbl · anular 320 bbl. Kick fechado: SIDPP 340 psi · SICP 480 psi · pit gain 12 bbl.
1. KMW = 10 + 340/(0,17×2000) = 11,0 lb/gal
2. ICP = 600 + 340 = 940 psi
3. FCP = 600 × (11/10) = 660 psi
4. Strokes superfície–bit = 80/0,1 = 800 stk · anular = 320/0,1 = 3.200 stk · total = 4.000 stk
5. MAASP inicial = (13−10) × 0,17 × 1500 = 765 psi
6. Tabela de queda: de 940 → 660 psi em 800 stk (queda de 280 psi; ~35 psi a cada 100 stk).
7. Circulação (W&W): bombear a 30 spm seguindo a tabela até 800 stk; depois segurar 660 psi na coluna até completar o anular.

Um exemplo completo fixa o método. Dados: TVD 2.500 m; fluido 10,0 lb/gal; PL 650 psi @ 30 spm; fechou com SIDPP 425 psi, SICP 600 psi, ganho 8 bbl; strokes superfície→bit 1.250.

KMW = 10 + 425/(0,17×2.500) = 10 + 1,0 = 11,0 lb/gal. ICP = 650 + 425 = 1.075 psi. FCP = 650 × 11/10 = 715 psi. Queda: (1.075−715)/1.250 = 0,288 psi/stk → 28,8 psi a cada 100 stk. A cada 100 strokes bombeados, o choke deve entregar a coluna ~29 psi mais baixa, até 715 psi no stroke 1.250 — e dali FCP constante até completar o anular.

⚙ NA PRÁTICA — Escreva a tabela em degraus de 100 strokes ANTES de ligar a bomba e cole ao lado do manômetro. Perseguir número escrito é fácil; calcular de cabeça sob pressão é loteria.

⚠ ERROS COMUNS — Recalcular "de cabeça" no meio por desconfiança (pare e confira no papel); confundir strokes totais com strokes até o bit; não conferir se o contador de strokes foi zerado na partida.`},{t:"Capítulo 2.10 — Ballooning × kick real",c:`Ballooning (flowback): formações microfraturadas "bebem" fluido com bombas ligadas (ECD) e "devolvem" com bombas desligadas. Parece kick, mas não é influxo de formação permeável.
Pistas para diferenciar (sempre com o poço monitorado/fechado na dúvida):
- Fluxo que decai com o tempo no flow check → tende a ballooning; fluxo constante/crescente → kick.
- Devolve aproximadamente o mesmo volume que perdeu antes → ballooning.
- SICP/SIDPP baixos e estáveis após fechar → ballooning; subindo → kick.
Tratar como kick até provar o contrário. Erro de diagnóstico aqui já causou acidentes graves.

O diagnóstico ballooning × kick decide-se FECHADO, nunca aberto: fecha o poço e lê. Ballooning clássico: SICP baixo, estável ou caindo, fluxo devolvido decrescente, e volume devolvido que tende a igualar o que se perdeu antes. Kick: pressões que se sustentam ou sobem, ganho contínuo.

A armadilha é estatística: quem já viu três ballooning "diagnostica" o quarto evento sem fechar — e o quarto é kick. O custo de fechar para conferir é minutos; o custo de "deixar devolver" um kick real é o evento inteiro fora de controle.

⚙ NA PRÁTICA — Mantenha registro dos episódios: volumes perdidos × devolvidos por formação. O padrão da SUA formação balonante é a referência para estranhar o dia em que os números não fecharem.

⚠ ERROS COMUNS — Comparar fluxo devolvido "no olho" sem medir no trip tank; assumir ballooning porque "essa formação sempre faz isso"; esquecer que ballooning e kick podem coexistir (a formação devolve E outra zona flui).`},{t:"Capítulo 2.11 — Choke manifold e circuito de superfície em detalhe",c:`Caminho do fluido num controle: poço fechado → linha de choke → choke manifold (choke remoto + manual + reserva) → separador poor boy → fluido para os tanques/peneiras e gás para o vent/queimador.
- Choke remoto (hidráulico): operado do painel, com manômetros de coluna e anular lado a lado.
- Choke manual e reserva: contingência para plugging/washout — a troca deve ser treinada.
- Painel do choke: contador de strokes, pressões, posição do choke. O operador "pilota" a pressão da coluna.
- Linha do vent do separador: dimensionada para o pico de vazão de gás; separador afogado = gás no piso.
- Válvulas HCR/manuais na saída do BOP: sequência correta de abertura antes de circular.

O circuito de superfície merece intimidade: do BOP, a choke line leva ao manifold; ali, o choke remoto (operado do painel) é a primeira escolha, com manual e reserva alinháveis por válvulas; do choke, o fluxo segue ao separador poor boy, que devolve fluido às peneiras e manda gás ao vent. Cada válvula desse caminho tem posição definida em operação normal e em kick.

O separador tem física simples e limite real: a vedação hidráulica (coluna de fluido no selo) aguenta certa pressão interna; vazão de gás demais = pressão interna maior que o selo = gás soprando pela linha de fluido para dentro da sonda. A pressão no separador é instrumento a vigiar durante todo o kill.

⚙ NA PRÁTICA — Caminhe o circuito fisicamente com a equipe: cada um aponta válvula por válvula o alinhamento de kick. O erro de alinhamento se descobre no passeio, não no evento.

⚠ ERROS COMUNS — Choke reserva por alinhar (descobre-se entupido o remoto e não há caminho pronto); esquecer a válvula HCR na saída do BOP; ignorar a pressão do separador até ouvir o gás na sonda.`},{t:"Capítulo 2.12 — Erros clássicos do driller (e como evitar)",c:`1. Flow check curto demais ou com poço "sujo" (fluido em movimento) → falso negativo.
2. Esquecer o spacing out e fechar gaveta em tool joint.
3. Não anotar pressões estabilizadas (esperar estabilizar, exceto com migração evidente).
4. Corrigir o choke atrasado: existe tempo de trânsito da pressão (~1 s a cada 300 m). Ajustar e esperar refletir.
5. Bombear fora da vazão do PL sem recalcular pressões.
6. Ignorar o limite do separador — vazão de matar também protege a superfície.
7. Confundir queda de pressão por washout de choke com "poço morrendo".
8. Não conferir a pressão de fechamento das gavetas/anular (regulador do acumulador) para o tubo em uso.

Os erros clássicos têm padrão: quase todos trocam VERIFICAÇÃO por PRESSA. Fechar devagar para "confirmar"; sangrar anular sem contabilidade; perseguir SICP em vez de coluna na circulação; abandonar a tabela por intuição; esquecer MAASP após pesar; ler SIDPP com float sem procedimento; strokes de outra geometria; PL de outra bomba.

A defesa é sistêmica, não heroica: dupla checagem de cálculo, tabela escrita e colada, um único operador de choke, closed-loop no rádio, e a regra de ouro dos números estranhos — condição estática segura primeiro (fechar), diagnóstico depois. O poço fechado espera; o erro executado não volta.

⚙ NA PRÁTICA — Após cada kick real ou drill, faça o "debrief dos 3": o que detectamos bem, o que atrasou, o que mudaremos. Sonda que registra aprende; sonda que comemora repete.

⚠ ERROS COMUNS — O meta-erro: tratar esta lista como leitura de certificação em vez de checklist vivo da SUA operação. Os erros clássicos continuam clássicos porque continuam acontecendo.`}],Supervisão:[{t:"Capítulo 3.1 — Escolha do método de controle",c:`O supervisor escolhe o método pelo cenário, não por preferência:
- Wait & Weight: preferido quando a margem na sapata é apertada (menor pressão no ponto fraco) e a preparação do fluido é rápida.
- Driller's: preferido quando é preciso começar já (gás migrando, pouca capacidade de mistura, equipe menos experiente) ou quando o bit está longe do fundo.
- Volumétrico: quando NÃO é possível circular (bomba quebrada, coluna fora do fundo, coluna entupida): deixa-se o gás migrar e expande-se por sangrias controladas de fluido, trocando volume por pressão de forma contabilizada.
- Lubricate & Bleed: versão do volumétrico para retirar gás já na superfície sob o BOP: bombeia-se fluido (lubricate), espera-se decantar, sangra-se pressão equivalente.
- Stripping: descer a coluna com o poço fechado (pelo anular), controlando volumes deslocados, para voltar ao fundo e circular.
- Bullheading: bombear o influxo de volta para a formação. Usado quando circular é inaceitável (ex.: gás com H2S, influxo acima do bit, riser) e a formação aceita injeção. Risco: fraturar outra formação.

A escolha do método é uma equação de três variáveis: tempo (o gás migra? a barita demora?), pressão (o que a sapata aguenta? MAASP × previsão de pico) e capacidade (bombas, separador, pessoal disponível). Driller's compra tempo ao custo de pressão; W&W compra pressão ao custo de tempo; volumétrico é o plano de quem não pode circular; bullheading é a exceção justificada por risco maior na superfície.

Decisão boa se documenta em uma linha: "escolhido X porque migração ~Y m/h, MAASP folga Z psi, barita pronta em W min". Se a linha não fecha, a escolha ainda não está madura — e o poço fechado dá tempo para amadurecê-la.

⚙ NA PRÁTICA — Prepare a decisão ANTES do kick: para cada fase do poço, deixe pré-analisado qual método seria o padrão e qual o gatilho de exceção. No evento, decide-se entre duas opções estudadas, não entre quatro teorias.

⚠ ERROS COMUNS — Trocar de método no meio por ansiedade (cada troca tem custo de transição e de confusão); escolher W&W sem logística real de barita; descartar o volumétrico por "método de livro" — ele resolve exatamente os cenários em que os outros não funcionam.`},{t:"Capítulo 3.2 — Tolerância ao influxo (kick tolerance)",c:`É o maior volume de influxo que ainda pode ser fechado e circulado sem fraturar a sapata. Depende de: margem do LOT, densidade em uso, TVD da sapata e do poço, geometria do anular e natureza do influxo (gás é o pior caso). Supervisão usa kick tolerance para decidir profundidade de revestimento e limites operacionais. Se a kick tolerance ficar menor que o volume de detecção confiável da sonda, a operação precisa ser revista.

Kick tolerance operacionaliza uma pergunta: "quanto influxo cabe entre nós e a fratura da sapata?" O cálculo combina margem do LOT, densidades, profundidades (sapata × fundo), geometria do anular e o pior caso de gás. O resultado em barris orienta TRÊS decisões: profundidade do próximo revestimento, densidade de trabalho, e sensibilidade exigida da detecção.

KT é dinâmica: cada metro perfurado (fundo mais fundo, mesmo LOT) e cada aumento de densidade a reduzem. Poço que começou com KT de 50 bbl pode chegar ao objetivo com 8 — e a operação precisa ENXERGAR essa erosão, não descobri-la no kick.

⚙ NA PRÁTICA — Publique a KT vigente no quadro junto com a MAASP: "hoje, este poço tolera X bbl". Muda o comportamento da equipe de detecção na hora.

⚠ ERROS COMUNS — Calcular KT no início da fase e nunca atualizar; usar influxo "médio" em vez do pior caso de gás; aceitar KT menor que a capacidade real de detecção da sonda sem plano de mitigação.`},{t:"Capítulo 3.3 — Particularidades de BOP submarino (águas profundas)",c:`- Choke line friction (CLF): a perda de carga na linha de choke longa soma pressão na sapata durante a circulação. Deve ser medida e descontada (circular pela kill line como referência, ou reduzir a leitura no choke).
- Gás no riser: acima do BOP não há barreira secundária — gás no riser exige desviar para o diverter e acionar plano específico.
- Hidratos: alta pressão + baixa temperatura no leito marinho podem formar hidratos e bloquear linhas/BOP. Prevenção: glicol/inibidores.
- Redução de MAASP pela água do mar: a sapata em águas profundas costuma ser mais fraca (menos overburden).
- Espaço entre juntas: posicionamento da coluna (spacing out) para não fechar gaveta em tool joint.
- EDS (Emergency Disconnect Sequence): desconexão de emergência do LMRP em DP (posicionamento dinâmico) — o supervisor precisa conhecer os gatilhos (deriva, blackout).

O BOP no fundo do mar muda a física e a logística: choke line longa cria a CLF (compensar pela kill line estática); o riser acima do BOP é zona SEM barreira secundária (gás ali = diverter, não fechamento); hidratos espreitam nas linhas frias; e o tempo de tudo — fechar, testar, consertar — multiplica.

Acrescente o posicionamento dinâmico: a sonda mantém posição por thrusters, e a perda de posição (drive-off/drift-off) impõe a EDS — shear ram cortando a coluna e LMRP desconectando. Os círculos de alerta (amarelo/vermelho) traduzem em metros o tempo físico disponível, calculados por poço.

⚙ NA PRÁTICA — Duas disciplinas diárias em águas profundas: injeção de inibidor de hidrato conforme procedimento nas linhas, e briefing dos gatilhos de EDS no início de operações críticas — quem aciona, em que círculo, sem consulta.

⚠ ERROS COMUNS — Circular kick pelo choke sem compensar CLF (sapata paga a conta); subestimar gás em solução no fluido sintético (aparece de surpresa no riser); tratar a EDS como falha profissional em vez de sucesso do sistema (hesitar custa o poço E a sonda).`},{t:"Capítulo 3.4 — Kicks fora do padrão",c:`- Kick com coluna fora do fundo: fechar, avaliar stripping ao fundo × volumétrico.
- Kick sem coluna: gaveta cega; opções: stripping com snubbing, volumétrico, bullheading.
- Perda de circulação + kick simultâneos: o pior cenário — considerar pílulas de combate à perda, bombeio pelo anular (barite plug/gunk), e em último caso controle dinâmico.
- Poço em fluxo na manobra com BHA na zona do BOP: nunca fechar gaveta no BHA; avaliar descer/subir para tubo liso ou usar anular.
- Blowout subterrâneo: fluxo de uma formação para outra; sinais: pressões que não estabilizam, SICP caindo sozinho.

Kicks fora do padrão exigem reconhecer o padrão que quebrou: influxo ACIMA do bit (SIDPP não enxerga; circular convencional não remove — bullheading ou stripping para reposicionar); kick com perda simultânea (hidrostática vazando por baixo — LCM, tampão, decisões de contingência); kick com H2S (prioridade absoluta: pessoal — respiradores, vento, considerar bullheading); kick durante cimentação (barreiras em transição, resposta pré-combinada no programa).

O denominador comum: cenários atípicos se vencem com PRÉ-ESTUDO. Durante o evento, improvisar arquitetura nova é receita de erro — o papel do supervisor é reconhecer rápido QUAL contingência pré-estudada se aplica.

⚙ NA PRÁTICA — Para cada fase, mantenha a página de contingências: perda+kick, H2S, influxo acima do bit. Uma página cada, com gatilhos e primeiros passos. É o material que ninguém lê até valer ouro.

⚠ ERROS COMUNS — Aplicar o kill convencional a influxo acima do bit (circula-se fluido, o influxo fica); esquecer que H2S muda até a direção de aproximação das pessoas (vento); tratar cimentação como "fim do risco" quando é troca de barreiras em pleno voo.`},{t:"Capítulo 3.5 — Gestão da equipe e do evento",c:`- Pre-tour meeting e drills: BOP drill, pit drill, trip drill, choke drill, strip drill — com tempo cronometrado e crítica construtiva.
- Responsabilidades claras: quem fecha, quem avisa, quem opera choke, quem monta kill sheet.
- Comunicação: uma única fonte de comando na circulação do kick (choke operator ↔ driller ↔ supervisor).
- Documentação: registrar volumes, pressões, horários. O relatório protege a equipe e alimenta as lições aprendidas.
- Testes de BOP: teste de função (frequente) e teste de pressão (periódico, baixa e alta pressão) conforme norma da operadora/órgão regulador.
- Manutenção da barreira primária: política de densidade com margem de manobra (trip margin) e monitoramento contínuo do poço mesmo em operações "tranquilas" (cimentação, perfilagem, espera).

Gerir o evento é gerir três recursos: atenção (uma pessoa = uma função; o supervisor NÃO opera choke — enxerga MAASP, separador, tendências, pessoal), informação (quadro único com números vigentes: método, KMW, tabela, MAASP, strokes; rádio em closed-loop) e ritmo (velocidade segura ≠ pressa; pausas programadas para reavaliar a cada marco: influxo fora, fluido no bit, gás na sapata).

O fator humano decide: fadiga em evento longo pede revezamento PLANEJADO (não heroísmo); divergência técnica se resolve por dados e critérios escritos, não hierarquia pura; e o registro em tempo real (horários, pressões, decisões) é tanto ferramenta de condução quanto proteção da equipe.

⚙ NA PRÁTICA — Nomeie um "guardião do quadro": alguém cuja única função é manter números e horários atualizados e visíveis. Libera a cabeça de todos os outros.

⚠ ERROS COMUNS — Supervisor absorvido numa tarefa operacional enquanto o quadro geral deriva; briefings pulados "porque todos sabem o que fazer"; evento de 12 horas conduzido pelas mesmas seis pessoas sem revezamento.`},{t:"Capítulo 3.6 — Cálculos de supervisão",c:`Além de KMW/ICP/FCP, o supervisor domina:
- Pressão na sapata durante a circulação do gás (pior caso ao topo do gás chegar na sapata).
- Altura do influxo: volume do kick ÷ capacidade do anular no trecho.
- Gradiente do influxo: estimado por (SICP − SIDPP) e altura do influxo → identifica gás × líquido.
- Ajuste de MAASP após cada mudança de densidade.
- Volume/strokes de cada trecho (superfície–bit, bit–sapata, sapata–superfície) para antecipar eventos na circulação.

Os cálculos de supervisão respondem perguntas de decisão: Pressão máxima prevista na sapata durante o kill (comparar com LOT — decide o método); volume de gás na superfície e vazão no separador (decide a kill rate); tempo de migração até a sapata (decide a urgência); pressão máxima no BOP e linhas (confere limites de equipamento); e a kick tolerance restante após o evento (decide se a fase continua).

Ferramenta mental valiosa: o gráfico pressão-na-sapata × posição do gás. O pico ocorre com o topo do gás na sapata; se o pico previsto cruza o LOT, o plano precisa mudar ANTES de chegar lá — reduzir vazão, aceitar mais tempo, ou repensar o método.

⚙ NA PRÁTICA — Faça as contas de pico ANTES de circular: cinco minutos de cálculo evitam a descoberta em tempo real de que a sapata não aguenta o plano.

⚠ ERROS COMUNS — Conferir só a MAASP estática e esquecer o pico dinâmico na passagem do gás; dimensionar a kill rate pela pressa e afogar o separador; não recalcular a KT pós-evento antes de retomar a perfuração.`},{t:"Capítulo 3.7 — Lições de desastres reais",c:`Grandes acidentes viraram aula. Padrões que se repetem:
- Macondo/Deepwater Horizon (2010): teste de pressão negativo mal interpretado, sinais de fluxo ignorados, gás no riser, desvio para o separador em vez de overboard, barreiras degradadas. Lições: interpretar teste de barreira com critério formal, monitoramento contínuo dos retornos, resposta a gás no riser, independência das barreiras e cultura de questionamento.
- Blowouts de gás raso: fechar BOP convencional em gás raso pode fraturar e trazer o fluxo por fora do poço (cratera) — por isso o diverter.
- Padrão comum: normalização do desvio (aceitar pequenas anomalias como "normais") e pressa nas fases finais do poço.
Supervisão combate isso com critérios de aceitação escritos, "linhas vermelhas" pré-acordadas e autoridade real de parada.

Os grandes acidentes compartilham anatomia: Macondo (2010) — teste negativo interpretado com otimismo, monitoramento relaxado na troca de fluido, detecção tardia, e o gás chegou à sonda antes do fechamento; Montara (2009) — barreiras de cimento assumidas sem verificação em poço suspenso; Piper Alpha (1988, produção) — permissões de trabalho e comunicação entre turnos falhando em cadeia.

Três lições operacionais recorrentes: (1) barreira não verificada não existe — teste com critério escrito; (2) sinais ambíguos se resolvem para o lado SEGURO — fechar é barato; (3) transições (turno, fluido, fase, equipe) são onde o contexto se perde — proteja-as com protocolo.

⚙ NA PRÁTICA — Use os casos como treino de decisão: dê à equipe os dados que a equipe de Macondo tinha às 21h e pergunte "o que você faria?". O valor está em decidir com a informação INCOMPLETA daquele momento.

⚠ ERROS COMUNS — Estudar acidentes como história ("nunca aconteceria conosco") em vez de espelho; extrair lições genéricas ("comunicar melhor") sem mudança concreta de procedimento; esquecer que todos os envolvidos eram profissionais experientes — o sistema falhou antes das pessoas.`},{t:"Capítulo 3.8 — Auditoria de barreiras na prática",c:`Ferramenta do supervisor: o diagrama de barreiras do poço em cada fase.
- Listar cada envelope: primário (fluido/cimento/packer...) e secundário (BOP/cabeça/válvulas).
- Cada elemento precisa de teste registrado, com critério e validade.
- Operações simultâneas (SIMOPS) e manutenção: nunca abrir janela com menos de duas barreiras.
- Degradação silenciosa: fluido perdendo densidade por temperatura, cimento sem verificação, válvula sem teste periódico.
- Regra prática: se não está testado e documentado, não é barreira.

Auditar barreiras é verificar TRÊS dimensões: existência (o elemento está lá e íntegro?), validade (teste dentro do prazo, com critério de aceitação escrito e resultado registrado?) e independência (a falha de uma barreira derruba a outra?). O papel aceita tudo; a auditoria boa vai ao campo: abre o registro do último teste de BOP, cronometra um pit drill, confere a PL do turno, olha a trip sheet da última manobra.

Auditoria madura também verifica o "sistema imunológico": as pendências apontadas na auditoria ANTERIOR foram tratadas? Quem parou trabalho nos últimos meses e o que aconteceu com essa pessoa? A resposta a essas duas perguntas mede a cultura melhor que qualquer checklist.

⚙ NA PRÁTICA — Auditoria interna mensal de 1 hora com roteiro fixo de 10 itens verificáveis vale mais que a auditoria anual de 3 dias que todos ensaiam para passar.

⚠ ERROS COMUNS — Auditar documentos em vez de práticas; aceitar "teste OK" sem critério de aceitação anexado; tratar a auditoria como evento adversarial (esconde-se o problema que deveria aparecer).`},{t:"Capítulo 3.9 — Controle de poço em completação e workover",c:`Diferenças em relação à perfuração:
- Fluido de completação limpo (salmoura), com margens menores e sem reboco: perdas e influxos mais rápidos.
- Barreiras diferentes: packers, tampões mecânicos, BPV, válvula DHSV, árvore de natal.
- Kick pode fluir por dentro da coluna franca: válvulas de coluna são críticas.
- Stripping/snubbing são mais comuns (o poço já pode estar vivo).
- O plano de controle deve ser refeito para cada operação — copiar o da perfuração é erro.

Completação e workover reescrevem o jogo: o poço pode estar VIVO (canhoneado, com pressão na cabeça), o fluido é salmoura limpa sem reboco (perda franca para a formação), e as barreiras mudam de natureza — packers, tampões mecânicos e de cimento, BPV no suspensor, DHSV na coluna de produção, além do BOP de intervenção ou da própria árvore.

Cada movimento de equipamento na superfície (retirar BOP, instalar árvore) é uma TROCA de barreira em operação: a nova entra testada ANTES de a antiga sair. O diagrama de barreiras da intervenção — específico, desenhado para AQUELA sequência — é o documento central, e cada etapa tem seu estado de barreiras aprovado.

⚙ NA PRÁTICA — Para poço vivo, a disciplina do nível é dobrada: salmoura perde para a formação silenciosamente, e a queda de nível é o kick de amanhã. Monitoramento contínuo de nível não é opcional.

⚠ ERROS COMUNS — Reusar mentalidade de perfuração ("fluido pesado resolve") em poço canhoneado; mover equipamento de superfície com apenas uma barreira válida; esquecer de testar a DHSV/BPV antes de depender delas.`},{t:"Capítulo 3.10 — Regulamentação e gestão no Brasil",c:`- ANP regula a segurança operacional: SGSO (Sistema de Gerenciamento de Segurança Operacional), com práticas de gestão que incluem integridade de poço e barreiras.
- Certificações reconhecidas de controle de poço: IADC WellSharp e IWCF, com níveis por função (Introdutório/Driller/Supervisor) e reciclagem periódica (tipicamente 2 anos).
- A operadora define a política de controle de poço (hard/soft shut-in, vazões, MAASP, kick tolerance) e a sonda executa com procedimentos alinhados.
- Registro e comunicação de incidentes: kicks reportáveis alimentam estatísticas e auditorias.
- O supervisor responde por garantir equipe treinada, certificada e exercitada em drills — papel legal, não só técnico.

No Brasil, o arcabouço combina a regulamentação da ANP — com o SGSO (Sistema de Gerenciamento de Segurança Operacional) e suas práticas de gestão de barreiras, integridade de poços e investigação de incidentes — com normas internacionais incorporadas pela indústria (API, ISO) e os padrões corporativos das operadoras, frequentemente mais restritivos que o mínimo legal.

Para o supervisor, três obrigações práticas se destacam: manter o diagrama de barreiras do poço atualizado e auditável; garantir pessoal certificado em controle de poço nas funções críticas com reciclagem em dia; e reportar e investigar incidentes (incluindo kicks) com análise de causa — o kick bem investigado de hoje é o blowout evitado do próximo poço.

⚙ NA PRÁTICA — Trate o requisito regulatório como PISO, não teto: a pergunta boa não é "estamos conformes?", e sim "a barreira funcionaria HOJE, às 3h, com a equipe do turno?".

⚠ ERROS COMUNS — Confundir certificado válido com competência atual (a reciclagem simula o que o dia a dia não pratica); tratar o reporte de kick como burocracia em vez de aprendizado; deixar o diagrama de barreiras desatualizar entre fases do poço.`}]},sims:[{id:"s1",title:"Drilling break às 03:40",lvl:"Básico",tag:"Detecção e fechamento",intro:'Fase 12¼", perfurando folhelho a 2.500 m TVD com fluido 10,0 lb/gal. PL registrada no turno: 650 psi @ 30 spm. Madrugada calma, ROP estável em 8 m/h.',steps:[{sit:"A ROP salta de 8 para 22 m/h sem mudança de parâmetros. O mud logger confirma: quebra franca de taxa.",tel:["ROP: 8 → 22 m/h","Torque: estável","Retorno: sem alteração visível","Tanques: sem ganho"],opts:[{t:"Continuar perfurando — formação mais macia é normal",pts:0,fb:"Perigoso. Drilling break é sinal de ALERTA clássico: possível zona porosa/pressurizada. Perfurar 'para ver' expõe mais formação e agranda um influxo que pode já ter começado."},{t:"Parar, levantar da rocha e fazer flow check no trip tank",pts:5,fb:"Correto. Drilling break exige verificação de fluxo antes de continuar. Levantar da rocha protege a broca e posiciona a coluna."},{t:"Fechar o poço imediatamente",pts:3,fb:"Aceitável por conservadorismo — mas o drilling break sozinho é alerta, não sinal positivo. O flow check confirma em minutos sem custo. Fechar sem checar vira hábito ruim: banaliza o fechamento."}]},{sit:"Flow check em andamento: bombas paradas, retorno alinhado ao trip tank.",tel:["Trip tank: +0,4 bbl em 3 min, taxa CRESCENTE","Fluxo visível na linha","Bombas: paradas"],opts:[{t:"Fluxo crescente com bombas paradas = sinal POSITIVO. Espaçar a coluna e fechar",pts:5,fb:"Exato. Poço fluindo parado é a formação empurrando. Cada segundo aberto = mais influxo, mais pressão depois."},{t:"Observar mais 15 minutos para ter certeza",pts:0,fb:"Custou caro: em 15 min o influxo mais que dobra. Fluxo CRESCENTE não é fluido se expandindo (esse decai) — é kick. A dúvida se resolve com o poço fechado."},{t:"Religar as bombas e circular para 'limpar' o possível gás",pts:0,fb:"Erro grave: circular com poço aberto durante um kick alimenta o influxo e espalha o gás no anular. Kick confirmado se circula FECHADO, pelo choke."}]},{sit:"Decisão de fechar tomada. Qual a sequência correta de fechamento (hard shut-in, política da sonda)?",tel:["Coluna: no fundo, off bottom 2 m","Choke line: fechada (posição normal)","Anular: pronto"],opts:[{t:"Espaçar coluna → fechar anular → abrir HCR contra choke fechado → anotar pressões",pts:5,fb:"Sequência padrão do hard shut-in: tubo liso na frente dos preventores, fecha direto (choke já fechado), abre a saída lateral para leitura e circulação futura."},{t:"Abrir o choke primeiro, fechar o anular e ir fechando o choke devagar",pts:2,fb:"Isso é soft shut-in — existe, mas não é a política desta sonda e permite influxo extra durante o fechamento gradual. Em prova e em campo: siga a política definida ANTES do kick."},{t:"Fechar a shear ram para garantir",pts:0,fb:"Cortar a coluna num kick rotineiro é destruir a principal ferramenta do kill (circular por dentro dela). Shear ram é último recurso de emergência."}]},{sit:"Poço fechado às 03:52. Pressões estabilizando ao longo de 10 minutos.",tel:["SIDPP: 425 psi (estável)","SICP: 600 psi (estável)","Pit gain final: 8 bbl"],opts:[{t:"Calcular a KMW com o SIDPP: 10 + 425/(0,17×2.500) = 11,0 lb/gal",pts:5,fb:"Correto. O interior da coluna é a 'régua limpa'. KMW = 10 + 425/425 = 11,0 lb/gal. O SICP está contaminado pelo influxo no anular."},{t:"Calcular a KMW com o SICP, que é a maior pressão",pts:0,fb:"Erro conceitual clássico: o SICP inclui o efeito do influxo leve no anular. Usá-lo superestima a KMW → overkill → ECD alta, risco de perda e MAASP menor."},{t:"Usar a média entre SIDPP e SICP",pts:0,fb:"Não existe base técnica para a média. O cálculo é com o SIDPP — sempre."}]},{sit:"SICP − SIDPP = 175 psi. Capacidade do anular no fundo: 0,05 bbl/m. Com 8 bbl de ganho, a altura do influxo é 160 m. Gradiente do fluido: 1,70 psi/m.",tel:["Altura do influxo: 8 ÷ 0,05 = 160 m","Gradiente influxo = 1,70 − (175 ÷ 160)"],opts:[{t:"Gradiente ≈ 0,61 psi/m → provável GÁS: preparar para migração e expansão",pts:5,fb:"1,70 − 1,09 = 0,61 psi/m, faixa de gás. Isso muda tudo: vigiar migração com o poço fechado e planejar a expansão controlada na circulação."},{t:"Gradiente ≈ 0,61 psi/m → líquido, sem pressa",pts:0,fb:"0,2–0,7 psi/m é assinatura de GÁS. Líquidos ficam próximos de 1,0–1,5. Confundir a natureza do influxo atrasa as decisões que importam."},{t:"Esse cálculo não serve para nada na prática",pts:0,fb:"Serve para a decisão mais importante: gás migra e expande; líquido não. Método, urgência e pressões máximas dependem disso."}]}],debrief:["Drilling break → flow check, sempre. É alerta, não positivo — mas nunca se ignora.","Fluxo crescente com bombas paradas = fechar. A 'certeza' se busca com o poço fechado.","Hard shut-in: espaçar → fechar anular → abrir HCR. Sequência decorada ANTES do kick.","KMW se calcula com SIDPP. SICP é contaminado pelo influxo.","SICP−SIDPP + altura do influxo revelam a natureza: gás pede vigilância de migração."]},{id:"s2",title:"A manobra que não fecha a conta",lvl:"Intermediário",tag:"Kick de manobra",intro:'Retirada de coluna a 1.800 m, fase 8½", fluido 10,5 lb/gal. Slug bombeado e contabilizado. Trip sheet aberta, poço sendo completado pelo trip tank a cada 5 seções.',steps:[{sit:"Nas últimas 5 seções retiradas, o poço deveria receber 4,7 bbl (deslocamento de aço). O trip tank mostra que aceitou apenas 2,9 bbl.",tel:["Esperado: 4,7 bbl","Real: 2,9 bbl","Discrepância: −1,8 bbl","Tendência: segunda medição consecutiva abaixo"],opts:[{t:"Parar a manobra e fazer flow check",pts:5,fb:"Correto. Poço aceitando MENOS que o calculado = algo ocupando espaço lá embaixo. Discrepância de trip sheet é gatilho de parada, não de interpretação criativa."},{t:"Atribuir ao slug e continuar — a conta do slug sempre confunde",pts:0,fb:"O slug foi contabilizado na abertura da trip sheet. 'Explicar' discrepâncias sem verificar é o mecanismo clássico do kick de manobra que cresce em silêncio."},{t:"Bombear os 1,8 bbl que faltam e seguir a retirada",pts:0,fb:"Isso força o número a fechar no papel e esconde o influxo no poço. A conta precisa fechar pela física, não pela bomba."}]},{sit:"Flow check: 12 minutos de observação no trip tank.",tel:["Fluxo: lento, CONSTANTE (não decai)","+0,6 bbl em 12 min","Coluna: 60% dentro do poço"],opts:[{t:"Fluxo constante = kick. Instalar FOSV ABERTA na coluna, fechar a FOSV, fechar o anular",pts:5,fb:"Sequência correta do kick em manobra: a FOSV desce aberta (rosqueia mesmo com fluxo pela coluna), fecha-se a válvula e depois o poço. Interior e anular contidos."},{t:"Fechar o anular primeiro e depois cuidar da coluna",pts:2,fb:"Fecha o anular mas deixa o interior da coluna aberto na mesa — se o influxo subir por dentro, é fluxo na cara da equipe. A FOSV vem primeiro."},{t:"Descer a coluna rápido de volta ao fundo antes que o kick cresça",pts:0,fb:"Descer com o poço fluindo aberto = surge + tempo + influxo crescendo. Fecha-se primeiro; o retorno ao fundo será feito de forma controlada."}]},{sit:"Poço fechado. SIDPP 95 psi, SICP 240 psi, estáveis. A coluna está a 1.080 m do fundo (720 m descidos). O kill de onde a coluna está seria ineficiente.",tel:["Bit off bottom: 1.080 m","SIDPP: 95 psi","SICP: 240 psi","Migração: não evidente ainda"],opts:[{t:"Strippar de volta ao fundo: anular com pressão reduzida, sangrando o deslocamento de cada tubo no trip tank",pts:5,fb:"Padrão-ouro do kick de manobra: retornar ao fundo por stripping com contabilidade rigorosa. Só do fundo o kill remove todo o influxo."},{t:"Circular o kill de onde a coluna está",pts:1,fb:"Circular acima do influxo não o remove — o fluido de matar passa por cima e o gás fica embaixo, migrando. Ganha-se sensação de ação e perde-se o controle real."},{t:"Esperar preparar fluido pesado antes de decidir",pts:0,fb:"KMW aqui é secundária: SIDPP 95 psi pede pouco peso. O problema é POSIÇÃO da coluna — e esperar convida a migração para a conversa."}]},{sit:"Durante o stripping, as pressões começam a subir: SICP 240 → 265 → 290 psi em 40 min, com SIDPP acompanhando.",tel:["SICP: +50 psi em 40 min","SIDPP: subindo junto","Stripping: 12 tubos descidos"],opts:[{t:"Gás migrando: combinar stripping com método volumétrico — duas contabilidades em paralelo",pts:5,fb:"Correto. Sobe pressão além do esperado pelo deslocamento = migração. Sangra-se o volume do tubo + o volume do controle volumétrico, cada um no seu caderno."},{t:"Parar o stripping e apenas observar",pts:1,fb:"Parar não resolve a migração — as pressões continuarão subindo. O stripping+volumétrico resolve as duas coisas de uma vez."},{t:"Sangrar pressão pelo choke até voltar a 240 psi, sem medir volume",pts:0,fb:"Sangria sem contabilidade volumétrica reduz a pressão de fundo abaixo da formação = MAIS influxo. É o erro que transforma um kick pequeno em evento longo."}]}],debrief:["Trip sheet é detector de kick: 'aceitou menos' = parar e flow check, sem interpretação criativa.","Kick em manobra: FOSV aberta → fechar FOSV → fechar anular. O interior da coluna também é caminho de fluxo.","Coluna fora do fundo: stripping de volta, sangrando o deslocamento de cada tubo.","Pressões subindo durante o stripping = migração: rodar volumétrico em paralelo.","Sangrar sem contabilidade de volume convida mais influxo — sempre."]},{id:"s3",title:"Fechado e subindo",lvl:"Intermediário",tag:"Migração e volumétrico",intro:"Kick de gás fechado há 40 min a 2.200 m TVD, fluido 11,0 lb/gal (gradiente 1,87 psi/m). Bomba de matar em manutenção — SEM circulação disponível por ~3 horas. Capacidade do anular: 0,05 bbl/m.",steps:[{sit:"Leituras a cada 15 minutos mostram tendência clara.",tel:["SIDPP: 450 → 470 → 490 psi","SICP: 620 → 655 → 690 psi","Ambas subindo ~80 psi/h, JUNTAS"],opts:[{t:"Assinatura de migração de gás: o influxo sobe sem expandir e pressuriza o poço todo",pts:5,fb:"Exato. Subida conjunta e contínua de SIDPP e SICP com poço fechado = gás migrando selado, carregando a pressão do fundo para cima."},{t:"As pressões estão 'terminando de estabilizar' — aguardar mais",pts:0,fb:"Estabilização tem cara de curva que deita. Subida LINEAR contínua é migração — esperar só deixa as pressões maiores e a sapata mais perto do limite."},{t:"Provável vazamento no BOP pressurizando o anular",pts:0,fb:"Vazamento não explica o SIDPP subindo junto. A física da migração explica exatamente esse padrão."}]},{sit:"Sem bomba por 3 horas. A 80 psi/h, a pressão subirá ~240 psi nesse período. MAASP atual: 610 psi de folga sobre o SICP.",tel:["Velocidade de migração ≈ 80 ÷ 1,87 ≈ 43 m/h","Sapata a ~900 m acima do influxo","Folga até MAASP: 610 psi"],opts:[{t:"Iniciar o método volumétrico: permitir expansão controlada trocando volume por pressão",pts:5,fb:"É o método feito para ESTA situação: sem circulação, com migração. Margens definidas, sangrias medidas, BHP constante."},{t:"Aguardar a bomba ficar pronta monitorando",pts:1,fb:"3 h × 80 psi/h = +240 psi em tudo. A folga aguenta ESTA vez — mas você aceitou risco crescente tendo método disponível. Volumétrico não precisa de bomba."},{t:"Bullheading: empurrar o gás de volta para a formação",pts:1,fb:"Bullheading sem bomba de matar? E mesmo com bomba auxiliar: é exceção justificada por risco maior (H2S, gás no riser) — não é o caso. O volumétrico resolve com menos risco."}]},{sit:"Volumétrico definido: margem de trabalho 100 psi. Gradiente 1,87 psi/m; capacidade 0,05 bbl/m → cada bbl sangrado 'vale' 1,87/0,05 ≈ 37 psi.",tel:["Margem: deixar subir 100 psi","Valor do barril: ≈ 37 psi/bbl","SICP no gatilho: 790 psi"],opts:[{t:"Ao atingir o gatilho, sangrar ≈ 2,7 bbl medidos no trip tank e fechar de novo",pts:5,fb:"100 ÷ 37 ≈ 2,7 bbl. Sangria MEDIDA em volume (não em pressão), repetida a cada ciclo: o gás expande de forma controlada e o BHP se mantém."},{t:"Sangrar até o SICP voltar aos 690 psi originais, sem medir volume",pts:0,fb:"Sangrar 'por pressão' devolve pressão que o fundo precisava: BHP cai abaixo da formação = novo influxo por baixo enquanto se alivia por cima."},{t:"Sangrar 10 bbl de uma vez para ganhar folga",pts:0,fb:"10 bbl ≈ 370 psi de hidrostática removida — muito além da margem. O fundo despenca para underbalance e o kick se realimenta."}]},{sit:"Três ciclos executados. O gás está mais raso; as sangrias trazem fluido cada vez mais cortado. A bomba ficou pronta.",tel:["Ciclos completados: 3","Gás estimado: terço superior do poço","Bomba de matar: disponível"],opts:[{t:"Transicionar para circulação convencional (Driller's) com kill sheet atualizada",pts:5,fb:"Com bomba disponível, a circulação devolve o controle fino: remove o influxo pelo choke com BHP constante. O volumétrico cumpriu o papel de ponte."},{t:"Continuar no volumétrico até o gás sair todo pelo choke",pts:2,fb:"Possível (lubricate & bleed na fase final), mas mais lento e delicado que circular tendo bomba pronta. Aceitável; não ótimo."},{t:"Abrir o poço agora que a pressão baixou",pts:0,fb:"O poço continua com influxo dentro e formação viva. Abrir = kick recomeça com plateia."}]}],debrief:["SIDPP e SICP subindo JUNTAS com poço fechado = migração de gás. Não é estabilização.","Migração (m/h) ≈ taxa (psi/h) ÷ gradiente (psi/m). Faça essa conta sempre.","Volumétrico: sangrias por VOLUME calculado, nunca por pressão-alvo.","Valor do barril = gradiente ÷ capacidade do anular. No exemplo: ≈ 37 psi/bbl.","O volumétrico é ponte: com bomba disponível, transicione para a circulação."]},{id:"s4",title:"Devolvendo fluido",lvl:"Intermediário",tag:"Ballooning × kick",intro:`Fase 12¼" em formação microfraturada conhecida por ballooning. Nas últimas 6 horas o poço 'bebeu' 5 bbl com bombas ligadas (ECD). Fluido 12,4 lb/gal, janela operacional estreita.`,steps:[{sit:"Bombas desligadas para conexão. O poço começa a devolver fluido.",tel:["Devolvido: 3,1 bbl em 10 min","Taxa: DECRESCENTE (0,6 → 0,2 bbl/min)","Histórico: perdeu 5 bbl circulando"],opts:[{t:"Fechar o poço e ler as pressões — o diagnóstico se faz fechado",pts:5,fb:"Regra de ouro: ballooning × kick se decide FECHADO. Custa minutos; errar aberto custa o evento."},{t:"Padrão claro de ballooning (decrescente, devolvendo o que perdeu): conectar e seguir",pts:1,fb:"O padrão SUGERE ballooning — mas 'diagnosticar' aberto é aposta. O quarto evento igualzinho aos três anteriores é onde mora o kick. Fechar custa nada."},{t:"Flow check estendido de 30 min no trip tank antes de decidir",pts:3,fb:"Melhor que assumir — mas 30 min de poço aberto com um kick real em curso é caro. As pressões de fechamento respondem em 10 min com risco zero."}]},{sit:"Poço fechado. Leituras após 10 minutos.",tel:["SICP: 40 psi → caindo → 15 psi estável","SIDPP: 0 psi","Volume devolvido total: 3,4 bbl (< 5 perdidos)"],opts:[{t:"Consistente com ballooning: pressões baixas e caindo, volume devolvido menor que o perdido",pts:5,fb:"Assinatura de ballooning: a formação devolve o fluido injetado pela ECD e a 'pressão' morre sozinha. Kick sustentaria ou subiria as pressões."},{t:"Qualquer pressão no anular = kick: pesar o fluido",pts:0,fb:"Pesar aqui é o ERRO — janela estreita: mais peso = mais perda = mais ballooning = mais confusão (e risco real de perda total → kick por queda de nível)."},{t:"Inconclusivo: manter fechado por 2 horas",pts:1,fb:"Pressão caindo a quase zero e estável já concluiu. Manter fechado sem propósito só atrasa a operação e ensina a equipe a desconfiar do próprio critério."}]},{sit:"Decisão de reabrir tomada. Como proteger as próximas conexões?",tel:["Formação balonante mapeada","Janela: poros 12,2 / fratura ~12,8 eq","ECD atual: 12,75"],opts:[{t:"Registrar volumes perdido/devolvido por ciclo, reduzir ECD (vazão/reologia) e fechar para conferir a QUALQUER quebra de padrão",pts:5,fb:"Gestão profissional do ballooning: baseline documentada + atacar a causa (ECD comendo a fratura) + gatilho claro de verificação."},{t:"Ignorar devoluções futuras — já está provado que é ballooning",pts:0,fb:"O ballooning de hoje não imuniza o poço do kick de amanhã. Ballooning e kick podem inclusive coexistir. Cada evento se verifica."},{t:"Pesar levemente o fluido 'por garantia'",pts:0,fb:"Com ECD a 0,05 da fratura, qualquer peso extra aumenta a perda. Aqui o inimigo é o teto da janela, não o piso."}]}],debrief:["Ballooning × kick: decide-se FECHADO, lendo pressões — nunca 'no olho' com o poço aberto.","Assinatura de ballooning: pressões baixas caindo a ~zero + devolvido ≤ perdido + taxa decrescente.","Em janela estreita, pesar 'por garantia' agrava: a ECD já está comendo o teto.","Baseline documentada por formação: o dia em que os números não fecharem, você nota.","Ballooning confirmado ontem não dispensa a verificação de hoje."]},{id:"s5",title:"O choke entope no meio do kill",lvl:"Intermediário",tag:"Circulação — problemas",intro:"1ª circulação do Driller's Method em andamento: 30 spm, alvo coluna = ICP 1.075 psi. Gás previsto na superfície em ~40 min. Choke remoto em operação; manual e reserva alinháveis no manifold.",steps:[{sit:"Em menos de um minuto, as duas pressões sobem juntas, rápido.",tel:["Coluna: 1.075 → 1.190 psi","Casing: 700 → 815 psi","Vazão: constante 30 spm","Choke: sem comando alterado"],opts:[{t:"Subida conjunta e rápida = PLUGGING do choke (obstrução restringindo a saída)",pts:5,fb:"Assinatura clássica: cascalho/hidrato/borracha restringe o choke → pressão represa nos DOIS lados. Diagnóstico em segundos pelo padrão."},{t:"O gás chegou ao choke — comportamento esperado",pts:0,fb:"Gás no choke faz o CASING oscilar e exige fechar o choke para compensar a leveza — não sobe as duas pressões em bloco com o choke parado. E o gás estava previsto para dali a 40 min."},{t:"A bomba está acelerando sozinha",pts:0,fb:"O contador mostra 30 spm constantes. Verificar é bom; travar o diagnóstico no padrão das pressões é melhor."}]},{sit:"Plugging confirmado. Pressões continuam subindo: coluna 1.240, casing 860. A MAASP é 1.050 psi.",tel:["Coluna: 1.240 psi ↑","Casing: 860 psi ↑","MAASP: 1.050 psi","Choke reserva: alinhável em ~2 min"],opts:[{t:"Parar a bomba, fechar o poço, alinhar o choke reserva e reiniciar a partida",pts:5,fb:"Resposta padrão: condição estática segura primeiro. Poço fechado aguenta e espera; o realinhamento se faz sem pressa e a partida recomeça pelo procedimento."},{t:"Abrir mais o choke remoto para 'desentupir' pela força",pts:1,fb:"Às vezes passa o bloqueio — às vezes ejeta a obstrução e o choke ERODE (washout). Tentativa de segundos é tolerável; insistir com MAASP se aproximando, não."},{t:"Continuar bombeando enquanto alguém alinha a reserva com fluxo",pts:0,fb:"Manobrar válvulas do manifold sob fluxo e pressão subindo, com casing caminhando para a MAASP, soma riscos sem necessidade. O poço fechado espera."}]},{sit:"Poço fechado, choke reserva alinhado. SIDPP e SICP conferidos e coerentes com o estágio do kill. Reinício.",tel:["SIDPP: coerente com o previsto","Reserva: alinhado e testado","Bomba: pronta"],opts:[{t:"Partida padrão: subir a bomba devagar mantendo o CASING constante no choke até a vazão de matar; conferir coluna ≈ alvo",pts:5,fb:"O mesmo procedimento de partida de sempre — o kill não improvisa nem nas retomadas. Casing constante na subida preserva o BHP."},{t:"Voltar direto a 30 spm e ajustar depois",pts:0,fb:"Saltar a partida gradual descontrola o BHP justamente na fase mais sensível. A pressa aqui planta o segundo problema."},{t:"Recomeçar o kill do zero com nova kill sheet",pts:1,fb:"Desnecessário: o influxo está onde estava, os dados valem. Atualiza-se a contagem de strokes e segue-se do ponto de parada."}]}],debrief:["Plugging: DUAS pressões sobem juntas e rápido. Washout: as duas caem devagar. Padrões que se decoram.","Resposta padrão a problema no kill: parar bomba, fechar, resolver, reiniciar pela partida.","Poço fechado é condição SEGURA — usá-la não é atraso, é método.","MAASP na cabeça o tempo todo: ela define quanta 'tentativa' você pode pagar.","Toda retomada repete a partida gradual: casing constante até a vazão de matar."]},{id:"s6",title:"Gás raso na fase de superfície",lvl:"Básico",tag:"Shallow gas / diverter",intro:'Fase 17½" a 480 m, ANTES do revestimento de superfície. Sem BOP definitivo: sistema diverter instalado e linhas overboard alinhadas conforme procedimento. Sísmica indicou possível bolsão raso na área.',steps:[{sit:"Perfurando a 485 m: retorno aumenta de repente, fluido cortado, e o poço começa a fluir com força crescente.",tel:["Fluxo: forte e crescente","Gás no retorno: alto","Profundidade: 485 m (sem sapata profunda)"],opts:[{t:"Acionar o diverter (fluxo para overboard), soar o alarme e afastar pessoal não essencial",pts:5,fb:"Resposta padrão ao gás raso: NÃO se fecha — desvia-se. Sem sapata profunda, fechar pressuriza formações rasas fracas: fratura, fluxo por fora do poço, cratera."},{t:"Fechar o anular do diverter/BOP de superfície para conter",pts:0,fb:"O erro historicamente fatal do gás raso: fechar poço raso = fraturar raso = fluxo migrando por fora do revestimento condutor. Crateração já engoliu sondas assim."},{t:"Parar as bombas e observar o comportamento",pts:0,fb:"Gás raso evolui em MINUTOS. Observar é dar palco para o fluxo crescer com pessoal na área."}]},{sit:"Diverter acionado, fluxo indo overboard a favor do vento. E as bombas?",tel:["Diverter: aberto p/ overboard","Vento: favorável à linha escolhida","Bombas: a decidir"],opts:[{t:"MANTER bombeio na vazão máxima disponível (água/fluido): atrito + densidade ajudam a brigar com o fluxo",pts:5,fb:"Doutrina do gás raso: bombear, não parar — o 'kill dinâmico' usa a perda de carga anular e o que houver de densidade para reduzir o influxo enquanto o diverter protege a sonda."},{t:"Parar as bombas para não 'alimentar' o poço",pts:0,fb:"Ao contrário: parar remove a ECD e o poço flui MAIS. No gás raso, a bomba é aliada."},{t:"Bombear pílula pesada se houver, senão parar",pts:2,fb:"Pílula pesada ajuda se estiver pronta — mas a regra primária é manter vazão máxima JÁ. Não se para a bomba para esperar pílula."}]},{sit:"Fluxo desviado, sonda segura, pessoal afastado. O fluxo começa a perder força após 20 minutos de bombeio contínuo.",tel:["Fluxo overboard: decrescente","Bolsão raso: depletando","Pessoal: seguro e contado"],opts:[{t:"Manter o desvio e o bombeio até o fluxo cessar; só então avaliar retomada com o plano da operação",pts:5,fb:"Bolsões rasos frequentemente depletam. A paciência disciplinada — desvio + bombeio + pessoal longe — é exatamente o plano funcionando."},{t:"Fechar o diverter agora que enfraqueceu, para 'terminar' o fluxo",pts:0,fb:"O diverter NÃO é vaso de pressão — não foi feito para conter, só para direcionar. Fechá-lo recria o risco de pressurizar o raso."},{t:"Retomar a perfuração imediatamente para cimentar o condutor",pts:0,fb:"Retomar com fluxo residual ativo é reabrir o evento. Primeiro cessar, contar pessoal, avaliar — depois plano de reentrada."}]}],debrief:["Gás raso NÃO se fecha: diverter + overboard + pessoal afastado. Fechar raso = risco de cratera.","Bombas em vazão MÁXIMA durante o desvio: ECD e atrito são aliados (kill dinâmico).","O diverter direciona, não contém — jamais 'fechá-lo' para segurar o poço.","Linhas overboard alinhadas ANTES é o que torna a resposta possível em segundos.","Bolsões rasos tendem a depletar: disciplina e paciência vencem."]},{id:"s7",title:"MAASP no limite",lvl:"Avançado",tag:"Decisão de supervisão",intro:"Você é o supervisor. Kick de gás fechado a 3.100 m TVD, fluido 13,0 lb/gal. Sapata a 2.000 m, LOT 15,8 lb/gal eq. → MAASP = (15,8−13)×0,17×2.000 = 952 psi. Barita para o W&W: ~90 min de mistura.",steps:[{sit:"Quadro após estabilização.",tel:["SIDPP: 420 psi","SICP: 900 psi","MAASP: 952 psi — folga de 52 psi","Migração: evidente, ~35 psi/h","Gradiente do influxo estimado: gás"],opts:[{t:"Situação crítica: SICP a 95% da MAASP, gás vai subir e a estática só piora — decidir AGORA",pts:5,fb:"Leitura correta do quadro: com migração ativa, esperar é escolher pressões maiores. As margens definem o relógio da decisão."},{t:"Folga de 52 psi existe — quadro sob controle, sem pressa",pts:0,fb:"52 psi a 35 psi/h = ~90 min até a MAASP, ANTES de considerar o pico do gás na sapata. 'Sob controle' aqui é ilusão de quem olha o número e não a tendência."},{t:"MAASP é conservadora, dá para tolerar passar um pouco",pts:0,fb:"MAASP vem do LOT — dado medido DESTE poço. 'Tolerar um pouco' é fraturar a sapata na teoria alheia. Perda + kick simultâneos é o prêmio."}]},{sit:"Definir a estratégia.",tel:["Bomba de matar: disponível JÁ","Barita p/ KMW 13,8: pronta em ~90 min","Separador: ok","Equipe: completa"],opts:[{t:"Driller's Method imediato: circular o influxo com o fluido atual, permitindo expansão controlada JÁ",pts:5,fb:"Com migração comendo 35 psi/h de uma folga de 52 psi, o tempo vale mais que a vantagem de pressão do W&W. Circular permite ao gás expandir pelo choke — a alternativa estática é vê-lo comprimir a margem."},{t:"Esperar os 90 min da barita e fazer W&W (pressões menores na sapata)",pts:1,fb:"A vantagem do W&W existe — mas em 90 min a migração leva o SICP à MAASP com o poço PARADO. A conta do relógio derrota a conta da pressão neste quadro."},{t:"Sangrar o anular para abrir folga antes de decidir",pts:0,fb:"Sangria sem contabilidade = BHP abaixo da formação = influxo adicional. Você compraria folga em cima vendendo o fundo do poço."}]},{sit:"Driller's iniciado. O topo do gás se aproxima da sapata — o momento de pico de pressão ali.",tel:["Strokes: gás previsto na sapata em ~15 min","SICP: 915 psi","Kill rate: 30 spm"],opts:[{t:"Vigilância dedicada SICP×MAASP nesta janela; se necessário, REDUZIR a kill rate para dar mais tempo de expansão por metro subido",pts:5,fb:"O pico na sapata ocorre com o topo do gás logo abaixo dela. Kill rate menor = mais tempo de expansão controlada por trecho = pico menor. É o ajuste fino de supervisão."},{t:"Acelerar a bomba para o gás passar logo pela sapata",pts:0,fb:"Acelerar aumenta ECD e reduz o tempo de expansão — pico MAIOR exatamente onde não pode. A pressa aqui fratura."},{t:"Fechar o poço até o gás 'se acomodar'",pts:0,fb:"Fechado, o gás migra sem expandir — pressão SOBE. Voltar à estática no momento do pico é escolher o pior dos mundos."}]},{sit:"Gás passou pela sapata com SICP máximo de 942 psi (10 psi de folga). Influxo saindo no separador. Fim da 1ª circulação se aproxima.",tel:["SICP pico: 942 psi (não fraturou)","Separador: dentro da capacidade","Influxo: saindo"],opts:[{t:"Completar a 1ª circulação, confirmar SIDPP≈SICP, e executar a 2ª com a KMW 13,8 pela tabela ICP→FCP",pts:5,fb:"Protocolo completo do Driller's. A barita que ficou pronta durante a 1ª circulação entra agora — o método usou o tempo a favor."},{t:"Poço aguentou o pior — abrir e pesar circulando aberto",pts:0,fb:"O poço ainda tem formação viva e fluido leve. Abrir antes da KMW no lugar é reiniciar o kick com plateia."},{t:"Emendar bullheading do que restou de gás",pts:0,fb:"O gás está SAINDO controlado pelo choke — inverter para injeção agora não tem justificativa técnica e reintroduz risco de fratura."}]}],debrief:["Margem se lê com TENDÊNCIA: folga ÷ taxa de subida = tempo de decisão.","Migração rápida + folga curta: Driller's imediato costuma vencer o W&W — o relógio manda.","O pico na sapata acontece com o topo do gás logo abaixo dela: janela de vigilância dedicada.","Reduzir a kill rate na passagem do gás pela sapata REDUZ o pico. Acelerar aumenta.","Sangrar 'para abrir folga' sem volumetria é comprar tempo em cima vendendo o fundo."]},{id:"s8",title:"Gás no riser",lvl:"Avançado",tag:"Águas profundas",intro:"Sonda DP, lâmina d'água 1.400 m, fluido sintético. Kick controlado e circulado pelo choke com BOP fechado — operação de abertura se aproximando. Trip tank do riser em monitoramento contínuo.",steps:[{sit:"Antes de abrir o BOP, o trip tank do riser começa a ganhar volume. O fluido do riser 'incha' e o retorno pela linha do diverter aumenta.",tel:["Trip tank do riser: +2,5 bbl e subindo","Fluido: sintético (gás solúvel)","BOP: FECHADO — riser isolado do poço"],opts:[{t:"Gás em solução no fluido do riser saindo de solução ao subir — evento ACIMA do BOP, sem barreira abaixo dele",pts:5,fb:"A armadilha do fluido sintético: gás dissolvido não aparece no pit gain e 'ferve' de repente ao despressurizar perto da superfície. O riser não tem BOP acima — é zona sem barreira secundária."},{t:"Vazamento do BOP deixando o kick passar",pts:1,fb:"Hipótese a verificar (pressões abaixo do BOP estáveis?) — mas o padrão clássico com sintético é gás em solução no fluido que JÁ estava no riser. As pressões do poço estáveis fecham o diagnóstico."},{t:"Expansão térmica normal do fluido do riser",pts:0,fb:"Térmica não produz ganho crescente e acelerando com gás visível no retorno. O padrão é de gás saindo de solução."}]},{sit:"Gás no riser confirmado, volume crescendo. Decisão imediata:",tel:["Ganho: acelerando","Pessoal: piso da sonda ocupado","Diverter: disponível","BOP: mantido fechado"],opts:[{t:"Alinhar o diverter overboard, afastar pessoal não essencial e seguir o plano específico de gás no riser",pts:5,fb:"Doutrina: acima do BOP não há como 'fechar' — o riser não contém pressão. Desviar, proteger pessoas e executar o plano treinado."},{t:"Abrir o BOP para circular o riser junto com o poço",pts:0,fb:"Abrir o BOP reconecta o poço vivo ao riser em plena emergência — o oposto de isolar o problema. O BOP fica FECHADO."},{t:"Fechar o elemento do diverter para conter o gás no riser",pts:0,fb:"O diverter direciona fluxo; não é vaso de pressão. 'Conter' nele é rompê-lo no piso da sonda."}]},{sit:"Diverter overboard atuando, pessoal afastado. Próximo passo técnico para eliminar o gás do riser:",tel:["Booster line / bombas do riser: disponíveis","Fluido de reposição: pronto","Vento: monitorado"],opts:[{t:"Circular o riser (booster/linhas dedicadas) substituindo o fluido gaseificado por fluido limpo, com o desvio mantido",pts:5,fb:"É o procedimento: varrer o riser com fluido novo enquanto o gás sai desviado. O riser volta a ter coluna íntegra antes de qualquer abertura de BOP."},{t:"Aguardar o gás 'sair sozinho' pelo desvio",pts:1,fb:"Parte sai — mas fluido gaseificado no riser é coluna comprometida. Sem varrer com fluido limpo, a abertura futura do BOP fica hipotecada."},{t:"Deslocar o riser para água do mar para 'limpar mais rápido'",pts:0,fb:"Água do mar DERRUBA a hidrostática do riser — se depois se abre o BOP, o poço sente o degrau. (Exatamente essa troca esteve no centro de Macondo.)"}]}],debrief:["Fluido sintético dissolve gás: o kick pode viajar invisível e 'ferver' no riser sem aviso.","Acima do BOP não existe fechamento: gás no riser = diverter + pessoal + plano específico.","O BOP permanece FECHADO durante o evento no riser — isolar é a única vantagem disponível.","Eliminação: circular o riser com fluido limpo pelo circuito dedicado, desvio mantido.","Deslocar riser para água do mar remove hidrostática — decisão que exige análise de barreiras, nunca reflexo."]},{id:"s9",title:"O teste que 'quase' passou",lvl:"Avançado",tag:"Barreiras / lições reais",intro:"Poço sendo abandonado temporariamente após cimentação. Teste de pressão NEGATIVO para verificar a barreira de cimento: reduzir a hidrostática acima e observar. Critério escrito: fluxo zero e pressão estável ≤ tolerância definida.",steps:[{sit:"Hidrostática reduzida. Observação de 30 minutos.",tel:["Pressão no drill pipe: 0 → 260 psi em 30 min","Volume devolvido no bleed: 15 bbl (esperado: 3–5)","Kill line: mantida fechada até aqui"],opts:[{t:"Teste REPROVADO pelos critérios: pressão construindo + volume devolvido 3× o esperado = comunicação com a formação",pts:5,fb:"É o que os números dizem. Pressão que constrói do zero e volume anômalo indicam que algo flui através da barreira testada. O critério escrito existe para este momento."},{t:"Resultado ambíguo: repetir a leitura pela kill line antes de concluir",pts:2,fb:"Verificação adicional não é errada — MAS cuidado: uma leitura zero na kill line NÃO anula os 260 psi no drill pipe. Duas leituras conflitantes = teste reprovado até explicação física comprovada."},{t:"Aprovar: 260 psi é pouco e o cimento 'precisa de tempo'",pts:0,fb:"Barreira boa não constrói pressão nenhuma. 'Aprovar com ressalva mental' foi exatamente o mecanismo de Macondo."}]},{sit:"A leitura repetida pela kill line marca 0 psi — mas o drill pipe segue com 260 psi. Um membro experiente da equipe propõe: 'é o efeito bladder, o teste está bom'.",tel:["Kill line: 0 psi","Drill pipe: 260 psi (sustentados)","Explicação proposta: 'bladder effect'"],opts:[{t:"Rejeitar a explicação: não há mecanismo físico validado que sustente pressão real num lado e zero no outro do MESMO sistema — investigar antes de qualquer aprovação",pts:5,fb:"Duas medições do mesmo sistema divergindo = problema de alinhamento, tampão nas linhas ou fluxo real. Em Macondo, o 'bladder effect' aprovou verbalmente um teste que os manômetros reprovavam — horas antes do blowout."},{t:"Acatar a experiência do colega: aprovar pelo zero da kill line",pts:0,fb:"Hierarquia e experiência não mudam a física. A régua de um teste de barreira é o critério ESCRITO — a explicação sem mecanismo comprovado é otimismo com nome técnico."},{t:"Aprovar, mas 'ficar de olho' na continuação",pts:0,fb:"Barreira aprovada libera operações que REMOVEM outras barreiras (deslocar fluido, retirar coluna). 'Ficar de olho' não segura poço: barreira segura."}]},{sit:"Teste tratado como reprovado. Investigação encontra a possível causa nas linhas; o teste será refeito do zero.",tel:["Decisão: reprovado / refazer","Pressões: monitoradas","Operação: pausada"],opts:[{t:"Refazer com condição documentada: alinhamento verificado, critérios de aceitação relidos em voz alta ANTES, resultados registrados por escrito",pts:5,fb:"Teste de barreira é cerimônia com regras prévias: todos sabem, antes, o que aprova e o que
