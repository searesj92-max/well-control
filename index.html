:"A pressão hidrostática depende de:",alts:["Densidade e profundidade vertical (TVD)","Densidade e profundidade medida (MD)","Vazão e densidade","Diâmetro do poço e TVD"],correct:0,exp:"PH = 0,17 × densidade × TVD."},{q:"Fluido de 10 lb/gal a 2.000 m de TVD gera PH de:",alts:["2.000 psi","3.400 psi","4.000 psi","1.700 psi"],correct:1,exp:"0,17 × 10 × 2000 = 3.400 psi."},{q:"Overbalance significa:",alts:["PH menor que a pressão de poros","PH maior que a pressão de poros","Poço fraturado","Bomba acima da vazão máxima"],correct:1,exp:"Situação normal e segura de perfuração."},{q:"A causa mais comum de kick é:",alts:["Broca gasta","Não completar o poço com fluido na manobra","BOP com vazamento","Excesso de densidade"],correct:1,exp:"Nível cai, hidrostática cai, formação invade."},{q:"O efeito swab acontece quando:",alts:["A coluna desce rápido","A coluna é puxada rápido, reduzindo a pressão no fundo","A bomba é acelerada","O choke é fechado"],correct:1,exp:"Pistoneio reduz a pressão de fundo e pode induzir kick."},{q:"Qual destes é um sinal POSITIVO de kick?",alts:["Aumento de torque","Ganho de volume nos tanques","Queda da taxa de penetração","Aumento do peso sobre a broca"],correct:1,exp:"Pit gain indica influxo em andamento."},{q:"Poço fluindo com as bombas desligadas indica:",alts:["ECD alta","Kick em andamento","Funcionamento normal","Perda de circulação"],correct:1,exp:"Flow check positivo: fechar o poço."},{q:"O drilling break é:",alts:["Quebra da broca","Aumento brusco da taxa de penetração","Parada da rotação","Queda de pressão no acumulador"],correct:1,exp:"Sinal de alerta: pode ser zona porosa/pressurizada."},{q:"O BOP anular é capaz de fechar:",alts:["Só em drill pipe","Só em poço aberto","Em qualquer diâmetro e até em poço aberto","Somente no kelly"],correct:2,exp:"Elemento de borracha se molda ao que estiver no poço."},{q:"A gaveta cega serve para:",alts:["Cortar a coluna","Fechar o poço sem coluna dentro","Fechar sobre o tool joint","Vedar o riser"],correct:1,exp:"Blind ram fecha poço vazio."},{q:"A gaveta cisalhante:",alts:["É a primeira a ser usada","Corta a coluna e sela o poço, como último recurso","Serve só para teste","Fecha apenas em casing"],correct:1,exp:"Shear ram é o recurso final."},{q:"O acumulador (Koomey) serve para:",alts:["Armazenar fluido de perfuração","Acionar o BOP mesmo sem energia da sonda","Separar gás do fluido","Medir pressão de poros"],correct:1,exp:"Garrafas de N2 + fluido hidráulico garantem acionamento."},{q:"O choke manifold serve para:",alts:["Aumentar a vazão da bomba","Circular o kick com pressão controlada","Medir densidade","Testar o revestimento"],correct:1,exp:"Controla a contrapressão na circulação do kick."},{q:"O trip tank é usado para:",alts:["Armazenar produto químico","Monitorar com precisão os volumes do poço na manobra","Misturar fluido de matar","Resfriar a broca"],correct:1,exp:"Tanque pequeno e calibrado: o vigia da manobra."},{q:"TVD é:",alts:["O comprimento perfurado","A profundidade vertical","O diâmetro do poço","A profundidade da sapata"],correct:1,exp:"Para pressão, sempre TVD; MD é o comprimento do poço."},{q:"A ECD é maior que a densidade estática porque:",alts:["O fluido esquenta","O atrito no anular soma pressão no fundo","A broca gera pressão","O gás entra no fluido"],correct:1,exp:"Circulando, a perda de carga anular aumenta a pressão de fundo."},{q:"O momento clássico de ocorrer kick relacionado à ECD é:",alts:["Ao ligar as bombas","Ao desligar as bombas","Ao girar a coluna","Ao fechar o choke"],correct:1,exp:"Sem circulação, a pressão de fundo cai para a estática."},{q:"Qual influxo é o mais perigoso?",alts:["Água salgada","Óleo","Gás","Água doce"],correct:2,exp:"O gás expande ao subir e reduz muito a hidrostática."},{q:"A pressão de fratura é:",alts:["A pressão dos fluidos da rocha","A pressão que quebra a rocha e causa perda","A pressão do BOP","A pressão de teste da coluna"],correct:1,exp:"Limite superior da janela operacional."},{q:"A janela operacional do fluido fica entre:",alts:["Pressão de poros e de fratura","Zero e a pressão de poros","PH e ECD","SIDPP e SICP"],correct:0,exp:"Abaixo dá kick; acima dá perda/fratura."},{q:"Diante de um sinal positivo de kick, a atitude correta é:",alts:["Investigar antes de fechar","Fechar o poço primeiro e investigar depois","Aumentar a vazão","Continuar perfurando devagar"],correct:1,exp:"Cada segundo aberto aumenta o influxo."},{q:"Na manobra de retirada, o volume de fluido bombeado ao poço deve ser igual:",alts:["Ao volume do tanque de reserva","Ao volume de aço retirado","À capacidade do riser","Ao volume do anular"],correct:1,exp:"Diferença indica possível influxo (ou perda)."},{q:"O degasser serve para:",alts:["Retirar gás do fluido de retorno","Injetar gás no poço","Medir gás na formação","Acionar o BOP"],correct:0,exp:"Remove o gás antes de o fluido voltar aos tanques."},{q:"A válvula de segurança de manobra (FOSV/TIW) é usada para:",alts:["Fechar o anular","Fechar a coluna se o poço fluir por dentro dela","Testar a sapata","Ancorar o BOP"],correct:1,exp:"Instalada aberta e depois fechada sobre a coluna."},{q:"A regra de barreiras da indústria exige:",alts:["Uma barreira testada","Duas barreiras testadas e independentes","Três barreiras quaisquer","Barreira apenas em poço de gás"],correct:1,exp:"Duas barreiras independentes entre formação e superfície."},{q:"A balança de lama mede:",alts:["Viscosidade","Densidade do fluido","Teor de sólidos","pH"],correct:1,exp:"Densidade define a hidrostática."},{q:"A perda de circulação pode causar kick porque:",alts:["Aumenta a densidade","O nível de fluido cai e a PH diminui","Esfria o poço","Aumenta a ECD"],correct:1,exp:"Poço sem coluna cheia perde hidrostática."},{q:"Blowout é:",alts:["Qualquer kick","Fluxo descontrolado da formação para a superfície ou outra formação","Teste de BOP","Perda total de circulação"],correct:1,exp:"É o kick que não foi controlado."}]},{level:"Introdutório",num:2,questions:[{q:"Fluido de 12 lb/gal a 1.500 m de TVD gera PH de:",alts:["3.060 psi","2.550 psi","1.800 psi","3.600 psi"],correct:0,exp:"0,17 × 12 × 1500 = 3.060 psi."},{q:"Underbalance é quando:",alts:["PH > pressão de poros","PH < pressão de poros","PH = pressão de fratura","O poço está fechado"],correct:1,exp:"A formação pode fluir para o poço."},{q:"Dois poços com o mesmo fluido: um vertical com TVD 2.000 m e um direcional com MD 2.600 m e TVD 2.000 m. A PH no fundo é:",alts:["Maior no direcional","Maior no vertical","Igual nos dois","Depende da vazão"],correct:2,exp:"PH depende só de densidade e TVD."},{q:"Qual é sinal de ALERTA (não positivo) de kick?",alts:["Pit gain","Poço fluindo parado","Drilling break","Retorno maior que o aço retirado"],correct:2,exp:"Alerta pede flow check; os demais são positivos."},{q:"O flow check consiste em:",alts:["Trocar o fluido","Parar as bombas e observar se o poço flui","Testar o BOP","Medir densidade"],correct:1,exp:"Observação no trip tank ou linha de retorno."},{q:"A gaveta de tubo (pipe ram) fecha:",alts:["Em qualquer diâmetro","Em um diâmetro específico de tubo","Só sem coluna","Só no revestimento"],correct:1,exp:"Cada pipe ram tem seu diâmetro (ou faixa, no caso da variável)."},{q:"As linhas de kill e choke conectam:",alts:["Bomba ao topdrive","BOP ao choke manifold","Tanques ao trip tank","Riser ao diverter"],correct:1,exp:"Caminhos de bombeio e retorno com o poço fechado."},{q:"O corte do fluido por gás:",alts:["Aumenta a densidade","Reduz a densidade e a PH","Não altera nada","Aumenta a PH"],correct:1,exp:"Fluido gaseificado pesa menos."},{q:"Se a bomba mantém os strokes e a vazão de retorno aumenta, isso indica:",alts:["Perda de circulação","Influxo da formação","Bomba com defeito","Choke aberto"],correct:1,exp:"Algo a mais está saindo do poço: kick."},{q:"Pressões anormais na formação são perigosas porque:",alts:["Danificam a broca","Podem superar a PH planejada e gerar kick","Aumentam o torque","Esfriam o poço"],correct:1,exp:"Densidade do projeto pode ficar insuficiente."},{q:"O inside BOP é:",alts:["Uma gaveta interna do BOP","Válvula de retenção instalada na coluna","Um sensor de pressão","O anular submarino"],correct:1,exp:"Impede fluxo pelo interior da coluna."},{q:"Antes de fechar o BOP perfurando, a coluna deve ser posicionada para:",alts:["Deixar o tool joint na frente das gavetas","Deixar o tool joint fora das gavetas","Apoiar a broca no fundo","Sair totalmente do poço"],correct:1,exp:"Nunca fechar gaveta em tool joint."},{q:"Fluido de 9 lb/gal. Para gerar 3.060 psi de PH, a TVD necessária é:",alts:["1.500 m","2.000 m","2.500 m","3.000 m"],correct:1,exp:"TVD = 3060 ÷ (0,17 × 9) = 2.000 m."},{q:"O poor boy degasser (separador atmosférico) atua:",alts:["Antes da bomba","Na linha de retorno do choke, separando gás do fluido","Dentro do poço","No acumulador"],correct:1,exp:"Separa o gás circulado do kick."},{q:'Quem "segura" a formação 24 h por dia é:',alts:["O BOP","O fluido de perfuração","O choke","O revestimento"],correct:1,exp:"Por isso é a barreira primária."},{q:"Se o poço devolve mais fluido do que o volume de aço descido na manobra:",alts:["Normal","Possível kick: flow check e fechar se confirmar","Perda de circulação","Bomba ligada"],correct:1,exp:"Retorno em excesso indica influxo."},{q:"O kelly cock é:",alts:["Válvula de segurança na parte superior da coluna","Um tipo de gaveta","Sensor de vazão","Válvula do choke"],correct:0,exp:"Fecha o interior da coluna na superfície."},{q:"Aumentar a densidade do fluido:",alts:["Diminui a PH","Aumenta a PH","Não altera a PH","Só altera a ECD"],correct:1,exp:"PH é proporcional à densidade."},{q:"O gás, ao subir num poço aberto (sem controle), tende a:",alts:["Se dissolver","Expandir e empurrar fluido para fora","Afundar","Manter o volume"],correct:1,exp:"Expansão descontrolada expulsa fluido e agrava o kick."},{q:"Qual equipamento retira o poço da rota do pessoal em kick raso (antes do BOP no fundo do mar assentar)?",alts:["Choke manifold","Diverter","Degasser","Acumulador"],correct:1,exp:"O diverter desvia o fluxo para longe da sonda."},{q:"Pressão de poros é medida/estimada para:",alts:["Definir a densidade do fluido","Escolher a broca","Calcular torque","Definir vazão"],correct:0,exp:"A densidade deve superá-la com margem."},{q:"Qual situação REDUZ a pressão no fundo do poço?",alts:["Aumentar densidade","Puxar a coluna rápido (swab)","Ligar as bombas","Fechar o choke"],correct:1,exp:"Swab é sucção: risco de kick."},{q:"Fluido 11 lb/gal, TVD 1.000 m. PH =",alts:["1.870 psi","1.100 psi","2.200 psi","1.700 psi"],correct:0,exp:"0,17 × 11 × 1000 = 1.870 psi."},{q:"O nível dos tanques é importante porque:",alts:["Mostra a temperatura","É o principal indicador de ganho/perda de volume","Define a densidade","Mede a vazão da bomba"],correct:1,exp:"Pit gain/pit loss são vigiados o tempo todo."},{q:'Duas barreiras "independentes" significa:',alts:["Que uma depende da outra","Que a falha de uma não derruba a outra","Que ficam no mesmo lugar","Que são do mesmo tipo"],correct:1,exp:"Independência é o coração da filosofia de barreiras."},{q:"Fechar o poço rapidamente em um kick serve para:",alts:["Aumentar o influxo","Limitar o volume do influxo e as pressões futuras","Testar o BOP","Economizar fluido"],correct:1,exp:"Influxo menor = controle mais fácil."},{q:"O revestimento cimentado contribui para o controle do poço porque:",alts:["Aumenta a vazão","Isola formações e protege trechos já perfurados","Reduz a densidade","Substitui o BOP"],correct:1,exp:"Isola zonas e dá integridade ao poço."},{q:"Água salgada entrando no poço tende a:",alts:["Aumentar a densidade do fluido","Reduzir a densidade média e contaminar o fluido","Não alterar nada","Endurecer o cimento"],correct:1,exp:"Influxo mais leve que o fluido reduz a hidrostática."},{q:"Em qual operação ocorre a maioria dos kicks?",alts:["Perfurando","Manobra","Cimentação","Perfilagem"],correct:1,exp:"Por isso o rigor com trip tank e completação do poço."},{q:"Se o acumulador perder pressão totalmente:",alts:["Nada acontece","O acionamento remoto do BOP fica comprometido","O poço fecha sozinho","A bomba para"],correct:1,exp:"Sem energia armazenada, o BOP pode não fechar a tempo."}]},{level:"Introdutório",num:3,questions:[{q:"Fluido 14 lb/gal, TVD 3.000 m. PH =",alts:["7.140 psi","6.000 psi","4.200 psi","5.100 psi"],correct:0,exp:"0,17 × 14 × 3000 = 7.140 psi."},{q:"O que acontece com a PH se o nível de fluido no poço cair?",alts:["Aumenta","Diminui","Não muda","Vira ECD"],correct:1,exp:"Menos coluna vertical de fluido = menos pressão."},{q:"Kick de gás é pior que de líquido porque o gás:",alts:["É mais pesado","Expande ao subir","É frio","Não migra"],correct:1,exp:"Expansão reduz hidrostática e acelera o problema."},{q:"Qual sequência está na ordem correta ao notar sinal positivo perfurando?",alts:["Fechar BOP → parar bombas → levantar coluna","Parar rotação/levantar coluna → parar bombas → fechar BOP","Parar bombas → perfurar devagar → avisar","Aumentar densidade → continuar"],correct:1,exp:"Posicionar, parar bombeio e fechar."},{q:"O BOP é considerado:",alts:["Barreira primária","Barreira secundária","Equipamento opcional","Barreira terciária"],correct:1,exp:"Atua quando a hidrostática falha."},{q:"A função da linha de kill é:",alts:["Retornar fluido ao manifold","Permitir bombear fluido para o poço fechado","Ventilar gás","Medir SICP"],correct:1,exp:"Kill = bombeio; choke = retorno controlado."},{q:"Densidade de 8,6 lb/gal equivale aproximadamente a:",alts:["Água do mar","Fluido pesado","Cimento","Óleo diesel"],correct:0,exp:"Água do mar ≈ 8,5–8,6 lb/gal (água doce ≈ 8,33)."},{q:'Se o fluido retorna "cortado" (gaseificado), a atitude correta é:',alts:["Ignorar","Tratar como alerta, monitorar e investigar densidade do retorno","Desligar o degasser","Acelerar a perfuração"],correct:1,exp:"Corte por gás é sinal de alerta clássico."},{q:"O que é pit gain?",alts:["Perda de volume nos tanques","Ganho de volume nos tanques","Vazão da bomba","Nome do trip tank"],correct:1,exp:"Volume extra vindo do poço: sinal positivo."},{q:"Quem fecha em volta do cabo de perfilagem, se necessário?",alts:["Pipe ram comum","BOP anular","Gaveta cega","Choke"],correct:1,exp:"O anular se molda a diâmetros irregulares."},{q:"Fluido 10 lb/gal, poço com pressão de poros equivalente a 10,5 lb/gal:",alts:["Overbalance","Underbalance","Equilíbrio","Fratura"],correct:1,exp:"Densidade menor que a necessária: risco de kick."},{q:"A margem entre a densidade do fluido e a pressão de poros serve para:",alts:["Economizar barita","Compensar efeitos como swab e ECD ao parar bombas","Aumentar a taxa de penetração","Reduzir torque"],correct:1,exp:"Margem de segurança operacional (trip margin)."},{q:"Qual válvula impede fluxo pelo interior da coluna, funcionando como retenção?",alts:["Kelly cock inferior","Inside BOP (válvula de retenção)","Válvula do choke","Gaveta variável"],correct:1,exp:"Deixa bombear para baixo e bloqueia o retorno."},{q:"Em um flow check, o poço deve ser observado:",alts:["Por 10 segundos","Por tempo suficiente conforme procedimento, com o poço estático","Só com bombas ligadas","Apenas visualmente na mesa"],correct:1,exp:"Tempo e método definidos por procedimento."},{q:"O que acontece se fechar uma gaveta de tubo sobre o tool joint?",alts:["Nada","Risco de danificar a gaveta e não vedar","Vedação melhor","Corta o tubo"],correct:1,exp:"Por isso o spacing out."},{q:"A hidrostática da coluna de fluido é exercida:",alts:["Só no fundo","Em todas as paredes e no fundo do poço","Só na sapata","Só no BOP"],correct:1,exp:"Pressão atua em todos os pontos, crescendo com a TVD."},{q:"PH de 2.550 psi com fluido 10 lb/gal corresponde a TVD de:",alts:["1.000 m","1.500 m","2.000 m","2.550 m"],correct:1,exp:"TVD = 2550 ÷ (0,17 × 10) = 1.500 m."},{q:"Qual documento/prática treina a equipe para resposta rápida a kick?",alts:["Kill sheet","Drills (BOP drill, pit drill etc.)","LOT","Perfilagem"],correct:1,exp:"Treinos cronometrados criam resposta automática."},{q:"O diverter é usado principalmente:",alts:["Em kick raso, antes de haver BOP/sapata capaz de fechar com segurança","Em águas profundas","Para testes de coluna","Para cimentação"],correct:0,exp:"Desvia o fluxo para longe da sonda quando fechar não é opção."},{q:"Qual dos itens NÃO é sinal de kick?",alts:["Aumento de vazão de retorno","Pit gain","Queda do nível dos tanques","Poço fluindo com bombas paradas"],correct:2,exp:"Queda de nível indica perda, não influxo (mas perda pode levar a kick)."},{q:"O fluido de matar é:",alts:["Fluido mais leve","Fluido com densidade calculada para equilibrar a formação","Água do mar","Cimento"],correct:1,exp:"Densidade = KMW."},{q:"Qual é o papel do sondador (driller) no controle de poço?",alts:["Só perfurar","Detectar sinais e fechar o poço rapidamente","Preparar o almoço da equipe","Trocar a broca"],correct:1,exp:"Primeira linha de defesa."},{q:"Fluido 13 lb/gal, TVD 2.000 m. PH =",alts:["4.420 psi","3.400 psi","5.200 psi","2.600 psi"],correct:0,exp:"0,17 × 13 × 2000 = 4.420 psi."},{q:"Gás raso (shallow gas) é perigoso porque:",alts:["É profundo","Há pouca margem para fechar e o gás chega rápido à superfície","Não expande","É sempre pequeno"],correct:1,exp:"Cenário típico de uso do diverter."},{q:"A pressão atmosférica padrão ao nível do mar é aproximadamente:",alts:["1,0 psi","14,7 psi","100 psi","34 psi"],correct:1,exp:"Referência básica de pressão."},{q:'"Manter o poço cheio" na manobra significa:',alts:["Encher o riser de água","Bombear fluido compensando o volume de aço retirado","Fechar o BOP","Circular pelo choke"],correct:1,exp:"Preserva a hidrostática da barreira primária."},{q:'O que caracteriza uma barreira "testada"?',alts:["Estar instalada","Ter sido verificada por teste (pressão/função) e estar íntegra","Ser nova","Ser dupla"],correct:1,exp:"Barreira sem teste não conta na filosofia de barreiras."},{q:"Qual componente fornece energia hidráulica imediata ao BOP?",alts:["Bomba de lama","Acumulador","Trip tank","Topdrive"],correct:1,exp:"Garrafas pré-carregadas de nitrogênio."},{q:"Se durante a perfuração a pressão de bombeio cai e os strokes sobem sem mexer na bomba:",alts:["Sinal de alerta de influxo (fluido mais leve no anular)","Normal","Broca nova","Choke fechado"],correct:0,exp:'Influxo leve no anular "alivia" a bomba: investigar.'},{q:"O objetivo final do controle de poço é:",alts:["Perfurar mais rápido","Impedir que um kick vire blowout, protegendo pessoas, meio ambiente e patrimônio","Economizar barita","Testar equipamentos"],correct:1,exp:"Segurança em primeiro lugar."}]},{level:"Driller",num:1,questions:[{q:"Após o fechamento do poço, o SIDPP representa:",alts:["A pressão de fratura","O quanto falta de hidrostática na coluna para equilibrar a formação","A pressão do acumulador","A perda de carga da bomba"],correct:1,exp:"Pressão de poros = PH da coluna + SIDPP."},{q:"Por que normalmente SICP > SIDPP?",alts:["O manômetro do anular é maior","O influxo mais leve no anular reduz a hidrostática ali","O choke pressuriza o anular","O casing é mais fundo"],correct:1,exp:"Menos hidrostática no anular exige mais pressão de superfície."},{q:"Poço: fluido 10 lb/gal, TVD 2.000 m, SIDPP 340 psi. A pressão de poros é:",alts:["3.400 psi","3.740 psi","3.060 psi","4.080 psi"],correct:1,exp:"0,17×10×2000 + 340 = 3.740 psi."},{q:"Com os dados da questão 3, o KMW é:",alts:["10,5 lb/gal","11 lb/gal","12 lb/gal","10,2 lb/gal"],correct:1,exp:"10 + 340/(0,17×2000) = 11 lb/gal."},{q:"PL = 600 psi e SIDPP = 400 psi. O ICP é:",alts:["200 psi","1.000 psi","600 psi","400 psi"],correct:1,exp:"ICP = PL + SIDPP."},{q:"Fluido atual 10 lb/gal, KMW 11 lb/gal, PL 600 psi. FCP =",alts:["545 psi","660 psi","600 psi","700 psi"],correct:1,exp:"600 × (11/10) = 660 psi."},{q:"No hard shut-in:",alts:["O choke fica aberto ao fechar o BOP","A choke line está fechada e o BOP fecha direto","Fecha-se só o choke","Fecha-se a gaveta cega"],correct:1,exp:"Fechamento mais rápido, influxo menor."},{q: e","Após o poço morto"],correct:1,exp:"Menor coluna de fluido acima do gás dentro do trecho aberto..."},{q:"Kick fechado SEM coluna no poço. Preventor usado e opções:",alts:["Anular; circular normal","Gaveta cega; avaliar volumétrico, stripping/snubbing ou bullheading","Pipe ram; W&W","Diverter; abrir poço"],correct:1,exp:"Sem coluna não há circulação convencional."},{q:"Nunca fechar gavetas sobre:",alts:["Drill pipe liso","Tool joint ou BHA","Casing","Kelly"],correct:1,exp:"Dano à gaveta e vedação comprometida."},{q:"Perda de circulação e kick simultâneos. Primeiras opções:",alts:["Abrir o poço","Pílulas de combate à perda, manter poço cheio com fluido leve/água no anular, considerar barite plug/gunk","Acelerar a bomba","Retirar a coluna"],correct:1,exp:"Cenário complexo: restaurar barreira e controlar influxo."},{q:"Sinais de blowout subterrâneo com poço fechado:",alts:["Pressões estáveis","Pressões que não estabilizam, SICP caindo sem sangria","SIDPP = SICP","Pit gain zero"],correct:1,exp:"Fluxo interno entre formações."},{q:"Drills de controle de poço devem ser:",alts:["Anuais","Frequentes, cronometrados e com crítica construtiva","Apenas teóricos","Opcionais"],correct:1,exp:"Resposta rápida nasce do treino."},{q:"Na circulação do kick, a comunicação correta é:",alts:["Todos falam ao mesmo tempo","Linha única: choke operator ↔ driller ↔ supervisor","Só por escrito","Sem comunicação"],correct:1,exp:"Uma fonte de comando evita erro."},{q:"Testes de BOP:",alts:["Só função","Função (frequente) e pressão (periódico, baixa e alta)","Só pressão","Nunca em operação"],correct:1,exp:"Conforme norma da operadora/regulador."},{q:"Trip margin existe para:",alts:["Compensar o swab da manobra e manter overbalance","Aumentar ROP","Reduzir custo de barita","Zerar a ECD"],correct:0,exp:"Margem embutida na densidade."},{q:"Após controlar o kick, antes de retomar a perfuração:",alts:["Perfurar direto","Circular/condicionar o fluido, checar barreiras, flow check e revisar MAASP","Trocar a equipe","Reduzir densidade"],correct:1,exp:"Reinício disciplinado."},{q:"Usar KMW acima do necessário:",alts:["Melhora a segurança sempre","Gera pressões desnecessárias, risco de perda/fratura","Reduz a ECD","Elimina a MAASP"],correct:1,exp:"Peso certo, não peso máximo."},{q:"Em águas profundas, a sapata tende a ser mais fraca porque:",alts:["O mar é salgado","A lâmina d'água não gera o mesmo overburden que sedimentos","O riser pesa","O LOT é proibido"],correct:1,exp:"Gradiente de fratura reduzido."},{q:"A decisão final sobre o método de controle cabe:",alts:["Ao operador do choke","À supervisão (com a operadora), conforme cenário e limites","Ao torrista","Ao fabricante do BOP"],correct:1,exp:"Supervisor define método, limites e comunicação."}]},{level:"Supervisão",num:2,questions:[{q:"Bit a 800 m do fundo quando o kick foi fechado. O influxo está abaixo do bit. Melhor caminho:",alts:["Circular de onde está (não remove o influxo)","Stripping ao fundo com controle de volumes, depois circular","Abrir o poço e descer livre","Bullheading sempre"],correct:1,exp:"Circular fora do fundo não varre o influxo."},{q:"Durante o stripping, a cada tubo descido deve-se:",alts:["Sangrar o volume de aço que entrou (mais expansão programada do gás)","Bombear fluido extra","Aumentar o SICP","Nada"],correct:0,exp:"Contabilidade de volumes é a alma do stripping."},{q:"Kick com H2S confirmado. Consideração do supervisor:",alts:["Circular normalmente sem cuidados","Considerar bullheading e proteção respiratória; H2S na superfície é risco letal","Abrir o poço para ventilar","Ignorar o gás"],correct:1,exp:"H2S muda o plano de manejo do influxo."},{q:"Qual combinação agrava mais a pressão na sapata durante um controle?",alts:["Influxo pequeno de água","Grande kick de gás com sapata rasa e anular estreito","Fluido pesado sem kick","Poço raso sem gás"],correct:1,exp:"Kick tolerance mínima nesse cenário."},{q:"A kill line num BOP submarino, durante a circulação do kick, pode servir como:",alts:["Linha de retorno obrigatória","Manômetro estático para ler pressão no BOP sem o efeito da CLF","Sucção da bomba","Vent do riser"],correct:1,exp:"Compensação prática da choke line friction."},{q:"Se o SICP se aproximar da MAASP durante a circulação:",alts:["Acelerar a bomba","Avaliar reduzir pressão exigida (vazão, expansão maior) e riscos — a sapata está no limite","Fechar tudo e esperar","Aumentar o KMW na hora"],correct:1,exp:"Decisão de supervisão: proteger o ponto fraco."},{q:"MAASP deve ser recalculada:",alts:["Nunca","A cada mudança de densidade do fluido","Só no LOT","A cada manobra"],correct:1,exp:"Densidade nova = margem nova."},{q:"Um LOT bem executado fornece:",alts:["A pressão de poros","A densidade equivalente máxima suportada na sapata","O volume do poço","O SIDPP"],correct:1,exp:"Base da MAASP e da kick tolerance."},{q:"Influxo com gradiente estimado de 0,1 psi/ft (baixo). Provável natureza:",alts:["Salmoura","Gás","Óleo pesado","Cimento"],correct:1,exp:"Gradiente baixo é assinatura de gás."},{q:"Poço fechado por horas com gás migrando e SEM ação. Consequência esperada:",alts:["Pressão cai","Sobrepressão progressiva em todo o sistema até fraturar a sapata ou vazar equipamento","O gás desaparece","O SIDPP zera"],correct:1,exp:"Migração sem expansão é bomba-relógio."},{q:"Volumétrico: sangra-se fluido pelo choke quando:",alts:["A pressão sobe além da margem definida, trocando volume por pressão de forma calculada","Sempre que quiser","O SIDPP zera","A bomba liga"],correct:0,exp:"Passos com margem de segurança e contabilidade por bbl."},{q:"No lubricate & bleed, após bombear o fluido, espera-se antes de sangrar para:",alts:["Resfriar a bomba","O fluido decantar através do gás (lubricate)","Trocar o turno","Encher o trip tank"],correct:1,exp:"Depois sangra-se a pressão equivalente ao fluido injetado."},{q:"Sonda DP em drift-off com kick fechado no BOP submarino. Prioridade:",alts:["Continuar a circulação normalmente","Preparar/acionar EDS conforme gatilhos — integridade do poço e da sonda","Abrir o anular","Retirar o riser com pressão"],correct:1,exp:"Shear ram + desconexão protegem poço e sonda."},{q:"Spacing out em BOP submarino é mais crítico porque:",alts:["O mar é fundo","A coluna estica/comprime (heave/maré) e as gavetas não podem pegar tool joint","O tubo é mais caro","O anular fecha sozinho"],correct:1,exp:"Compensação de movimento entra no cálculo."},{q:"Gás entrou no riser após desconectar o BOP do fluxo. Ferramenta de proteção da sonda:",alts:["Diverter (linhas overboard)","Choke manifold","Trip tank","Degasser apenas"],correct:0,exp:"Desviar para longe do piso e do pessoal."},{q:"Qual informação NÃO pertence tipicamente à kill sheet?",alts:["Volumes/strokes por trecho","ICP/FCP e tabela de queda","MAASP","Escala de folga da equipe"],correct:3,exp:"Kill sheet é documento técnico do controle."},{q:"Kick tolerance tende a AUMENTAR quando:",alts:["A margem do LOT aumenta e o influxo esperado é menor","O anular estreita","A densidade sobe até o limite do LOT","A sapata fica mais rasa"],correct:0,exp:"Mais margem na sapata = mais tolerância."},{q:"Circulação do kick em vazão reduzida também protege:",alts:["A pintura da sonda","O separador poor boy e o degasser de sobrecarga de gás","O trip tank","A broca"],correct:1,exp:"Vazão de gás na superfície precisa ser processável."},{q:'"Wait" do Wait & Weight se torna inaceitável quando:',alts:["O fluido fica pronto em 20 min","O gás migra rápido e as pressões sobem no fechamento","A equipe está completa","O poço é vertical"],correct:1,exp:"Migração corre contra o relógio."},{q:"Um influxo de água salgada (sem gás) fechado no poço:",alts:["Migra como gás","Praticamente não migra; pressões tendem a ficar estáveis","Explode","Congela"],correct:1,exp:"Tempo joga a favor: dá para planejar com calma."},{q:"Decisão de assentar revestimento mais cedo pode ser motivada por:",alts:["Estética do poço","Kick tolerance insuficiente para o próximo trecho","Falta de broca visor percebe que a equipe diverge sobre leituras durante o controle. Melhor conduta:",alts:["Seguir a maioria sem verificar","Parar com o poço fechado e estável, verificar dados e alinhar antes de prosseguir","Continuar para não perder tempo","Trocar a equipe no meio"],correct:1,exp:"Poço fechado estável dá tempo para decidir bem."}]},{level:"Supervisão",num:3,questions:[{q:"Cenário: kick de gás, sapata com margem folgada, fluido de matar pronto em 30 min, migração lenta. Método com melhor custo-benefício:",alts:["W&W (uma circulação, pressões menores)","Volumétrico","Bullheading","Lubricate & bleed"],correct:0,exp:"Condições ideais para o método do engenheiro."},{q:"Cenário: equipe de mistura limitada, kick pequeno de gás migrando, bit no fundo. Método:",alts:["Esperar 6 h pelo fluido","Driller's — remover o influxo já na 1ª circulação","Abrir e observar","Snubbing"],correct:1,exp:"Início imediato vence quando a espera custa pressão."},{q:"Durante a 1ª circulação do Driller's com gás, a pressão na sapata fica mais alta que no W&W principalmente porque:",alts:["A bomba é maior","O anular ainda contém fluido original (mais leve) quando o gás passa pela sapata","O choke é diferente","O SIDPP dobra"],correct:1,exp:"Sem o fluido pesado no anular, a superfície exige mais pressão."},{q:"Influxo de 8 bbl, anular do BHA 0,032 bbl/m. Altura:",alts:["250 m","320 m","125 m","80 m"],correct:0,exp:"8 ÷ 0,032 = 250 m."},{q:"SICP 520 psi, SIDPP 300 psi, altura do influxo 250 m, fluido 10 lb/gal. Gradiente do influxo (aprox.):",alts:["Igual ao do fluido","Fluido: 1,7 psi/m; influxo: 1,7 − (220/250) ≈ 0,82 psi/m → indica gás","3,4 psi/m","Zero"],correct:1,exp:"(SICP−SIDPP) = déficit de hidrostática do trecho do influxo."},{q:"Uma sonda com detecção confiável mínima de 10 bbl e kick tolerance de 8 bbl no próximo trecho:",alts:["Pode perfurar normalmente","Não deve avançar sem mitigação (revestimento, densidade, monitoramento)","Deve aumentar a vazão","Deve retirar o BOP"],correct:1,exp:"Detectaria o kick só depois do limite seguro."},{q:"Em BOP submarino, ao fechar o poço, parte do gás pode ficar presa abaixo do BOP. Antes de abrir/desconectar:",alts:["Abrir direto","Remover o gás preso (ex.: circulação pela choke/kill, lubricate & bleed) conforme procedimento","Ignorar","Acionar EDS sempre"],correct:1,exp:"Gás preso liberado sem controle vai direto ao riser."},{q:"A escolha de circular o kick pela linha de CHOKE com leitura na KILL line existe porque:",alts:["A kill line é mais bonita","A linha estática não tem perda de carga: leitura fiel da pressão no BOP","O choke não aguenta","A kill line é maior"],correct:1,exp:"Prática padrão em águas profundas."},{q:"Qual evento pode elevar o risco de hidrato DURANTE o controle em águas profundas?",alts:["Circulação rápida de fluido quente","Expansão de gás com resfriamento (Joule-Thomson) nas linhas frias do leito marinho","Barita no fluido","Alta ROP"],correct:1,exp:"Expansão esfria e favorece hidrato: usar inibidores."},{q:"Kick fechado; decisão de bullheading tomada. A pressão de injeção deve:",alts:["Ser ilimitada","Ficar abaixo do limite de fratura da sapata/formações rasas, monitorando MAASP","Superar sempre a fratura","Ser igual ao SIDPP"],correct:1,exp:"Bullheading sem limite cria blowout subterrâneo."},{q:'O que caracteriza um controle "bem-sucedido" além de matar o poço?',alts:["Rapidez a qualquer custo","Fundo constante, sapata protegida, ninguém exposto, equipamentos íntegros e registro completo","Não usar o choke","Não avisar a operadora"],correct:1,exp:"Resultado + processo."},{q:"Após um kick controlado, o LOT/margem da sapata deve ser reavaliado se:",alts:["Nada mudou","Houve indício de perda/fratura ou pressões próximas da MAASP durante o evento","A broca é nova","O mar está calmo"],correct:1,exp:"A integridade do ponto fraco pode ter mudado."},{q:"Delegação correta durante o controle:",alts:["O supervisor opera o choke, comanda e anota tudo sozinho","Funções distribuídas e treinadas: choke, bombas, volumes, registro — supervisor decide","Cada um faz o que quiser","A operadora opera o choke remotamente sempre"],correct:1,exp:"Estrutura de resposta com papéis claros."},{q:"Um influxo entrou durante a cimentação do revestimento. Complicação típica:",alts:["Nenhuma","Janela de tempo do cimento + caminhos restritos: plano específico e rapidez na decisão","O cimento mata o poço sempre","O BOP não funciona com cimento"],correct:1,exp:"Cenário não convencional exige plano dedicado."},{q:"Fluido 14 lb/gal, LOT 16 lb/gal, sapata 2.000 m. MAASP =",alts:["680 psi","850 psi","476 psi","1.020 psi"],correct:0,exp:"(16−14) × 0,17 × 2000 = 680 psi."},{q:"Poço com MAASP 680 psi. Durante a circulação o SICP atinge 650 psi e ainda há gás por passar na sapata:",alts:["Seguir sem mudar nada","Reavaliar imediatamente: reduzir exigência (expansão/vazão), aceitar risco calculado ou parar fechado — sapata quase no limite","Aumentar a vazão","Abrir o anular"],correct:1,exp:"Supervisão gerencia o ponto fraco em tempo real."},{q:"Kick com coluna fora do fundo e gás migrando; stripping não é possível (equipamento). Alternativa:",alts:["Volumétrico para controlar a migração enquanto se define o plano","Abrir o poço","Esperar sem fazer nada","Retirar o BOP"],correct:0,exp:"Volumétrico segura o fundo sem circulação."},{q:"Qual métrica dos drills importa mais para a segurança?",alts:["A nota do relatório","Tempo de detecção + tempo de fechamento (e qualidade da execução)","Quantidade de papel","Número de participantes"],correct:1,exp:"Minutos de poço aberto definem o influxo."},{q:"Duas leituras de SIDPP divergentes (manômetro da sonda × unidade de cimentação). Conduta:",alts:["Usar a maior sempre","Verificar/calibrar, entender a diferença e definir a referência antes de calcular KMW","Usar a média cegamente","Ignorar ambas"],correct:1,exp:"Cálculo bom começa com dado confiável."},{q:'O influxo foi circulado, mas o poço "respira" (ballooning/flowback) nos flow checks:',alts:["Tratar automaticamente como poço morto","Investigar com cautela: distinguir ballooning de kick real com monitoramento fino (trip tank, tendências)","Abrir e perfurar","Bullheading imediato"],correct:1,exp:"Diagnóstico errado aqui causa acidentes."},{q:"Qual decisão pertence à supervisão ANTES do poço (planejamento)?",alts:["Definir kick tolerance por fase e profundidades de revestimento","Apertar o choke","Rosquear tubos","Pintar o BOP"],correct:0,exp:"Controle de poço começa no projeto."},{q:"Shear ram falhou em teste de função na sonda em operação:",alts:["Seguir operando normalmente","Tratar como perda de barreira/capacidade crítica: parar, avaliar e corrigir conforme norma antes de prosseguir","Testar de novo em 6 meses","Usar só o anular para sempre"],correct:1,exp:"Capacidade de cisalhamento é requisito de segurança."},{q:"Gás chegou à superfície mais rápido que o previsto na circulação. Primeira proteção operacional:",alts:["Aumentar a vazão da bomba","Reduzir vazão/ajustar choke e garantir separador/vent dentro da capacidade","Abrir o BOP","Desligar o degasser"],correct:1,exp:"Processamento do gás dita o ritmo."},{q:'"Manter uma barreira enquanto se repara a outra" significa:',alts:["Poder remover as duas ao mesmo tempo","Nunca ficar com menos de uma barreira testada; planejar a manutenção sem janela descoberta","Trabalhar sem barreiras à noite","Substituir barreiras por avisos"],correct:1,exp:"Gestão de barreiras é contínua."},{q:"Kick de 20 bbl fechado com SICP já em 90% da MAASP. Leitura do supervisor:",alts:["Situação confortável","Margem quase esgotada: qualquer migração/erro fratura a sapata — prioridade máxima e plano imediato","Poço morto","Manômetro errado com certeza"],correct:1,exp:"Ler números como risco, não como burocracia."},{q:'Por que registrar o "pit gain" final com precisão?',alts:["Curiosidade","Ele dimensiona o influxo — entra na estimativa de altura, gradiente e nas decisões do método","Para o almoxarifado","Não precisa"],correct:1,exp:"Volume é a variável-mestre do kick."},{q:"Qual conduta viola a filosofia de controle de poço?",alts:["Fechar rápido na dúvida",'"Perfurar mais um pouco" com sinal positivo para confirmar',"Flow check em sinal de alerta","Drills frequentes"],correct:1,exp:"Sinal positivo = fechar, sem negociação."},{q:"A ordem correta de prioridades num evento é:",alts:["Poço, pessoas, meio ambiente","Pessoas, meio ambiente e instalação/poço","Cronograma, custo, poço","Equipamento, custo, pessoas"],correct:1,exp:"Vidas primeiro, sempre."},{q:"Simulado de kick com nota ruim da equipe. Ação da supervisão:",alts:["Punir e esquecer","Crítica construtiva, retreinamento dirigido e repetição do drill até o padrão","Esconder o resultado","Trocar toda a equipe"],correct:1,exp:"Drill existe para achar e corrigir falhas."},{q:"A melhor definição do papel do supervisor no controle de poço:",alts:["Operar todos os equipamentos","Planejar limites e cenários, decidir método, garantir comunicação e proteger pessoas e barreiras","Apenas assinar relatórios","Substituir o sondador"],correct:1,exp:"Lidera antes, durante e depois do evento."}]}],cards:{Introdutório:[{f:"O que é um kick?",v:"Entrada indesejada de fluido da formação para o poço."},{f:"O que é um blowout?",v:"Fluxo descontrolado da formação para a superfície ou outra formação."},{f:"Barreira primária do poço",v:"Coluna hidrostática do fluido de perfuração."},{f:"Barreira secundária do poço",v:"Conjunto BOP e equipamentos associados."},{f:"Fórmula da pressão hidrostática",v:"PH = 0,17 × densidade (lb/gal) × TVD (m)."},{f:"PH usa TVD ou MD?",v:"TVD (profundidade vertical)."},{f:"Causa mais comum de kick",v:"Não completar o poço com fluido na manobra."},{f:"O que é swab?",v:"Efeito pistão ao puxar a coluna, que reduz a pressão no fundo."},{f:"Sinal positivo de kick nº 1",v:"Aumento da vazão de retorno sem mudar a bomba."},{f:"Sinal positivo de kick nº 2",v:"Ganho de volume nos tanques (pit gain)."},{f:"O que é flow check?",v:"Parar bombas e observar se o poço flui."},{f:"O que é drilling break?",v:"Aumento brusco da taxa de penetração (alerta de kick)."},{f:"BOP anular fecha em quê?",v:"Qualquer diâmetro e até poço aberto."},{f:"Gaveta cega serve para",v:"Fechar o poço sem coluna dentro."},{f:"Gaveta cisalhante serve para",v:"Cortar a coluna e selar o poço (último recurso)."},{f:"O que aciona o BOP sem energia da sonda?",v:"Acumulador (unidade Koomey)."},{f:"Função do choke manifold",v:"Circular o kick com pressão controlada."},{f:"Função do trip tank",v:"Monitorar volumes do poço na manobra com precisão."},{f:"O que é overbalance?",v:"PH maior que a pressão de poros."},{f:"O que é underbalance?",v:"PH menor que a pressão de poros (risco de influxo)."},{f:"O que é ECD?",v:"Densidade equivalente de circulação (hidrostática + atrito anular)."},{f:'Quando a ECD "some"?',v:"Ao desligar as bombas (momento clássico de kick)."},{f:"O que é pressão de poros?",v:"Pressão dos fluidos contidos na rocha."},{f:"O que é pressão de fratura?",v:"Pressão que quebra a rocha e causa perda."},{f:"Influxo mais perigoso",v:"Gás (expande ao subir)."},{f:"O que mede a balança de lama?",v:"Densidade do fluido."},{f:"Poço fluindo com bombas paradas significa",v:"Kick em andamento: fechar o poço."},{f:"O que é o degasser?",v:"Equipamento que retira gás do fluido de retorno."},{f:"Válvula de segurança de manobra (FOSV) serve para",v:"Fechar a coluna se o poço fluir por dentro dela na manobra."},{f:"Regra das barreiras",v:"Sempre duas barreiras testadas e independentes."},{f:"Gradiente de pressão do fluido (psi/m)",v:"0,17 × densidade em lb/gal."},{f:"Densidade da água doce",v:"8,33 lb/gal."},{f:"1 bbl equivale a",v:"159 litros."},{f:"Lei de Boyle aplicada ao kick",v:"P1×V1 = P2×V2: metade da pressão, dobro do volume."},{f:"Gás no fundo, subindo em poço aberto",v:"Expande, acelera e expulsa fluido (bola de neve)."},{f:"O que é surge?",v:"Aumento de pressão ao descer a coluna rápido (pode fraturar)."},{f:"O que é slug?",v:'Colchão pesado bombeado antes da manobra para "secar" o interior da coluna.'},{f:"O que é trip sheet?",v:"Planilha que compara volume teórico × real na manobra."},{f:"Flow check antes da manobra serve para",v:"Confirmar poço estável antes de retirar a coluna."},{f:"Quem cuida dos tanques e da barita num kick?",v:"Torrista (derrickman)."},{f:"Dono dos primeiros 60 segundos do kick",v:"Sondador (driller)."},{f:"Stop work authority",v:"Qualquer membro pode parar o trabalho diante de risco."},{f:"Densidade equivalente de uma pressão",v:"Pressão ÷ (0,17 × TVD)."},{f:"Gás dissolvido em fluido base óleo",v:'Pode "flashear" perto da superfície com pouco aviso.'},{f:"Sinal de kick descendo coluna",v:"Poço devolve mais fluido que o volume de aço descido."},{f:"Diferença entre kick e blowout",v:"Kick é controlável; blowout é fluxo descontrolado."},{f:"Duas funções do fluido além da PH",v:"Carrear cascalho e resfriar/lubrificar a broca."},{f:"O que o LOT mede?",v:"Quanto a formação na sapata aguenta (densidade equivalente máxima)."},{f:"Válvula DHSV é típica de",v:"Poço em produção/completação (segurança de subsuperfície)."},{f:"Barreira primária na manobra",v:"Continua sendo a coluna de fluido (mantida pelo trip tank)."},{f:"Fechar o poço rápido limita",v:"O volume do influxo e as pressões do controle."},{f:"O anular fecha sobre o kelly?",v:"Sim, o anular veda formas irregulares."},{f:"Pressão de 3.400 psi a 2.000 m equivale a densidade de",v:"10 lb/gal."},{f:"Kelly cock inferior serve para",v:"Fechar a coluna e permitir desconexão com pressão embaixo."},{f:"Gás raso: fechar o poço convencional pode causar",v:"Fratura rasa e cratera — usar o diverter."},{f:"Quem decide o método de controle?",v:"A supervisão, conforme cenário e limites."},{f:"Trip tank subindo com manobra parada",v:"Poço fluindo: fechar."},{f:"Volume do influxo é medido por",v:"Pit gain (ganho nos tanques/trip tank)."},{f:"Por que condicionar o fluido antes da manobra?",v:"Densidade homogênea e poço limpo (medição confiável)."},{f:"Três sinais positivos de kick",v:"Retorno aumentado, pit gain e poço fluindo parado."}],Driller:[{f:"SIDPP significa",v:"Pressão de fechamento na coluna (drill pipe)."},{f:"SICP significa",v:"Pressão de fechamento no anular (casing)."},{f:"Por que SICP > SIDPP normalmente?",v:"O influxo leve no anular reduz a hidrostática ali."},{f:"Fórmula da pressão de poros no fechamento",v:"PH da coluna + SIDPP."},{f:"Fórmula do KMW",v:"Densidade atual + SIDPP ÷ (0,17 × TVD)."},{f:"Fórmula do ICP",v:"PL + SIDPP."},{f:"Fórmula da FCP",v:"PL × (KMW ÷ densidade atual)."},{f:"O que é PL?",v:"Pressão reduzida de circulação, medida em vazão lenta antes do kick."},{f:"Hard shut-in",v:"Fechar o BOP com a choke line fechada (padrão, influxo menor)."},{f:"Soft shut-in",v:"Fechar com choke aberto e depois fechar o choke."},{f:"Driller's Method: quantas circulações?",v:"Duas (1ª tira o kick, 2ª bombeia KMW)."},{f:"Driller's, 1ª circulação: o que fica constante?",v:"Pressão da coluna = ICP (na vazão de matar)."},{f:"Wait & Weight: quantas circulações?",v:"Uma (já com fluido de matar)."},{f:"Do bit à superfície (fluido novo no anular), o que fica constante?",v:"FCP."},{f:"Da superfície ao bit com KMW, a pressão da coluna faz o quê?",v:"Cai de ICP para FCP conforme a tabela de strokes."},{f:"Gás fechado migrando sem expansão faz o quê?",v:"Sobe mantendo a pressão e eleva a pressão em todo o poço."},{f:"Sinal de migração de gás no poço fechado",v:"SIDPP e SICP subindo juntos."},{f:"O que é MAASP?",v:"Pressão máxima de superfície no anular antes de fraturar a sapata."},{f:"Fórmula da MAASP",v:"(dens. máx. LOT − dens. atual) × 0,17 × TVD da sapata."},{f:"Quando a MAASP diminui?",v:"Quando a densidade do fluido em uso aumenta."},{f:"De onde vem a densidade máxima permissível?",v:"Do LOT (leak-off test) na sapata."},{f:"Kick em manobra: primeira ação com coluna no poço",v:"Instalar válvula de segurança aberta e fechá-la; fechar o BOP."},{f:"Volume de aço retirado deve igualar",v:"Volume de fluido bombeado pelo trip tank."},{f:"Coluna com float: como ler o SIDPP?",v:"Bombeio lento até detectar a quebra de pressão."},{f:"Posição da coluna antes de fechar",v:"Tool joint fora das gavetas (spacing out)."},{f:"Strokes superfície–bit =",v:"Volume interno da coluna ÷ deslocamento da bomba."},{f:"Por que anotar volumes e pressões após fechar?",v:"Base da kill sheet e da decisão do método."},{f:"Vantagem do Driller's",v:"Começa rápido e exige menos cálculo inicial."},{f:"Vantagem do W&W",v:"Menores pressões na sapata e uma circulação só."},{f:"Se a pressão do choke subir de repente na circulação",v:"Verificar entupimento/washout e comunicar; ajustar choke conforme o plano."},{f:"Tempo de trânsito da pressão no ajuste do choke",v:"~1 s a cada 300 m; ajustar e aguardar refletir."},{f:"Plugging do choke se manifesta por",v:"Pressão subindo; washout, pressão caindo."},{f:"Antes de circular o kick, abrir na saída do BOP",v:"Válvulas HCR/manuais na sequência do procedimento."},{f:"Separador afogado significa",v:"Gás indo para o piso: reduzir a vazão imediatamente."},{f:"Strokes totais =",v:"(Volume da coluna + anular) ÷ deslocamento da bomba."},{f:"A queda ICP→FCP acontece em quais strokes?",v:"Da superfície ao bit (fluido de matar descendo)."},{f:"Ballooning devolve volume",v:"Aproximadamente igual ao que perdeu, decaindo com o tempo."},{f:"Fluxo constante ou crescente no flow check",v:"Kick real: fechar."},{f:"SICP baixo e estável após fechar sugere",v:"Possível ballooning (mas tratar como kick até provar)."},{f:"Fórmula do gradiente do fluido",v:"0,17 × densidade (psi/m)."},{f:"Com KMW no poço inteiro, o SIDPP esperado é",v:"Zero (poço morto)."},{f:"Pressão na coluna acima do alvo por muito tempo",v:"Sobrepressão no fundo: risco de perda."},{f:"Pressão na coluna abaixo do alvo",v:"Novo influxo entrando."},{f:"O PL deve ser medido em",v:"Cada bomba usada para matar, em mais de uma vazão."},{f:"Pit gain 12 bbl com anular do BHA 0,03 bbl/m",v:"Influxo com 400 m de altura."},{f:"Se mudar a vazão no meio da circulação",v:"Recalcular as pressões-alvo para a nova vazão."},{f:"Pressão de fechamento do anular no regulador",v:"Ajustada conforme o tubo (tabela do fabricante)."},{f:"Primeiro registro após fechar",v:"Hora, SIDPP e SICP estabilizadas e pit gain."},{f:"Gás chegando à superfície: o SICP tende a",v:"Subir ao máximo do controle e cair quando o gás sai."},{f:"Função do contador de strokes",v:"Localizar o fluido de matar no poço (tabela da kill sheet)."},{f:"Vazão de matar típica",v:"1/2 a 1/3 da vazão normal (kill rate lenta)."},{f:"No Driller's, quando o SIDPP zera?",v:"Só na 2ª circulação, com KMW na coluna inteira."},{f:"Slug pesado antes da manobra afeta",v:"A leitura inicial do trip tank (considerar no trip sheet)."},{f:"Float na coluna impede",v:"Leitura direta do SIDPP (usar bombeio lento)."},{f:"Por que fechar rápido reduz o SICP?",v:"Influxo menor ocupa menos anular: menos perda de hidrostática."},{f:"A MAASP protege qual ponto do poço?",v:"A sapata (ponto fraco exposto)."},{f:"Ao trocar para o choke reserva",v:"Manter a pressão-alvo: um fecha enquanto o outro assume."},{f:"O anular com pressão de fechamento reduzida permite",v:"Stripping através dele (com lubrificação)."},{f:"Overkill (KMW alto demais) causa",v:"ECD alta e risco de perda/fratura."},{f:"Underkill (KMW baixo) causa",v:"SIDPP residual: poço ainda vivo."}],Supervisão:[{f:"Método quando não dá para circular",v:"Volumétrico."},{f:"Método para tirar gás sob o BOP na superfície",v:"Lubricate & Bleed."},{f:"Descer coluna com poço fechado",v:"Stripping."},{f:"Bombear o influxo de volta à formação",v:"Bullheading."},{f:"Quando preferir W&W?",v:"Margem apertada na sapata e mistura rápida disponível."},{f:"Quando preferir Driller's?",v:"Precisa começar já (gás migrando) ou logística de mistura limitada."},{f:"Kick tolerance é",v:"O maior influxo que ainda pode ser controlado sem fraturar a sapata."},{f:"O que reduz a kick tolerance?",v:"Menos margem no LOT, densidade maior, anular estreito, gás."},{f:"Choke line friction em BOP submarino",v:"Perda de carga da linha que soma pressão na sapata; deve ser compensada."},{f:"Gás no riser",v:"Acima do BOP não há barreira: acionar diverter e plano específico."},{f:"Hidratos: condição de formação",v:"Alta pressão + baixa temperatura (leito marinho)."},{f:"Prevenção de hidratos",v:"Injeção de glicol/inibidores nas linhas."},{f:"EDS é",v:"Sequência de desconexão de emergência do LMRP (sondas DP)."},{f:"Altura do influxo =",v:"Volume do kick ÷ capacidade do anular no trecho."},{f:"Como estimar o gradiente do influxo?",v:"Pela diferença SICP − SIDPP e a altura do influxo."},{f:"Pior momento para a sapata em kick de gás",v:"Topo do gás passando pela sapata."},{f:"Kick sem coluna no poço",v:"Fechar gaveta cega; avaliar volumétrico/stripping/bullheading."},{f:"Nunca fechar gaveta em quê?",v:"Tool joint ou BHA."},{f:"Perda + kick simultâneos",v:"Pílulas de combate, barite plug/gunk, controle dinâmico em último caso."},{f:"Sinal de blowout subterrâneo",v:"Pressões que não estabilizam; SICP caindo sozinho."},{f:"Drills obrigatórios da equipe",v:"BOP, pit, trip, choke e strip drills cronometrados."},{f:"Comando na circulação do kick",v:"Uma única linha: choke operator ↔ driller ↔ supervisor."},{f:"Teste de BOP: tipos",v:"Teste de função (frequente) e de pressão (periódico)."},{f:"Trip margin é",v:"Margem extra de densidade para compensar o swab na manobra."},{f:"Usar KMW maior que o necessário causa",v:"Pressões desnecessárias e risco de fratura/perda."},{f:"Antes de retomar após controlar o kick",v:"Circular e condicionar, checar barreiras e flow check."},{f:"Bullheading: principal risco",v:"Fraturar formação e criar blowout subterrâneo."},{f:"Volumétrico: princípio",v:"Trocar volume sangrado por pressão de forma contabilizada durante a migração."},{f:"Por que a sapata é mais fraca em águas profundas?",v:"Menor overburden (lâmina d'água não gera a mesma compactação)."},{f:"Papel do supervisor no kick",v:"Método, limites (MAASP), comunicação e decisão final."},{f:"Teste de pressão negativo serve para",v:"Verificar barreira contra fluxo com hidrostática reduzida."},{f:"Lição central de Macondo",v:"Sinais de fluxo ignorados + barreiras degradadas + gás no riser."},{f:"Normalização do desvio",v:'Aceitar anomalias pequenas como "normais" até o acidente.'},{f:"Diagrama de barreiras",v:"Mapa dos envelopes primário e secundário por fase do poço."},{f:'"Se não está testado e documentado..."',v:'"...não é barreira."'},{f:"SIMOPS exigem",v:"Análise para nunca ficar com menos de duas barreiras."},{f:"Salmoura de completação sem reboco",v:"Perdas e influxos mais rápidos que na perfuração."},{f:"BPV é",v:"Válvula de retenção instalada no suspensor/cabeça durante operações."},{f:"Poço vivo em workover pede",v:"Snubbing/stripping e barreiras específicas."},{f:"SGSO da ANP",v:"Sistema de gestão de segurança operacional, com integridade de poço e barreiras."},{f:"Reciclagem típica IWCF/WellSharp",v:"A cada 2 anos."},{f:"Quem define a política de hard/soft shut-in",v:"A operadora, na política de controle de poço."},{f:"Kick reportável",v:"Registrar sempre: alimenta estatística, investigação e auditoria."},{f:"Volumétrico: margem de trabalho",v:"Faixa de pressão definida antes de cada sangria."},{f:"Lubricate & bleed: sangrar quanto?",v:"Pressão equivalente à hidrostática do fluido injetado."},{f:"Stripping com gás migrando exige",v:"Combinar stripping com controle volumétrico."},{f:"Como medir a CLF?",v:"Circular pela choke line nas vazões de matar e registrar a perda."},{f:"Drive-off × drift-off em DP",v:"Propulsão empurrando errado × deriva por falha/blackout."},{f:"Gatilhos de EDS devem ser",v:"Pré-definidos, treinados e sem ambiguidade."},{f:"Hidrato dentro do BOP pode",v:"Travar funções e bloquear linhas — inibir e monitorar."},{f:"Kick tolerance é calculada para",v:"Cada fase, antes de perfurar o trecho."},{f:"Detecção mínima confiável da sonda",v:"Menor influxo que a instrumentação percebe com segurança."},{f:"Critério de aceitação escrito evita",v:"Interpretação elástica de teste sob pressão de cronograma."},{f:"Prioridade em qualquer evento",v:"Pessoas, meio ambiente, instalação/poço."},{f:"Auditoria do acumulador verifica",v:"Pré-carga, volumes úteis, tempos de fechamento e redundância."},{f:"Limitações da shear ram",v:"Não corta tool joint/BHA e exige pressão adequada."},{f:"Gás no riser: primeira ação",v:"Alinhar o diverter (overboard) e proteger o pessoal."},{f:"Documentação pós-kick inclui",v:"Pressões, volumes, horários, decisões e lições."},{f:"Por que a kill rate protege a sapata?",v:"Menor ECD e mais tempo de reação no choke."},{f:"Cultura de questionamento",v:"Qualquer um pode desafiar leitura/decisão sem punição."}]},chapters:{Introdutório:[{t:"Capítulo 1.1 — Pressões no poço",c:`Todo o controle de poço gira em torno de uma disputa de pressões: a pressão que a formação exerce para dentro do poço (pressão de poros) contra a pressão que o fluido de perfuração exerce para fora (pressão hidrostática).

A pressão hidrostática depende de apenas duas coisas: a densidade do fluido e a profundidade vertical (TVD). Não importa o caminho do poço (medido, MD), importa a altura vertical da coluna de fluido.

- PH = 0,17 × densidade (lb/gal) × TVD (m)
- Exemplo: fluido de 10 lb/gal a 2.000 m de TVD → PH = 0,17 × 10 × 2000 = 3.400 psi.

Conceitos-chave:
- Pressão de poros: pressão dos fluidos dentro da rocha.
- Pressão de fratura: pressão que a rocha aguenta antes de quebrar e absorver fluido.
- A janela operacional do fluido fica entre a pressão de poros e a de fratura.
- Overbalance: PH maior que a pressão de poros (situação normal e segura).
- Underbalance: PH menor que a pressão de poros → a formação pode invadir o poço.`},{t:"Capítulo 1.2 — O que é kick e o que é blowout",c:`- Kick: entrada indesejada de fluido da formação (gás, óleo ou água salgada) para dentro do poço. É um influxo — ainda controlável.
- Blowout: o kick que não foi controlado e virou fluxo descontrolado da formação para a superfície (ou para outra formação, no caso do blowout subterrâneo).
Todo blowout começou como um kick que falhou em ser detectado ou controlado. Por isso a detecção rápida é a habilidade mais importante da equipe.`},{t:"Capítulo 1.3 — Causas de kick",c:`1. Não completar o poço com fluido durante a manobra (a mais comum): ao retirar tubos, o nível do fluido cai e a PH diminui.
2. Swab (pistoneio): puxar a coluna rápido demais "suga" a formação, reduzindo a pressão no fundo.
3. Densidade insuficiente do fluido para a pressão de poros da formação.
4. Perda de circulação: o fluido some para uma formação fraca, o nível cai e a PH despenca.
5. Corte do fluido por gás da formação perfurada.
6. Pressões anormais não previstas no projeto.`},{t:"Capítulo 1.4 — Sinais de kick",c:`Sinais positivos (indicam influxo em andamento):
- Aumento de vazão de retorno sem mudança na bomba.
- Ganho de volume nos tanques (pit gain).
- Poço fluindo com bombas desligadas (flow check positivo).
- Retorno de fluido na manobra maior que o volume de aço retirado.

Sinais de alerta (indicam que pode vir kick):
- Aumento brusco da taxa de penetração (drilling break).
- Diminuição da pressão de bombeio com aumento dos strokes.
- Fluido cortado por gás, água salgada ou cloretos aumentando.
- Torque e arraste anormais.

Diante de sinal positivo: fechar o poço primeiro, investigar depois. Segundos importam.`},{t:"Capítulo 1.5 — Barreiras de segurança",c:`- Barreira primária: a coluna hidrostática do fluido de perfuração. É ela que segura a formação 24 h por dia.
- Barreira secundária: o conjunto BOP (Blowout Preventer) e os equipamentos associados. Só entra em ação quando a primária falha.
Regra de ouro da indústria: sempre duas barreiras testadas e independentes entre a formação e a superfície.`},{t:"Capítulo 1.6 — Equipamentos básicos de controle",c:`- BOP anular: fecha em volta de qualquer diâmetro (tubo, kelly, cabo) e até em poço aberto. É o primeiro a fechar na maioria dos casos.
- Gaveta de tubo (pipe ram): fecha em volta de um diâmetro específico de tubo.
- Gaveta cega (blind ram): fecha o poço sem tubo dentro.
- Gaveta cisalhante (shear ram): corta o tubo e sela o poço — último recurso.
- Choke manifold: conjunto de válvulas e chokes que permite circular o kick para fora com pressão controlada.
- Linhas de kill e choke: conectam o BOP ao manifold para bombear e retornar fluido com o poço fechado.
- Acumulador (unidade Koomey): garrafas de nitrogênio + fluido hidráulico que acionam o BOP mesmo sem energia da sonda.
- Válvulas de segurança da coluna: kelly cock, válvula de segurança de manobra (TIW/FOSV) e inside BOP (válvula de retenção).
- Degasser e separador atmosférico (poor boy): retiram o gás do fluido que retorna.`},{t:"Capítulo 1.7 — Fluido de perfuração no controle de poço",c:`O fluido faz a PH, carrega cascalho, resfria a broca e transmite dados. Para o controle do poço, o que importa:
- Densidade: define a PH. Medida no balança de lama (mud balance).
- Nível dos tanques: o "medidor de kick" mais confiável da sonda.
- Trip tank: tanque pequeno e calibrado usado para monitorar o poço durante manobras — todo volume que entra ou sai é medido com precisão.`},{t:"Capítulo 1.8 — Conceitos para não confundir",c:`- TVD × MD: TVD é a profundidade vertical; MD é o comprimento perfurado. PH usa TVD.
- ECD (densidade equivalente de circulação): com as bombas ligadas, o atrito no anular soma pressão no fundo. ECD > densidade estática. Ao desligar as bombas essa pressão extra some — momento clássico de kick.
- Flow check: parar as bombas e observar o poço (no trip tank ou na linha de retorno) por tempo suficiente. Poço fluindo parado = kick.`},{t:"Capítulo 1.9 — Unidades e conversões que caem em prova",c:`- Densidade: 1 lb/gal ≈ 0,12 g/cm³; água doce = 8,33 lb/gal; água do mar ≈ 8,5–8,6 lb/gal.
- Gradiente de pressão: gradiente (psi/m) = 0,17 × densidade (lb/gal). Fluido 10 lb/gal → 1,7 psi/m.
- Comprimento: 1 m = 3,281 ft. Volume: 1 bbl = 159 L = 0,159 m³.
- Pressão: 1 kgf/cm² ≈ 14,22 psi; 1 bar ≈ 14,5 psi.
- Regra prática: densidade equivalente de uma pressão em certa TVD: dens. equivalente = pressão ÷ (0,17 × TVD).`},{t:"Capítulo 1.10 — Comportamento do gás no poço",c:`O gás obedece aproximadamente à lei P1×V1 = P2×V2 (Boyle): quando a pressão cai pela metade, o volume dobra. Consequências práticas:
- Um kick de gás pequeno no fundo vira um volume enorme perto da superfície.
- Em poço aberto, o gás acelera na subida, expulsa fluido e derruba a hidrostática — efeito bola de neve.
- Em poço fechado sem expansão, o gás sobe mantendo a pressão e "carrega" a pressão do fundo para cima, sobrecarregando a sapata e a superfície.
- Por isso todo método de controle deixa o gás expandir de forma controlada pelo choke.
- Gás pode entrar dissolvido em fluido sintético/base óleo e "aparecer" de repente perto da superfície (flash), com pouco aviso nos tanques.`},{t:"Capítulo 1.11 — Manobra segura (trip) na prática",c:`A manobra é o momento mais provável de kick. Rotina defensiva:
1. Flow check antes de iniciar a retirada.
2. Circular e condicionar o fluido antes de manobrar (fundo limpo, densidade homogênea).
3. Trip sheet: planilha comparando volume teórico × real a cada seção retirada/descida.
4. Encher o poço continuamente pelo trip tank (circuito fechado, medição fina).
5. Velocidade controlada para evitar swab (subindo) e surge (descendo — pode fraturar).
6. Discrepância de volume = parar, flow check e, na dúvida, fechar.
7. Slug (colchão pesado) bombeado antes de retirar deixa o interior da coluna "seco" e a medição do trip tank limpa.`},{t:"Capítulo 1.12 — Papéis da equipe num kick",c:`- Sondador (driller): detecta, posiciona a coluna, fecha o poço, anota pressões/volumes. Dono dos primeiros 60 segundos.
- Torrista (derrickman): tanques e fluido — nível, densidade, preparação de barita.
- Plataformistas: válvulas, linhas, apoio no manifold e no trip tank conforme função pré-definida.
- Supervisor (toolpusher/company man): decide o método, monta a kill sheet com a equipe, comanda a circulação.
- Todos têm stop work authority: autoridade para parar o serviço diante de risco.`}],Driller:[{t:"Capítulo 2.1 — Detecção e flow check",c:`O tempo entre o início do influxo e o fechamento do poço define o tamanho do problema: quanto maior o volume do kick, maiores as pressões para removê-lo. O sondador (driller) deve tratar qualquer sinal positivo com fechamento imediato.

Procedimento típico ao notar sinal positivo perfurando:
1. Parar rotação, levantar a coluna até posição de fechamento (tool joint fora das gavetas).
2. Parar as bombas.
3. Flow check (se a política da empresa exigir — muitas mandam fechar direto: hard shut-in).
4. Fechar o BOP (anular, em geral).
5. Abrir a linha de choke ANTES ou conforme o método adotado, fechar o choke.
6. Anotar volumes e pressões, avisar o supervisor.`},{t:"Capítulo 2.2 — Hard shut-in × Soft shut-in",c:`- Hard shut-in: choke line fechada; fecha-se o BOP direto. Fechamento mais rápido → menor influxo. É o padrão da maioria das operadoras.
- Soft shut-in: choke aberto ao fechar o BOP, depois fecha-se o choke. Reduz golpe de pressão (water hammer), porém deixa entrar mais influxo.`},{t:"Capítulo 2.3 — Pressões estabilizadas: SIDPP e SICP",c:`Após o fechamento, as pressões sobem e estabilizam (salvo migração de gás):
- SIDPP (Shut-In Drill Pipe Pressure): pressão na coluna. Como dentro da coluna há fluido limpo de densidade conhecida, o SIDPP é a leitura "honesta" do quanto falta de hidrostática:
  Pressão de poros = PH da coluna + SIDPP
- SICP (Shut-In Casing Pressure): pressão no anular. Normalmente maior que o SIDPP, porque o influxo (mais leve que o fluido) está no anular reduzindo a hidrostática ali.
- SICP − SIDPP dá uma ideia do tipo e altura do influxo: diferença grande sugere gás.
- Se a coluna tiver válvula flutuante (float), o SIDPP não aparece direto: usa-se o procedimento de bombeio lento até detectar o "quebra" de pressão.`},{t:"Capítulo 2.4 — Kill sheet e cálculos essenciais",c:`A kill sheet (planilha de matar poço) organiza os dados e cálculos antes de circular o kick:

1. KMW (Kill Mud Weight) — densidade necessária para equilibrar a formação:
   KMW = densidade atual + SIDPP ÷ (0,17 × TVD)
   Exemplo: 10 lb/gal, SIDPP 340 psi, TVD 2.000 m → KMW = 10 + 340/(0,17×2000) = 10 + 1,0 = 11 lb/gal.
2. ICP (Initial Circulating Pressure) — pressão no início da circulação com fluido antigo:
   ICP = PL + SIDPP (PL = pressão reduzida de circulação, medida antes do kick em vazão lenta, ex.: 30 spm).
3. FCP (Final Circulating Pressure) — pressão quando o fluido novo (KMW) preenche toda a coluna:
   FCP = PL × (KMW ÷ densidade atual)
4. Strokes de superfície ao bit: volume interno da coluna ÷ deslocamento da bomba (bbl/stk). Durante esses strokes, a pressão na coluna cai de ICP para FCP de forma programada (tabela da kill sheet).`},{t:"Capítulo 2.5 — Método do Sondador (Driller's Method)",c:`Remove o kick em duas circulações:
- 1ª circulação: com o fluido original, circula-se o influxo para fora pelo choke, mantendo a pressão da coluna constante = ICP na vazão de matar.
- Entre as circulações, o poço fica fechado com SIDPP = SICP (influxo já saiu).
- 2ª circulação: bombeia-se o fluido de matar (KMW). Da superfície ao bit, a pressão da coluna cai de ICP para FCP; do bit à superfície, mantém-se FCP constante.
Vantagens: simples, começa rápido, menos cálculo no início. Desvantagem: mais tempo com pressão no poço e pressões de anular mais altas na sapata em kicks de gás.`},{t:"Capítulo 2.6 — Método Wait & Weight (Engenheiro)",c:`Remove o kick em uma circulação: espera-se preparar o fluido de matar e circula-se já com KMW.
- Da superfície ao bit: pressão da coluna cai de ICP para FCP conforme a tabela de strokes.
- Do bit à superfície: FCP constante.
Vantagens: menores pressões na sapata (em geral) e menos tempo total de circulação. Desvantagem: exige esperar a preparação do fluido — com gás migrando, a espera custa caro.`},{t:"Capítulo 2.7 — Migração de gás e MAASP",c:`Gás fechado no poço migra para cima. Se o poço estiver fechado sem expansão, o gás sobe mantendo sua pressão, elevando a pressão em todos os pontos — risco de fraturar a sapata ou estourar equipamento. Sinal clássico: SIDPP e SICP subindo juntos com o poço fechado. Controle: permitir expansão controlada pelo choke (ou método volumétrico).

- LOT (Leak-Off Test): teste que mede quanto a formação na sapata aguenta. Dele vem a densidade máxima permissível e a
- MAASP (Maximum Allowable Annular Surface Pressure): pressão máxima de superfície no anular antes de fraturar a sapata:
  MAASP = (densidade máx. do LOT − densidade atual) × 0,17 × TVD da sapata
  A MAASP diminui quando a densidade do fluido aumenta.`},{t:"Capítulo 2.8 — Kick em manobra",c:`A maioria dos kicks acontece em manobra. Prevenção e resposta:
- Completar o poço com o trip tank e conferir: volume bombeado = volume de aço retirado.
- Se o poço "devolver" mais do que devia (ou não aceitar o volume certo): flow check → fechar.
- Com coluna no poço: instalar válvula de segurança aberta, fechar a válvula, fechar o BOP. Se necessário, instalar inside BOP e retornar ao fundo por stripping (com autorização do supervisor).
- Sem coluna no poço: fechar gaveta cega.`},{t:"Capítulo 2.9 — Kill sheet passo a passo (exemplo completo)",c:`Dados: fluido 10 lb/gal · TVD = MD = 2.000 m · sapata 1.500 m TVD · LOT 13 lb/gal · PL 600 psi @ 30 spm · bomba 0,1 bbl/stk · volume coluna 80 bbl · anular 320 bbl. Kick fechado: SIDPP 340 psi · SICP 480 psi · pit gain 12 bbl.
1. KMW = 10 + 340/(0,17×2000) = 11,0 lb/gal
2. ICP = 600 + 340 = 940 psi
3. FCP = 600 × (11/10) = 660 psi
4. Strokes superfície–bit = 80/0,1 = 800 stk · anular = 320/0,1 = 3.200 stk · total = 4.000 stk
5. MAASP inicial = (13−10) × 0,17 × 1500 = 765 psi
6. Tabela de queda: de 940 → 660 psi em 800 stk (queda de 280 psi; ~35 psi a cada 100 stk).
7. Circulação (W&W): bombear a 30 spm seguindo a tabela até 800 stk; depois segurar 660 psi na coluna até completar o anular.`},{t:"Capítulo 2.10 — Ballooning × kick real",c:`Ballooning (flowback): formações microfraturadas "bebem" fluido com bombas ligadas (ECD) e "devolvem" com bombas desligadas. Parece kick, mas não é influxo de formação permeável.
Pistas para diferenciar (sempre com o poço monitorado/fechado na dúvida):
- Fluxo que decai com o tempo no flow check → tende a ballooning; fluxo constante/crescente → kick.
- Devolve aproximadamente o mesmo volume que perdeu antes → ballooning.
- SICP/SIDPP baixos e estáveis após fechar → ballooning; subindo → kick.
Tratar como kick até provar o contrário. Erro de diagnóstico aqui já causou acidentes graves.`},{t:"Capítulo 2.11 — Choke manifold e circuito de superfície em detalhe",c:`Caminho do fluido num controle: poço fechado → linha de choke → choke manifold (choke remoto + manual + reserva) → separador poor boy → fluido para os tanques/peneiras e gás para o vent/queimador.
- Choke remoto (hidráulico): operado do painel, com manômetros de coluna e anular lado a lado.
- Choke manual e reserva: contingência para plugging/washout — a troca deve ser treinada.
- Painel do choke: contador de strokes, pressões, posição do choke. O operador "pilota" a pressão da coluna.
- Linha do vent do separador: dimensionada para o pico de vazão de gás; separador afogado = gás no piso.
- Válvulas HCR/manuais na saída do BOP: sequência correta de abertura antes de circular.`},{t:"Capítulo 2.12 — Erros clássicos do driller (e como evitar)",c:`1. Flow check curto demais ou com poço "sujo" (fluido em movimento) → falso negativo.
2. Esquecer o spacing out e fechar gaveta em tool joint.
3. Não anotar pressões estabilizadas (esperar estabilizar, exceto com migração evidente).
4. Corrigir o choke atrasado: existe tempo de trânsito da pressão (~1 s a cada 300 m). Ajustar e esperar refletir.
5. Bombear fora da vazão do PL sem recalcular pressões.
6. Ignorar o limite do separador — vazão de matar também protege a superfície.
7. Confundir queda de pressão por washout de choke com "poço morrendo".
8. Não conferir a pressão de fechamento das gavetas/anular (regulador do acumulador) para o tubo em uso.`}],Supervisão:[{t:"Capítulo 3.1 — Escolha do método de controle",c:`O supervisor escolhe o método pelo cenário, não por preferência:
- Wait & Weight: preferido quando a margem na sapata é apertada (menor pressão no ponto fraco) e a preparação do fluido é rápida.
- Driller's: preferido quando é preciso começar já (gás migrando, pouca capacidade de mistura, equipe menos experiente) ou quando o bit está longe do fundo.
- Volumétrico: quando NÃO é possível circular (bomba quebrada, coluna fora do fundo, coluna entupida): deixa-se o gás migrar e expande-se por sangrias controladas de fluido, trocando volume por pressão de forma contabilizada.
- Lubricate & Bleed: versão do volumétrico para retirar gás já na superfície sob o BOP: bombeia-se fluido (lubricate), espera-se decantar, sangra-se pressão equivalente.
- Stripping: descer a coluna com o poço fechado (pelo anular), controlando volumes deslocados, para voltar ao fundo e circular.
- Bullheading: bombear o influxo de volta para a formação. Usado quando circular é inaceitável (ex.: gás com H2S, influxo acima do bit, riser) e a formação aceita injeção. Risco: fraturar outra formação.`},{t:"Capítulo 3.2 — Tolerância ao influxo (kick tolerance)",c:"É o maior volume de influxo que ainda pode ser fechado e circulado sem fraturar a sapata. Depende de: margem do LOT, densidade em uso, TVD da sapata e do poço, geometria do anular e natureza do influxo (gás é o pior caso). Supervisão usa kick tolerance para decidir profundidade de revestimento e limites operacionais. Se a kick tolerance ficar menor que o volume de detecção confiável da sonda, a operação precisa ser revista."},{t:"Capítulo 3.3 — Particularidades de BOP submarino (águas profundas)",c:`- Choke line friction (CLF): a perda de carga na linha de choke longa soma pressão na sapata durante a circulação. Deve ser medida e descontada (circular pela kill line como referência, ou reduzir a leitura no choke).
- Gás no riser: acima do BOP não há barreira secundária — gás no riser exige desviar para o diverter e acionar plano específico.
- Hidratos: alta pressão + baixa temperatura no leito marinho podem formar hidratos e bloquear linhas/BOP. Prevenção: glicol/inibidores.
- Redução de MAASP pela água do mar: a sapata em águas profundas costuma ser mais fraca (menos overburden).
- Espaço entre juntas: posicionamento da coluna (spacing out) para não fechar gaveta em tool joint.
- EDS (Emergency Disconnect Sequence): desconexão de emergência do LMRP em DP (posicionamento dinâmico) — o supervisor precisa conhecer os gatilhos (deriva, blackout).`},{t:"Capítulo 3.4 — Kicks fora do padrão",c:`- Kick com coluna fora do fundo: fechar, avaliar stripping ao fundo × volumétrico.
- Kick sem coluna: gaveta cega; opções: stripping com snubbing, volumétrico, bullheading.
- Perda de circulação + kick simultâneos: o pior cenário — considerar pílulas de combate à perda, bombeio pelo anular (barite plug/gunk), e em último caso controle dinâmico.
- Poço em fluxo na manobra com BHA na zona do BOP: nunca fechar gaveta no BHA; avaliar descer/subir para tubo liso ou usar anular.
- Blowout subterrâneo: fluxo de uma formação para outra; sinais: pressões que não estabilizam, SICP caindo sozinho.`},{t:"Capítulo 3.5 — Gestão da equipe e do evento",c:`- Pre-tour meeting e drills: BOP drill, pit drill, trip drill, choke drill, strip drill — com tempo cronometrado e crítica construtiva.
- Responsabilidades claras: quem fecha, quem avisa, quem opera choke, quem monta kill sheet.
- Comunicação: uma única fonte de comando na circulação do kick (choke operator ↔ driller ↔ supervisor).
- Documentação: registrar volumes, pressões, horários. O relatório protege a equipe e alimenta as lições aprendidas.
- Testes de BOP: teste de função (frequente) e teste de pressão (periódico, baixa e alta pressão) conforme norma da operadora/órgão regulador.
- Manutenção da barreira primária: política de densidade com margem de manobra (trip margin) e monitoramento contínuo do poço mesmo em operações "tranquilas" (cimentação, perfilagem, espera).`},{t:"Capítulo 3.6 — Cálculos de supervisão",c:`Além de KMW/ICP/FCP, o supervisor domina:
- Pressão na sapata durante a circulação do gás (pior caso ao topo do gás chegar na sapata).
- Altura do influxo: volume do kick ÷ capacidade do anular no trecho.
- Gradiente do influxo: estimado por (SICP − SIDPP) e altura do influxo → identifica gás × líquido.
- Ajuste de MAASP após cada mudança de densidade.
- Volume/strokes de cada trecho (superfície–bit, bit–sapata, sapata–superfície) para antecipar eventos na circulação.`},{t:"Capítulo 3.7 — Lições de desastres reais",c:`Grandes acidentes viraram aula. Padrões que se repetem:
- Macondo/Deepwater Horizon (2010): teste de pressão negativo mal interpretado, sinais de fluxo ignorados, gás no riser, desvio para o separador em vez de overboard, barreiras degradadas. Lições: interpretar teste de barreira com critério formal, monitoramento contínuo dos retornos, resposta a gás no riser, independência das barreiras e cultura de questionamento.
- Blowouts de gás raso: fechar BOP convencional em gás raso pode fraturar e trazer o fluxo por fora do poço (cratera) — por isso o diverter.
- Padrão comum: normalização do desvio (aceitar pequenas anomalias como "normais") e pressa nas fases finais do poço.
Supervisão combate isso com critérios de aceitação escritos, "linhas vermelhas" pré-acordadas e autoridade real de parada.`},{t:"Capítulo 3.8 — Auditoria de barreiras na prática",c:`Ferramenta do supervisor: o diagrama de barreiras do poço em cada fase.
- Listar cada envelope: primário (fluido/cimento/packer...) e secundário (BOP/cabeça/válvulas).
- Cada elemento precisa de teste registrado, com critério e validade.
- Operações simultâneas (SIMOPS) e manutenção: nunca abrir janela com menos de duas barreiras.
- Degradação silenciosa: fluido perdendo densidade por temperatura, cimento sem verificação, válvula sem teste periódico.
- Regra prática: se não está testado e documentado, não é barreira.`},{t:"Capítulo 3.9 — Controle de poço em completação e workover",c:`Diferenças em relação à perfuração:
- Fluido de completação limpo (salmoura), com margens menores e sem reboco: perdas e influxos mais rápidos.
- Barreiras diferentes: packers, tampões mecânicos, BPV, válvula DHSV, árvore de natal.
- Kick pode fluir por dentro da coluna franca: válvulas de coluna são críticas.
- Stripping/snubbing são mais comuns (o poço já pode estar vivo).
- O plano de controle deve ser refeito para cada operação — copiar o da perfuração é erro.`},{t:"Capítulo 3.10 — Regulamentação e gestão no Brasil",c:`- ANP regula a segurança operacional: SGSO (Sistema de Gerenciamento de Segurança Operacional), com práticas de gestão que incluem integridade de poço e barreiras.
- Certificações reconhecidas de controle de poço: IADC WellSharp e IWCF, com níveis por função (Introdutório/Driller/Supervisor) e reciclagem periódica (tipicamente 2 anos).
