 reprova. A pressão do cronograma não participa da leitura."},{t:"Refazer 'rapidinho' só na janela que deu problema",pts:1,fb:"Teste parcial deixa dúvida parcial. Barreira se testa por inteiro, com o sistema alinhado e verificado."},{t:"Compensar o atraso acelerando as próximas etapas",pts:0,fb:"Pressa após atraso é o padrão que fabrica o segundo erro. O cronograma se renegocia; a barreira, não."}]}],debrief:["Teste negativo se lê contra critérios ESCRITOS definidos antes — não contra o desejo de passar.","Pressão que constrói do zero + volume anômalo = comunicação: reprovado até prova física em contrário.","Duas leituras conflitantes não se resolvem escolhendo a melhor: resolve-se investigando.","'Explicações' sem mecanismo comprovado (o 'bladder effect' de Macondo) são otimismo fantasiado de técnica.","Barreira aprovada libera a remoção de outras barreiras — por isso o teste é sagrado."]}]};function is(a,e){var r={};for(var t in a)Object.prototype.hasOwnProperty.call(a,t)&&e.indexOf(t)<0&&(r[t]=a[t]);if(a!=null&&typeof Object.getOwnPropertySymbols=="function")for(var o=0,t=Object.getOwnPropertySymbols(a);o<t.length;o++)e.indexOf(t[o])<0&&Object.prototype.propertyIsEnumerable.call(a,t[o])&&(r[t[o]]=a[t[o]]);return r}function Gh(a,e,r,t){function o(n){return n instanceof r?n:new r(function(s){s(n)})}return new(r||(r=Promise))(function(n,s){function i(p){try{d(t.next(p))}catch(u){s(u)}}function l(p){try{d(t.throw(p))}catch(u){s(u)}}function d(p){p.done?n(p.value):o(p.value).then(i,l)}d((t=t.apply(a,e||[])).next())})}const Qh=a=>a?(...e)=>a(...e):(...e)=>fetch(...e);class Wl extends Error{constructor(e,r="FunctionsError",t){super(e),this.name=r,this.context=t}toJSON(){return{name:this.name,message:this.message,context:this.context}}}class Jh extends Wl{constructor(e){super("Failed to send a request to the Edge Function","FunctionsFetchError",e)}}class od extends Wl{constructor(e){super("Relay Error invoking the Edge Function","FunctionsRelayError",e)}}class nd extends ,l:e})=>c.jsxs(B,{style:{padding:"10px 8px",textAlign:"center"},children:[c.jsx("div",{style:{fontFamily:L,fontWeight:800,fontSize:20,lineHeight:1},children:a}),c.jsx(D,{color:g.faint,style:{marginTop:3},children:e})]}),vb=[{t:"Pressão hidrostática",f:"PH (psi) = 0,17 × densidade (lb/gal) × TVD (m)",n:"0,17 é a constante de campo (aprox. de 0,1706). Use sempre a profundidade vertical."},{t:"Gradiente do fluido",f:"Gradiente (psi/m) = 0,17 × densidade (lb/gal)",n:"Fluido 10 lb/gal → 1,7 psi/m."},{t:"Densidade equivalente",f:"EMW (lb/gal) = Pressão (psi) ÷ (0,17 × TVD (m))",n:"Converte qualquer pressão em densidade equivalente naquela profundidade."},{t:"Pressão de poros (no fechamento)",f:"Pporos = PH da coluna + SIDPP",n:"A coluna tem fluido limpo de densidade conhecida — por isso o SIDPP é a leitura confiável."},{t:"Peso de matar (KMW)",f:"KMW = densidade atual + SIDPP ÷ (0,17 × TVD)",n:"Arredonde PARA CIMA na prática de campo (ex.: 10,84 → 10,9)."},{t:"Pressão inicial de circulação (ICP)",f:"ICP = PL + SIDPP",n:"PL = pressão reduzida de circulação, medida antes do kick na vazão de matar."},{t:"Pressão final de circulação (FCP)",f:"FCP = PL × (KMW ÷ densidade atual)",n:"Vale quando o fluido de matar preenche toda a coluna."},{t:"MAASP",f:"MAASP = (dens. máx. LOT − dens. atual) × 0,17 × TVD da sapata",n:"Recalcule sempre que a densidade em uso mudar. SICP nunca deve ultrapassá-la."},{t:"Altura do influxo",f:"Altura (m) = pit gain (bbl) ÷ capacidade do anular (bbl/m)",n:"Use a capacidade do trecho onde o influxo está (geralmente ao redor do BHA)."},{t:"Gradiente do influxo",f:"Grad. influxo = grad. fluido − (SICP − SIDPP) ÷ altura do influxo",n:"≈ 0,2–0,7 psi/m indica gás; próximo do fluido indica líquido."},{t:"Strokes por trecho",f:"Strokes = volume do trecho (bbl) ÷ deslocamento da bomba (bbl/stk)",n:"Superfície→bit usa o volume interno da coluna; bit→superfície usa o anular."},{t:"Lei de Boyle (gás)",f:"P1 × V1 = P2 × V2",n:"Metade da pressão = dobro do volume. Base do comportamento do kick de gás."}],bb=["Todos","Fundamentos","Equipamentos","Detecção","Fechamento","Métodos","Cálculos","Águas Profundas","Operações"],Ji=[{t:"Kick",en:"Kick / Influx",cat:"Fundamentos",d:"Entrada indesejada de fluido da formação (gás, óleo ou água salgada) para dentro do poço, que ocorre quando a pressão da formação supera a pressão exercida pela coluna de fluido. É a fase ainda controlável do problema: o influxo entrou, mas o poço pode ser fechado e o fluido removido com segurança.",n:"Quanto mais rápido o fechamento, menor o influxo e menores todas as pressões do controle. Segundos importam."},{t:"Blowout",en:"Blowout",cat:"Fundamentos",d:"Fluxo descontrolado de fluidos da formação para a superfície (blowout de superfície) ou para outra formação (blowout subterrâneo). É o kick que falhou em ser detectado ou controlado — o pior cenário da perfuração, com risco a vidas, meio ambiente e patrimônio.",n:"Todo blowout da história começou como um kick. A prevenção está na detecção precoce e no fechamento rápido."},{t:"Barreira primária",en:"Primary barrier",cat:"Fundamentos",d:"A coluna hidrostática do fluido de perfuração — o elemento que contém a pressão da formação 24 horas por dia, em qualquer operação. É mantida controlando densidade e nível do poço.",n:"Perder o poço cheio (manobra, perda de circulação) é perder a barreira primária. Por isso o trip tank é sagrado."},{t:"Barreira secundária",en:"Secondary barrier",cat:"Fundamentos",d:"O conjunto BOP e equipamentos associados (linhas, válvulas, choke manifold). Só entra em ação quando a barreira primária falha. A filosofia da indústria exige sempre duas barreiras testadas e independentes entre a formação e a superfície.",n:"Barreira sem teste registrado e válido não conta como barreira."},{t:"Overbalance",en:"Overbalance",cat:"Fundamentos",d:"Condição em que a pressão hidrostática do fluido é maior que a pressão de poros da formação. É o estado normal e seguro da perfuração convencional, mantido com uma margem de segurança (trip margin) acima do mínimo necessário.",n:"Overbalance excessivo também é problema: reduz taxa de penetração, aumenta risco de prisão e de perda."},{t:"Underbalance",en:"Underbalance",cat:"Fundamentos",d:"Condição em que a pressão hidrostática é menor que a pressão de poros. Se a formação for permeável, ocorre influxo. Pode acontecer por densidade insuficiente, queda de nível, swab ou perda de circulação.",n:"O momento clássico: desligar as bombas e perder a ECD — o poço que estava 'no limite' entra em underbalance."},{t:"Pressão de poros",en:"Pore pressure",cat:"Fundamentos",d:"Pressão dos fluidos contidos nos poros da rocha. Define a densidade mínima do fluido de perfuração. Formações com pressão anormalmente alta (acima do gradiente normal) são a grande armadilha da perfuração exploratória.",n:"No fechamento, a pressão de poros é revelada: Pporos = PH da coluna + SIDPP."},{t:"Pressão de fratura",en:"Fracture pressure",cat:"Fundamentos",d:"Pressão a partir da qual a rocha quebra e passa a absorver fluido (perda de circulação). Junto com a pressão de poros, define a janela operacional do fluido. É medida na prática pelo LOT na sapata do revestimento.",n:"A sapata é o ponto fraco exposto do poço — a MAASP existe para protegê-la."},{t:"ECD",en:"Equivalent Circulating Density",cat:"Fundamentos",d:"Densidade equivalente de circulação: a densidade 'efetiva' sentida pelo fundo do poço com as bombas ligadas, somando a hidrostática estática às perdas de carga por atrito no anular. Sempre maior que a densidade estática.",n:"Poço estável circulando + kick ao parar as bombas = a ECD estava segurando a formação, não a hidrostática."},{t:"TVD × MD",en:"True Vertical Depth × Measured Depth",cat:"Fundamentos",d:"TVD é a profundidade vertical verdadeira; MD é o comprimento medido ao longo da trajetória do poço. Em poços direcionais, MD > TVD. Toda pressão hidrostática se calcula com TVD, porque pressão depende da altura vertical da coluna, não do caminho percorrido.",n:"Usar MD no lugar de TVD num poço direcional superestima pressões — erro clássico de prova e de campo."},{t:"Lei de Boyle",en:"Boyle's Law",cat:"Fundamentos",d:"P1×V1 = P2×V2 (a temperatura constante). Governa o comportamento do gás no poço: quando a pressão cai pela metade, o volume dobra. Um kick de gás pequeno no fundo vira um volume enorme perto da superfície.",n:"Gás fechado sem expansão sobe mantendo a pressão — e 'carrega' a pressão do fundo para cima. Por isso a expansão controlada."},{t:"Gás raso",en:"Shallow gas",cat:"Fundamentos",d:"Acumulação de gás em formações rasas, antes de haver sapata e BOP capazes de conter um fechamento com segurança. Fechar o poço pode fraturar a formação rasa e trazer o fluxo por fora do poço (crateração).",n:"Resposta padrão: não fechar — desviar o fluxo pelo diverter e afastar o pessoal."},{t:"BOP",en:"Blowout Preventer",cat:"Equipamentos",d:"Conjunto de preventores instalado na cabeça do poço que permite fechá-lo e circular o kick com segurança. Combina preventor anular e gavetas (de tubo, cega, cisalhante), acionados hidraulicamente pelo acumulador.",n:"Testes: de função (frequentes) e de pressão em baixa e alta (periódicos), com critério e registro."},{t:"Preventor anular",en:"Annular preventer",cat:"Equipamentos",d:"Elemento de vedação de borracha reforçada que se molda a qualquer diâmetro dentro do poço — drill pipe, kelly, comandos, cabo — e fecha até em poço aberto. Geralmente é o primeiro preventor fechado num kick.",n:"Com pressão de fechamento reduzida no regulador, permite stripping de coluna através dele."},{t:"Pipe ram",en:"Gaveta de tubo",cat:"Equipamentos",d:"Gaveta que veda em volta de um diâmetro específico de tubo. A gaveta variável (variable bore ram) cobre uma faixa de diâmetros. Nunca deve fechar sobre tool joint ou BHA.",n:"Daí o spacing out: posicionar a coluna antes de fechar, garantindo tubo liso na frente das gavetas."},{t:"Blind ram",en:"Gaveta cega",cat:"Equipamentos",d:"Gaveta que fecha e veda o poço sem coluna dentro. Usada em kick durante manobra com a coluna totalmente fora, ou em operações sem coluna no poço.",n:"Fechou a cega com kick? As opções viram volumétrico, stripping/snubbing ou bullheading."},{t:"Shear ram",en:"Gaveta cisalhante",cat:"Equipamentos",d:"Gaveta capaz de cortar a coluna de perfuração e vedar o poço. É o último recurso, usado em emergências (ex.: desconexão de emergência em sondas flutuantes). Tem limitações: não corta tool joints nem BHA e exige pressão de acionamento adequada.",n:"O teste de função da shear ram é item crítico de auditoria — falha nela é perda de capacidade de emergência."},{t:"Choke manifold",en:"Choke manifold",cat:"Equipamentos",d:"Conjunto de válvulas, linhas e chokes (remoto, manual e reserva) que recebe o retorno do poço fechado e impõe a contrapressão necessária para manter o fundo constante durante a circulação do kick.",n:"Plugging (entupimento) faz a pressão subir; washout (erosão) faz cair. A troca para o choke reserva deve ser treinada."},{t:"Kill line / Choke line",en:"Kill line / Choke line",cat:"Equipamentos",d:"Linhas de alta pressão que conectam o BOP ao sistema de superfície: a kill line para bombear fluido ao poço fechado, a choke line para retornar o fluido ao choke manifold sob controle.",n:"Em BOP submarino, a choke line longa gera perda de carga (CLF) que precisa ser medida e compensada."},{t:"HCR",en:"Hydraulically Controlled Remote valve",cat:"Equipamentos",d:"Válvula de acionamento hidráulico remoto instalada na saída lateral do BOP, aberta do painel para alinhar o poço com a choke line antes de circular o kick.",n:"A sequência correta de abertura das válvulas de saída faz parte do procedimento de shut-in da sonda."},{t:"Acumulador (Koomey)",en:"Accumulator unit",cat:"Equipamentos",d:"Unidade com garrafas pré-carregadas de nitrogênio e fluido hidráulico que armazena energia para acionar o BOP mesmo com a sonda sem energia. Dimensionada para fechar e abrir os preventores com reserva.",n:"Auditoria verifica pré-carga, volume útil, tempos de fechamento e redundância das bombas."},{t:"Degasser",en:"Degasser",cat:"Equipamentos",d:"Equipamento (a vácuo ou atmosférico) que remove gás disperso no fluido de retorno antes que ele volte aos tanques e seja rebombeado gaseificado para o poço.",n:"Fluido cortado por gás rebombeado = hidrostática menor descendo pelo poço — o problema se realimenta."},{t:"Poor boy separator",en:"Mud-gas separator",cat:"Equipamentos",d:"Separador atmosférico que recebe o retorno da circulação do kick, separa o gás livre (mandado ao vent/queimador) e devolve o fluido às peneiras/tanques. Tem capacidade limitada de vazão de gás.",n:"Separador afogado = gás no piso da sonda. A vazão de matar também é escolhida para proteger a superfície."},{t:"Diverter",en:"Diverter",cat:"Equipamentos",d:"Sistema instalado no topo do poço que, em vez de fechar, desvia o fluxo para linhas overboard, longe do piso e do pessoal. É a resposta ao gás raso e ao gás no riser, quando fechar não é opção segura.",n:"Linhas do diverter devem estar sempre alinhadas conforme o procedimento — não há tempo de montar nada na hora."},{t:"Trip tank",en:"Trip tank",cat:"Equipamentos",d:"Tanque pequeno, calibrado e com circuito próprio, usado para encher o poço e medir volumes com precisão durante manobras e flow checks. É o instrumento mais sensível da sonda para detectar influxo ou perda.",n:"Volume bombeado deve igualar o volume de aço retirado. Discrepância = parar, flow check e, na dúvida, fechar."},{t:"Float valve",en:"Válvula flutuante",cat:"Equipamentos",d:"Válvula de retenção instalada na coluna (perto da broca) que permite bombear para baixo e bloqueia fluxo para cima. Protege contra kick pelo interior da coluna, mas impede a leitura direta do SIDPP.",n:"Com float: bombeio lento até detectar a 'quebra' de pressão que abre a válvula — essa pressão revela o SIDPP."},{t:"FOSV / TIW",en:"Full Opening Safety Valve",cat:"Equipamentos",d:"Válvula de segurança de manobra, mantida na mesa com a chave ao lado durante toda a manobra. Em fluxo pela coluna, é rosqueada ABERTA (para conseguir conectar contra o fluxo) e então fechada.",n:"Depois dela pode-se instalar o inside BOP (retenção) para permitir stripping com bombeio."},{t:"Inside BOP",en:"Inside BOP / Gray valve",cat:"Equipamentos",d:"Válvula de retenção instalada na coluna durante um kick, acima da FOSV. Permite bombear para baixo e impede retorno — essencial para retornar ao fundo por stripping com segurança.",n:"FOSV fecha primeiro (é full opening); o inside BOP entra depois, já sem fluxo."},{t:"Kelly cock",en:"Kelly cock",cat:"Equipamentos",d:"Válvulas de segurança instaladas acima (superior) e abaixo (inferior) do kelly, para fechar o interior da coluna na superfície e permitir desconexão com pressão embaixo.",n:"Em sondas com topdrive, as válvulas de segurança do topdrive cumprem o mesmo papel."},{t:"Pit gain",en:"Pit gain",cat:"Detecção",d:"Ganho de volume nos tanques ativos sem explicação operacional — sinal POSITIVO de kick: se está saindo mais do que entra, algo da formação está empurrando fluido para fora. O volume final do pit gain dimensiona o influxo.",n:"Registre o pit gain do fechamento: ele entra no cálculo de altura e gradiente do influxo."},{t:"Flow check",en:"Flow check",cat:"Detecção",d:"Verificação de fluxo: parar as bombas, alinhar o poço ao trip tank (ou observar a linha de retorno) e verificar por tempo suficiente se o poço flui parado. Poço fluindo com bombas desligadas = kick em andamento.",n:"Flow check curto ou com fluido ainda em movimento gera falso negativo. Na dúvida, feche — flow check se faz com o poço fechado também (pelas pressões)."},{t:"Drilling break",en:"Drilling break",cat:"Detecção",d:"Aumento brusco e não programado da taxa de penetração, indicando mudança de formação — possivelmente zona porosa e pressurizada. É sinal de ALERTA (não positivo): pede flow check antes de continuar.",n:"Muitas empresas exigem flow check obrigatório após drilling break de X metros — conheça o número da sua."},{t:"Retorno aumentado",en:"Increased flow return",cat:"Detecção",d:"Aumento da vazão de retorno na linha sem mudança nos strokes da bomba — sinal positivo: a formação está contribuindo com fluxo. Costuma ser o primeiro sinal, antes do pit gain acumular.",n:"Sensor de vazão (flow show) bem calibrado detecta kick antes do nível dos tanques."},{t:"Corte por gás",en:"Gas-cut mud",cat:"Detecção",d:"Fluido retornando gaseificado, com densidade reduzida. É sinal de alerta: pode vir da formação perfurada (gás de fundo), de conexões, ou de um influxo em desenvolvimento. Exige monitoramento e investigação.",n:"Corte por gás perto da superfície reduz pouco a pressão de fundo (o gás expande em cima) — mas nunca ignore a tendência."},{t:"Swab",en:"Swabbing / Pistoneio",cat:"Detecção",d:"Efeito de sucção criado ao puxar a coluna: a broca/BHA age como pistão e reduz a pressão no fundo. Se a redução levar o poço a underbalance, induz kick — a causa clássica de kick de manobra.",n:"Fatores que agravam: velocidade de retirada, folga anular pequena, fluido viscoso, broca enceramento (balled bit)."},{t:"Surge",en:"Surge",cat:"Detecção",d:"O oposto do swab: aumento de pressão no fundo ao descer a coluna rápido. Pode fraturar a formação e causar perda de circulação — que por sua vez derruba o nível e pode induzir kick.",n:"Velocidade de manobra é compromisso: rápido demais dá swab/surge; a velocidade segura vem do programa do poço."},{t:"Ballooning",en:"Ballooning / Flowback",cat:"Detecção",d:"Formações microfraturadas 'bebem' fluido com bombas ligadas (pela ECD) e o devolvem com bombas desligadas. Imita um kick, mas o fluxo decai com o tempo e o volume devolvido tende a igualar o perdido antes.",n:"Trate como kick até provar o contrário: feche, monitore pressões. SICP baixo e estável sugere ballooning; subindo, é kick."},{t:"Trip sheet",en:"Trip sheet",cat:"Detecção",d:"Planilha de manobra que compara, seção a seção, o volume teórico de aço retirado/descido com o volume real medido no trip tank. É o detector de kick e de perda durante a manobra.",n:"O slug bombeado antes da retirada muda a contabilidade inicial — considere-o na planilha."},{t:"Hard shut-in",en:"Hard shut-in",cat:"Fechamento",d:"Fechamento com a choke line já fechada: para bombas, fecha o preventor direto. É o método padrão da maioria das operadoras porque minimiza o tempo de poço aberto e, portanto, o volume do influxo.",n:"Influxo menor = menos perda de hidrostática no anular = SICP menor = controle mais fácil. O golpe de pressão (water hammer) é considerado risco menor que o influxo extra."},{t:"Soft shut-in",en:"Soft shut-in",cat:"Fechamento",d:"Fechamento com o choke aberto: fecha-se o preventor e depois o choke gradualmente. Reduz o golpe de pressão nas linhas, mas permite influxo adicional durante o processo.",n:"A escolha hard × soft é política da operadora — não decisão individual na hora do kick."},{t:"SIDPP",en:"Shut-In Drill Pipe Pressure",cat:"Fechamento",d:"Pressão estabilizada na coluna após o fechamento. Como o interior da coluna contém fluido limpo de densidade conhecida, o SIDPP mede exatamente quanto falta de hidrostática para equilibrar a formação — é a leitura confiável para todos os cálculos.",n:"Espere estabilizar antes de anotar (salvo migração evidente). Com float na coluna, use o procedimento de bombeio lento."},{t:"SICP",en:"Shut-In Casing Pressure",cat:"Fechamento",d:"Pressão estabilizada no anular após o fechamento. Normalmente maior que o SIDPP, porque o influxo (mais leve que o fluido) está no anular reduzindo a hidrostática ali. A diferença SICP−SIDPP carrega informação sobre o tipo e a altura do influxo.",n:"SICP é contaminado pelo influxo — nunca o use para calcular KMW. Compare-o continuamente com a MAASP."},{t:"Spacing out",en:"Spacing out",cat:"Fechamento",d:"Posicionamento da coluna antes de fechar o BOP, garantindo que nenhum tool joint fique na frente das gavetas e que uma conexão fique acessível na mesa para instalar válvulas.",n:"Em sondas flutuantes o spacing out considera o movimento da sonda (heave) — mais crítico e mais treinado."},{t:"Migração de gás",en:"Gas migration",cat:"Fechamento",d:"Gás fechado no poço sobe por diferença de densidade. Sem poder expandir, sobe mantendo sua pressão — elevando a pressão em todos os pontos do poço, com risco de fraturar a sapata ou sobrecarregar equipamentos.",n:"Assinatura: SIDPP e SICP subindo juntos com o poço fechado. Resposta: expansão controlada (choke/volumétrico)."},{t:"Driller's Method",en:"Método do Sondador",cat:"Métodos",d:"Controle em duas circulações: na primeira, circula-se o influxo para fora com o fluido original, mantendo a pressão da coluna constante (= ICP na vazão de matar); na segunda, bombeia-se o fluido de matar. Começa imediatamente e exige menos cálculo inicial.",n:"Preferido com gás migrando rápido ou logística de mistura limitada. Custo: pressões de anular maiores na sapata em kicks de gás."},{t:"Wait & Weight",en:"Método do Engenheiro",cat:"Métodos",d:"Controle em uma circulação: espera-se preparar o fluido de matar (wait) e circula-se já com ele (weight). Da superfície ao bit, a pressão da coluna cai de ICP para FCP conforme a tabela de strokes; do bit à superfície, mantém-se FCP constante.",n:"Menores pressões na sapata na maioria dos cenários. Inaceitável quando o gás migra rápido e a mistura demora."},{t:"Método volumétrico",en:"Volumetric method",cat:"Métodos",d:"Controle sem circulação, usado quando não é possível circular (bomba quebrada, coluna entupida ou fora do fundo). Deixa-se o gás migrar e troca-se volume por pressão: a cada subida de pressão além da margem definida, sangra-se um volume calculado de fluido pelo choke.",n:"É pura contabilidade: cada bbl sangrado equivale a uma pressão hidrostática conhecida. Disciplina e registro são tudo."},{t:"Lubricate & bleed",en:"Lubricate and bleed",cat:"Métodos",d:"Variante do volumétrico para remover gás acumulado sob o BOP na superfície: bombeia-se (lubrica) um volume de fluido para dentro do gás, espera-se decantar, e sangra-se a pressão equivalente à hidrostática do fluido injetado. Repete-se até remover o gás.",n:"Comum em BOP submarino para remover gás preso abaixo dos preventores antes de abrir."},{t:"Stripping",en:"Stripping",cat:"Métodos",d:"Descer (ou retirar) a coluna com o poço fechado, através do preventor anular com pressão de fechamento reduzida, contabilizando rigorosamente os volumes deslocados. Usado para retornar ao fundo após kick de manobra e circular corretamente.",n:"Com gás migrando, combina-se stripping com controle volumétrico — dois procedimentos rodando juntos."},{t:"Snubbing",en:"Snubbing",cat:"Métodos",d:"Operação com unidade especial capaz de descer/retirar coluna em poço pressurizado mesmo quando a força de expulsão supera o peso da coluna ('pipe light'). Recurso de intervenção pesada, comum em workover e poços vivos.",n:"É a evolução do stripping quando as pressões e forças saem do alcance do BOP convencional."},{t:"Bullheading",en:"Bullheading",cat:"Métodos",d:"Bombear o influxo de volta para a formação, à força, pelo anular ou pela coluna. Usado quando circular é inaceitável: gás com H2S, influxo acima do bit, gás no riser, ou impossibilidade de circulação. A formação precisa aceitar injeção.",n:"Risco central: fraturar uma zona mais rasa e criar blowout subterrâneo. Pressão de injeção sempre limitada e monitorada."},{t:"Barite plug",en:"Tampão de barita",cat:"Métodos",d:"Tampão de alta densidade bombeado para criar barreira hidrostática/física no poço em cenários severos, como perda + kick simultâneos ou fluxo interno entre formações (blowout subterrâneo).",n:"Recurso de contingência: decanta e forma um selo sólido. Alternativa: gunk plug (bentonita em óleo)."},{t:"PL / SCR",en:"Slow Circulating Rate pressure",cat:"Cálculos",d:"Pressão de circulação medida em vazão lenta predefinida (ex.: 30 spm), registrada ANTES do kick. É a referência sobre a qual se constroem ICP e FCP. Deve ser medida em cada bomba de matar e em mais de uma vazão.",n:"Refazer a medição a cada turno e quando mudar densidade, bocais ou bomba. PL desatualizada = ICP/FCP errados."},{t:"KMW",en:"Kill Mud Weight",cat:"Cálculos",d:"Densidade do fluido de matar: a densidade necessária para equilibrar a pressão de poros com o poço estático. KMW = densidade atual + SIDPP ÷ (0,17 × TVD). No campo, arredonda-se para cima.",n:"Overkill (pesar além do necessário) cria problema novo: ECD alta, risco de perda e MAASP menor."},{t:"ICP",en:"Initial Circulating Pressure",cat:"Cálculos",d:"Pressão na coluna no início da circulação de matar, com o fluido original: ICP = PL + SIDPP. É o alvo a manter constante na primeira circulação do Driller's e o ponto de partida da tabela de queda no W&W.",n:"Verificação prática: ao estabilizar a vazão de matar, a pressão da coluna deve bater com o ICP calculado. Se não bate, pare e investigue."},{t:"FCP",en:"Final Circulating Pressure",cat:"Cálculos",d:"Pressão na coluna quando o fluido de matar preencheu todo o interior da coluna: FCP = PL × (KMW ÷ densidade atual). Do bit até completar o anular, mantém-se FCP constante.",n:"A queda programada de ICP até FCP (tabela de strokes) é o coração da kill sheet — siga-a, não improvise."},{t:"MAASP",en:"Maximum Allowable Annular Surface Pressure",cat:"Cálculos",d:"Máxima pressão de superfície admissível no anular antes de fraturar a formação na sapata: MAASP = (densidade máx. do LOT − densidade atual) × 0,17 × TVD da sapata. Diminui quando a densidade em uso aumenta.",n:"SICP se aproximando da MAASP com gás ainda por passar na sapata = decisão de supervisão imediata."},{t:"LOT",en:"Leak-Off Test",cat:"Cálculos",d:"Teste realizado após perfurar a sapata: pressuriza-se o poço fechado até a formação começar a admitir fluido (leak-off). Fornece a densidade equivalente máxima suportada — base da MAASP e da kick tolerance.",n:"O FIT (Formation Integrity Test) é a versão 'até a pressão-alvo', sem levar a formação ao leak-off."},{t:"Kick tolerance",en:"Kick tolerance",cat:"Cálculos",d:"O maior volume de influxo (no pior caso, gás) que ainda pode ser fechado e circulado sem fraturar a sapata. Depende da margem do LOT, densidade em uso, TVDs, geometria do anular e natureza do influxo. Decide profundidade de revestimento e limites operacionais.",n:"Kick tolerance menor que o volume mínimo detectável pela sonda = não avance sem mitigação."},{t:"Gradiente do influxo",en:"Influx gradient",cat:"Cálculos",d:"Gradiente de pressão estimado do fluido invasor: grad. influxo = grad. do fluido − (SICP − SIDPP) ÷ altura do influxo. Identifica a natureza do kick: ~0,2–0,7 psi/m indica gás; próximo de 1,0–1,5, líquido (óleo/salmoura).",n:"Saber se é gás muda tudo: migração, expansão, pressões máximas e escolha do método."},{t:"Riser",en:"Marine riser",cat:"Águas Profundas",d:"Tubo de grande diâmetro que conecta o BOP submarino (no leito marinho) à sonda flutuante, retornando o fluido à superfície. Acima do BOP não há barreira secundária — gás no riser é emergência.",n:"Gás no riser: alinhar o diverter (overboard), proteger o pessoal e seguir o plano específico. Não há como 'fechar' o riser."},{t:"LMRP",en:"Lower Marine Riser Package",cat:"Águas Profundas",d:"Parte superior do conjunto BOP submarino, que conecta o riser ao BOP inferior. Em emergência, o LMRP desconecta do BOP (que permanece fechando o poço), liberando a sonda.",n:"É o que se solta na EDS — o poço fica seguro com o BOP inferior fechado pela shear ram."},{t:"EDS",en:"Emergency Disconnect Sequence",cat:"Águas Profundas",d:"Sequência automatizada de desconexão de emergência em sondas de posicionamento dinâmico: fecha a shear ram, corta a coluna, sela o poço e desconecta o LMRP. Acionada em perda de posição (drive-off/drift-off) ou blackout crítico.",n:"Gatilhos (círculos de alerta de posição) devem ser pré-definidos, treinados e sem ambiguidade — hesitar custa o poço e a sonda."},{t:"CLF",en:"Choke Line Friction",cat:"Águas Profundas",d:"Perda de carga na choke line longa e estreita do BOP submarino durante a circulação. Se não compensada, adiciona pressão extra sobre a sapata e o anular — pode fraturar mesmo 'seguindo os números'.",n:"Compensação prática: monitorar a pressão pela kill line estática (sem fluxo, sem perda de carga) enquanto circula pelo choke."},{t:"Hidrato",en:"Gas hydrate",cat:"Águas Profundas",d:"Sólido semelhante a gelo formado por gás + água em alta pressão e baixa temperatura — condições típicas do leito marinho em águas profundas. Pode bloquear choke/kill lines, cavidades do BOP e travar funções.",n:"Prevenção: injeção de glicol/inibidores e minimizar água livre nas linhas. A expansão do gás (efeito Joule-Thomson) esfria e agrava o risco."},{t:"Drive-off / Drift-off",en:"Drive-off / Drift-off",cat:"Águas Profundas",d:"Perdas de posição de sonda DP: drive-off é a propulsão empurrando a sonda na direção errada (falha de referência/controle); drift-off é a deriva por perda de propulsão (blackout). Ambos podem exigir EDS.",n:"O tempo de resposta disponível depende da lâmina d'água e do riser — círculos de alerta são calculados por poço."},{t:"Teste de pressão negativo",en:"Negative pressure test",cat:"Águas Profundas",d:"Teste de barreira que reduz a hidrostática acima do elemento testado (ex.: cimento) e verifica se há fluxo/ganho de pressão. Aprovação exige critérios formais escritos — interpretação 'elástica' desse teste foi central no acidente de Macondo.",n:"Fluxo ou pressão voltando durante o teste = barreira reprovada. Não existe 'explicação alternativa' sem investigação."},{t:"Kill sheet",en:"Kill sheet",cat:"Operações",d:"Planilha oficial de matar o poço: organiza dados (densidades, volumes, PL, pressões de fechamento), cálculos (KMW, ICP, FCP, MAASP) e a tabela de queda de pressão por strokes. É o documento que comanda a circulação do kick.",n:"Preenchida e conferida por mais de uma pessoa. Os dados 'pré-kick' (PL, volumes) devem estar sempre atualizados."},{t:"Trip margin",en:"Trip margin",cat:"Operações",d:"Margem extra de densidade embutida no fluido para compensar a redução de pressão por swab durante a manobra, mantendo overbalance mesmo com a coluna em movimento.",n:"Margem típica definida no programa do poço — não é número universal."},{t:"Drills",en:"Well control drills",cat:"Operações",d:"Treinamentos práticos cronometrados da equipe: pit drill (reação a ganho de volume), BOP/choke drill (fechamento), trip drill (kick em manobra), strip drill. Criam a resposta automática que salva os primeiros segundos do kick.",n:"A métrica que importa: tempo de detecção + tempo de fechamento, com crítica construtiva depois."},{t:"Stop work authority",en:"Stop work authority",cat:"Operações",d:"Autoridade formal de QUALQUER membro da equipe para parar o trabalho diante de um risco percebido, sem punição. Pilar da cultura de segurança — ataca a 'normalização do desvio' que precede grandes acidentes.",n:"Cultura real se mede pela reação da liderança quando alguém usa essa autoridade."},{t:"SIMOPS",en:"Simultaneous Operations",cat:"Operações",d:"Operações simultâneas (ex.: perfurar enquanto outra equipe faz manutenção ou movimentação de carga). Exigem análise formal para garantir que nenhuma combinação de atividades deixe o poço com menos de duas barreiras.",n:"Manutenção de barreira (ex.: teste de BOP) durante operação é caso clássico de análise SIMOPS."},{t:"BPV",en:"Back Pressure Valve",cat:"Operações",d:"Válvula de retenção instalada no suspensor de coluna/cabeça do poço durante operações de troca de equipamento na superfície (ex.: retirar BOP, instalar árvore), mantendo barreira contra fluxo pelo interior.",n:"Parte do gerenciamento de barreiras em completação/workover — instalada e testada antes de remover a barreira de cima."},{t:"DHSV",en:"Downhole Safety Valve",cat:"Operações",d:"Válvula de segurança de subsuperfície instalada na coluna de produção de poços produtores, que fech
